<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>翠手遮天-飞仙版</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        background: transparent;
      }
      canvas#game {
        display: block !important;
        position: fixed !important;
        top: 50px !important;
        left: 0px !important;
        width: 100% !important;
        height: calc(100% - 160px) !important;
        z-index: 1 !important;
        background-color: transparent !important;
      }
      .ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 5px;
        pointer-events: none;
        z-index: 50;
      }
      .stats {
        background: rgba(0, 0, 0, 0.8);
        padding: 8px 10px;
        border-radius: 10px;
        color: #fff;
        font-family: 'SimHei', sans-serif;
        font-size: 12px;
        border: 2px solid #f1c40f;
        z-index: 50;
      }
      .stats div {
        margin: 3px 0;
      }
      .progress-container {
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 10px;
        border-radius: 8px;
        border: 2px solid #f1c40f;
        min-width: 100px;
      }
      .kills-container {
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 10px;
        border-radius: 8px;
        border: 2px solid #9b59b6;
        font-size: 11px;
        color: #fff;
      }
      .level-title {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'SimHei', sans-serif;
        font-size: 36px;
        color: #f1c40f;
        text-shadow:
          0 0 15px #f39c12,
          0 0 40px #e74c3c;
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
        z-index: 20;
      }
      .controls-hint {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        font-family: sans-serif;
        pointer-events: none;
        text-align: center;
      }
      .game-over,
      .level-complete {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        padding: 15px;
      }
      .game-over h1 {
        font-size: 36px;
        color: #e74c3c;
        text-shadow: 0 0 20px #c0392b;
        margin-bottom: 20px;
      }
      .level-complete h1 {
        font-size: 32px;
        color: #f1c40f;
        text-shadow: 0 0 20px #f39c12;
        margin-bottom: 20px;
      }
      .btn {
        padding: 12px 24px;
        font-size: 16px;
        background: linear-gradient(135deg, #9b59b6, #8e44ad);
        color: #fff;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        margin: 8px;
        font-family: 'SimHei', sans-serif;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        min-width: 120px;
        min-height: 44px;
        touch-action: manipulation;
      }
      .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #9b59b6;
      }
      .btn:active {
        transform: scale(0.95);
      }
      /* 移动端适配 */
      @media (max-width: 600px) {
        .ui-overlay {
          padding: 3px;
        }
        .stats {
          padding: 5px 8px;
          font-size: 10px;
        }
        .stats div {
          margin: 2px 0;
        }
        .progress-container {
          min-width: 80px;
          padding: 4px 6px;
        }
        .kills-container {
          font-size: 10px;
          padding: 4px 6px;
        }
        .level-title {
          font-size: 28px;
        }
        .game-over h1 {
          font-size: 28px;
        }
        .level-complete h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div class="ui-overlay">
      <div class="stats">
        <div style="font-size: 18px; font-weight: bold; color: #f1c40f">
          👑 翠翠
        </div>
        <div>关卡: <span id="level">1</span>/20</div>
        <div style="color: #e74c3c">❤️ <span id="hp">100</span></div>
        <div>💰 <span id="gold">0</span></div>
      </div>
      <div class="progress-container">
        <div
          style="
            color: #f1c40f;
            font-size: 11px;
            text-align: center;
            margin-bottom: 4px;
          "
        >
          🏁 <span id="distance">2800</span>m
        </div>
        <div
          style="
            background: #333;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
          "
        >
          <div
            id="progressBar"
            style="
              background: linear-gradient(90deg, #27ae60, #2ecc71);
              height: 100%;
              width: 0%;
              transition: width 0.3s;
              border-radius: 4px;
            "
          ></div>
        </div>
      </div>
      <div class="kills-container">⚔️ 击杀: <span id="kills">0</span></div>
    </div>

    <div class="level-title" id="levelTitle"></div>

    <!-- 开始提示 - 移动端优化 -->
    <div
      id="startHint"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        padding: 20px 30px;
        border-radius: 15px;
        border: 3px solid #f1c40f;
        z-index: 300;
        text-align: center;
        width: 90%;
        max-width: 320px;
        cursor: pointer;
        pointer-events: auto;
      "
    >
      <div
        style="
          color: #f1c40f;
          font-size: 22px;
          font-weight: bold;
          margin-bottom: 12px;
        "
      >
        🎮 点击开始游戏
      </div>
      <div style="color: #fff; font-size: 14px; margin-bottom: 8px">
        J攻击 | K技能 | L翻滚 | F起飞 | T变身
      </div>
      <div style="color: #ff6b6b; font-size: 13px; margin-bottom: 8px">
        1翠雨梨花针 | 2亢翠有悔 | 3五毒拍翠掌
      </div>
      <div style="color: #888; font-size: 12px; margin-top: 10px">
        手机端使用底部按钮操作
      </div>
    </div>

    <div class="game-over" id="gameOver">
      <h1>游戏结束</h1>
      <p style="color: #fff; font-size: 20px; margin-bottom: 20px">
        坚持到第 <span id="finalLevel">1</span> 关
      </p>
      <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <div class="level-complete" id="levelComplete">
      <h1>关卡完成!</h1>
      <p style="color: #fff; font-size: 16px; margin-bottom: 15px">
        获得金币: <span id="levelGold">0</span>
      </p>
      <button
        class="btn"
        onclick="nextLevel()"
        style="padding: 12px 30px; font-size: 18px"
      >
        下一关 ▶
      </button>
    </div>

    <!-- 奖励图片弹窗 - 移动端优化 -->
    <div
      id="rewardModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 10px;
      "
    >
      <div
        style="
          background: linear-gradient(135deg, #1a1a2e, #16213e);
          padding: 12px;
          border-radius: 12px;
          border: 2px solid #f1c40f;
          text-align: center;
          width: 95%;
          max-width: 300px;
        "
      >
        <h2 style="color: #f1c40f; margin-bottom: 8px; font-size: 18px">
          🎉 通关奖励 🎉
        </h2>
        <p style="color: #fff; margin-bottom: 8px; font-size: 12px">
          第 <span id="rewardLevel">1</span> 关奖励
        </p>
        <div
          style="
            max-width: 100%;
            max-height: 45vh;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
          "
        >
          <img
            id="rewardImage"
            src=""
            style="max-width: 100%; max-height: 45vh; display: block"
          />
        </div>
        <p style="color: #aaa; margin: 8px 0; font-size: 10px">
          长按或右键保存图片
        </p>
        <div
          style="
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
          "
        >
          <button
            class="btn"
            onclick="saveRewardImage()"
            style="
              background: linear-gradient(135deg, #27ae60, #2ecc71);
              padding: 10px 18px;
              font-size: 13px;
              min-width: 70px;
            "
          >
            💾 保存
          </button>
          <button
            class="btn"
            onclick="closeRewardModal()"
            style="padding: 10px 18px; font-size: 13px; min-width: 70px"
          >
            继续 ▶
          </button>
        </div>
      </div>
    </div>

    <!-- 全家福弹窗 - 移动端优化 -->
    <div
      id="galleryModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow-y: auto;
        padding: 10px;
      "
    >
      <div
        style="
          background: linear-gradient(135deg, #1a1a2e, #16213e);
          padding: 15px;
          border-radius: 15px;
          border: 3px solid #f1c40f;
          max-width: 95%;
          max-height: 95%;
          text-align: center;
          width: 95%;
        "
      >
        <h2 style="color: #f1c40f; margin-bottom: 8px; font-size: 22px">
          🎊 通关全家福 🎊
        </h2>
        <p style="color: #fff; margin-bottom: 10px; font-size: 14px">
          恭喜你完成了全部20关！
        </p>
        <p style="color: #f1c40f; margin-bottom: 15px; font-size: 12px">
          以下是您收集的所有奖励照片
        </p>
        <div
          id="galleryContainer"
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            max-width: 100%;
            overflow-y: auto;
            max-height: 55vh;
            padding: 8px;
          "
        >
          <!-- 图片将由JS生成 -->
        </div>
        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
          "
        >
          <button
            class="btn"
            onclick="saveAllImages()"
            style="
              background: linear-gradient(135deg, #27ae60, #2ecc71);
              padding: 10px 20px;
              font-size: 13px;
              min-width: 100px;
            "
          >
            💾 保存全部
          </button>
          <button
            class="btn"
            onclick="closeGalleryModal()"
            style="padding: 10px 20px; font-size: 13px; min-width: 100px"
          >
            🏠 返回主页
          </button>
        </div>
      </div>
    </div>

    <script>
      // 奖励图片URL数组
      const REWARD_IMAGES = [
        'https://img0.baidu.com/it/u=2010058606,1710590098&fm=253&app=138&f=JPEG?w=800&h=1166',
        'https://img1.baidu.com/it/u=2322024496,3666164677&fm=253&app=138&f=JPEG?w=800&h=1200',
        'https://img0.baidu.com/it/u=2372888365,2126232960&fm=253&app=138&f=JPEG?w=800&h=1245',
        'https://img0.baidu.com/it/u=1104031880,577806673&fm=253&app=138&f=JPEG?w=800&h=1237',
        'https://b0.bdstatic.com/2aab2640d5d9ea583a246a82096337bd.jpg',
        'https://img0.baidu.com/it/u=1309354228,3158981804&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1067',
        'https://img0.baidu.com/it/u=1309354228,3158981804&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1067',
        'https://img2.baidu.com/it/u=3939069523,2537578307&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1200',
        'https://img1.baidu.com/it/u=3665855494,904858679&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=667',
        'https://b0.bdstatic.com/ugc/AXD_x9BPT4A8hWkkHj_V_Ae04b2c5ffc7267b8e14a898ecfacc1ac.jpg',
        'https://b0.bdstatic.com/ugc/MemEBaFp6a1fYepR8cB05w2ed622ec3c3a081321bf15063bc8fc4d.jpg@h_1280',
      ]
      let currentRewardIndex = 0
      let currentRewardLevel = 0

      function showRewardModal(level) {
        // 奇数关卡显示奖励
        if (level % 2 === 1) {
          currentRewardIndex = Math.floor(level / 2) % REWARD_IMAGES.length
          currentRewardLevel = level
          document.getElementById('rewardLevel').textContent = level
          document.getElementById('rewardImage').src =
            REWARD_IMAGES[currentRewardIndex]
          document.getElementById('rewardModal').style.display = 'flex'
          return true
        }
        return false
      }

      function closeRewardModal() {
        document.getElementById('rewardModal').style.display = 'none'
        if (gameState === 'levelComplete') {
          // 自动进入下一关
          setTimeout(() => {
            document.getElementById('levelComplete').style.display = 'flex'
          }, 100)
        }
      }

      function saveRewardImage() {
        const img = document.getElementById('rewardImage')
        const link = document.createElement('a')
        link.href = img.src
        link.download = `reward_level_${currentRewardLevel}.jpg`
        link.target = '_blank'

        // 使用fetch获取图片后保存
        fetch(img.src)
          .then((response) => response.blob())
          .then((blob) => {
            const url = URL.createObjectURL(blob)
            link.href = url
            document.body.appendChild(link)
            link.click()
            document.body.removeChild(link)
            URL.revokeObjectURL(url)
          })
          .catch((err) => {
            // 如果fetch失败，尝试直接打开新窗口
            window.open(img.src, '_blank')
          })

        // 提示保存成功
        alert('图片已开始下载！如果下载未开始，请右键点击图片选择"另存为"')
      }

      // 显示全家福画廊
      function showGallery() {
        const gallery = document.getElementById('galleryContainer')
        gallery.innerHTML = ''

        // 生成所有图片卡片
        REWARD_IMAGES.forEach((imgUrl, index) => {
          const card = document.createElement('div')
          card.style.cssText =
            'background:#2a2a4a;border-radius:10px;padding:10px;border:2px solid #f1c40f;'
          card.innerHTML = `
                    <div style="position:relative;overflow:hidden;border-radius:8px;margin-bottom:8px;">
                        <img src="${imgUrl}" style="width:100%;height:auto;display:block;transition:transform 0.3s;"
                             onmouseover="this.style.transform='scale(1.05)'"
                             onmouseout="this.style.transform='scale(1)'"/>
                    </div>
                    <p style="color:#f1c40f;font-size:12px;margin:0;">第 ${index * 2 + 1} 关奖励</p>
                    <button onclick="saveSingleImage('${imgUrl}', ${index})" style="margin-top:8px;padding:6px 15px;background:#27ae60;border:none;border-radius:5px;color:#fff;cursor:pointer;font-size:12px;">💾 保存</button>
                `
          gallery.appendChild(card)
        })

        document.getElementById('galleryModal').style.display = 'flex'
      }

      // 保存单张图片
      function saveSingleImage(url, index) {
        const link = document.createElement('a')
        link.href = url
        link.download = `reward_${index + 1}.jpg`

        fetch(url)
          .then((response) => response.blob())
          .then((blob) => {
            const urlObj = URL.createObjectURL(blob)
            link.href = urlObj
            document.body.appendChild(link)
            link.click()
            document.body.removeChild(link)
            URL.revokeObjectURL(urlObj)
          })
          .catch(() => {
            window.open(url, '_blank')
          })
      }

      // 保存全部图片
      function saveAllImages() {
        let savedCount = 0
        REWARD_IMAGES.forEach((url, index) => {
          setTimeout(() => {
            saveSingleImage(url, index)
            savedCount++
            if (savedCount === REWARD_IMAGES.length) {
              alert(
                '所有图片下载已开始！如果未开始下载，请滚动页面后手动保存。',
              )
            }
          }, index * 500) // 每500ms保存一张，避免浏览器阻止
        })
      }

      // 关闭全家福弹窗
      function closeGalleryModal() {
        document.getElementById('galleryModal').style.display = 'none'
      }

      const canvas = document.getElementById('game')
      const ctx = canvas.getContext('2d')

      let W, H
      const TILE = 40
      const GRAVITY = 0.6

      function resize() {
        W = window.innerWidth
        H = window.innerHeight
        // 设置canvas内部分辨率
        canvas.width = W
        canvas.height = H
      }
      resize()
      window.addEventListener('resize', resize)

      // 加载头像
      const playerImg = new Image()
      playerImg.src = './cuicui.jpg'
      let playerImgLoaded = false
      playerImg.onload = () => (playerImgLoaded = true)

      // 翅膀颜色配置
      const WING_COLORS = [
        { primary: '#6366f1', secondary: '#8b5cf6', glow: '#a855f7' },
        { primary: '#06b6d4', secondary: '#3b82f6', glow: '#60a5fa' },
        { primary: '#ec4899', secondary: '#f472b6', glow: '#fb7185' },
      ]
      let currentWingColor = 0

      // 翅膀羽毛类
      class WingFeather {
        constructor(x, y, angle, length, color, isLeft) {
          this.baseX = x
          this.baseY = y
          this.angle = angle
          this.length = length
          this.color = color
          this.isLeft = isLeft
          this.phase = Math.random() * Math.PI * 2
          this.waveAmplitude = 0.15 + Math.random() * 0.1
          this.scale = 1
        }

        update(time, breathOffset) {
          this.currentAngle =
            this.angle +
            Math.sin(time * 0.005 + this.phase) * this.waveAmplitude +
            breathOffset * 0.3
        }

        draw(ctx) {
          ctx.save()
          ctx.translate(this.baseX, this.baseY)
          ctx.rotate(this.currentAngle)
          ctx.scale(this.scale, this.scale)

          // 羽毛渐变
          const gradient = ctx.createLinearGradient(0, 0, this.length, 0)
          gradient.addColorStop(0, this.color)
          gradient.addColorStop(0.5, this.lightenColor(this.color, 40))
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0.5)')

          ctx.fillStyle = gradient
          ctx.shadowBlur = 15 * this.scale
          ctx.shadowColor = this.color

          ctx.beginPath()
          ctx.moveTo(0, 0)
          ctx.quadraticCurveTo(
            this.length * 0.5,
            -this.length * 0.2,
            this.length,
            0,
          )
          ctx.quadraticCurveTo(this.length * 0.5, this.length * 0.2, 0, 0)
          ctx.fill()

          ctx.restore()
        }

        lightenColor(color, amount) {
          const hex = color.replace('#', '')
          const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + amount)
          const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + amount)
          const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + amount)
          return `rgb(${r}, ${g}, ${b})`
        }
      }

      // 初始化翅膀
      const leftWings = []
      const rightWings = []

      function initWings() {
        leftWings.length = 0
        rightWings.length = 0

        const color = WING_COLORS[currentWingColor].primary

        // 左翅膀 - 6片羽毛，前后扇动
        for (let i = 0; i < 6; i++) {
          const angle = -Math.PI * 0.7 - i * 0.15
          const length = 50 + Math.sin(i * 0.5) * 15
          leftWings.push(new WingFeather(0, 0, angle, length, color, true))
        }

        // 右翅膀 - 6片羽毛，前后扇动
        for (let i = 0; i < 6; i++) {
          const angle = -Math.PI * 0.3 + i * 0.15
          const length = 50 + Math.sin(i * 0.5) * 15
          rightWings.push(new WingFeather(0, 0, angle, length, color, false))
        }
      }
      initWings()

      // 游戏时间
      let gameTime = 0

      // 文字子弹配置 - 轮训输出
      const BULLET_TEXTS = ['嘉姐cnm', '万总cnm', '二婶不孝顺奶奶', '二叔最坏']
      let bulletTextIndex = 0
      let bulletTextTimer = 0
      const BULLET_TEXT_INTERVAL = 60 // 每60帧切换文字

      // 获取当前子弹文字
      function getCurrentBulletText() {
        return BULLET_TEXTS[bulletTextIndex % BULLET_TEXTS.length]
      }

      // 根据增益计算文字特效等级
      function getTextEffectLevel() {
        const boost =
          player.damageBoost > 0 ? Math.floor(player.damageBoost * 10) : 0
        return Math.min(boost, 5) // 最高5级特效
      }

      // 文字特效颜色配置 - 鲜艳醒目
      function getTextColor(level) {
        const colors = [

      function generatePlatforms(level) {
        const platforms = []
        const platformCount = 5 + Math.min(level, 10)

        for (let i = 0; i < platformCount; i++) {
          platforms.push({
            x: 100 + (i * (W - 200)) / platformCount + Math.random() * 50,
            y: H - 150 - Math.random() * 200,
            w: 80 + Math.random() * 60,
            h: 20,
            type: level > 10 && Math.random() > 0.7 ? 'moving' : 'static',
            moveSpeed: 1 + Math.random(),
          })
        }
        return platforms
      }

      function generateEnemies(level) {
        const levelEnemies = []
        const allTypes = [
          '嘉姐', '万总', '二叔', '二婶',
          '幽灵', '僵尸', '骷髅', '恶魔', '巫师', '狼人',
          '吸血鬼', '巨魔', '食人魔', '女巫'
        ]
        const types = level < 5
          ? ['嘉姐']
          : level < 8
            ? ['嘉姐', '万总', '幽灵']
            : level < 12
              ? ['嘉姐', '万总', '二叔', '幽灵', '骷髅', '狼人']
              : level < 16
                ? ['嘉姐', '万总', '二叔', '二婶', '幽灵', '僵尸', '骷髅', '恶魔', '巫师']
                : allTypes
        const count = Math.min(4 + level, 12) * 10 // 敌人数量增加10倍

        for (let i = 0; i < count; i++) {
          const type = types[Math.floor(Math.random() * types.length)]
          const template = ENEMIES[type]
          levelEnemies.push({
            type,
            x: W + 200 + i * 100 + Math.random() * 50,
            y: H - 60 - template.size,
            ...template,

        }
        return levelEnemies

      // 生成敌人
      let lastSpawn = 0
      function spawnEnemy() {
        const config = LEVELS[currentLevel - 1]
        const difficulty = config.difficultyMultiplier || 1

        // Boss生成 - 当普通敌人击杀足够后出现
        if (config.boss && !bossSpawned && enemies.length < 3) {
          const bossTemplate = BOSSES[config.boss]
          boss = {
            type: config.boss,
            x: cameraX + W + 300,
            y: H - 60 - bossTemplate.size,
            ...bossTemplate,
            maxHp: bossTemplate.hp * difficulty,
            hp: bossTemplate.hp * difficulty,
            vx: 0,
            vy: 0,
            attackTimer: 0,
            facing: -1,
            isBoss: true,
            phase: 0, // Boss阶段
            rageMode: false, // 狂暴模式
          }
          bossSpawned = true
          bossDefeated = false

          // Boss出现特效
          for (let i = 0; i < 50; i++) {
            particles.push({
              x: boss.x + boss.size / 2,
              y: boss.y + boss.size / 2,
              vx: (Math.random() - 0.5) * 20,
              vy: (Math.random() - 0.5) * 20,
              color: boss.color,
              size: Math.random() * 15 + 5,
              life: 60,
            })
          }
          return
        }

        if (
          enemies.length < config.enemyCount &&
          Date.now() - lastSpawn > config.spawnRate
        ) {
          const type =
            config.enemyTypes[
              Math.floor(Math.random() * config.enemyTypes.length)
            ]
          const template = ENEMIES[type]
          enemies.push({
            type,
            x: cameraX + W + 100 + Math.random() * 200,
            y: H - 60 - template.size,
            ...template,
            maxHp: template.hp * difficulty * (1 + currentLevel * 0.05),
            hp: template.hp * difficulty * (1 + currentLevel * 0.05),
            vx: 0,
            vy: 0,
            attackTimer: 0,
            facing: -1,
          })
          lastSpawn = Date.now()
        }
      }

      // 创建文字子弹
      function createBullet(x, y, dir) {
        const text = getCurrentBulletText()
        const effectLevel = getTextEffectLevel()

        bullets.push({
          x,
          y,
          vx: dir * getBulletSpeed(),
          vy: 0,
          text: text,
          effectLevel: effectLevel,
          color: getTextColor(effectLevel),
          damage: getBulletDamage(),
          size: 15, // 碰撞大小
          life: 100,
          fromPlayer: true,
          rotation: 0,
        })

        // 发射粒子特效 - 简化以减少卡顿
        const particleColor = getTextColor(effectLevel)
        for (let i = 0; i < 3; i++) {
          const angle = (Math.random() - 0.5) * 1.5
          const speed = Math.random() * 6 + 3
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed * dir,
            vy: Math.sin(angle) * speed - Math.random() * 3,
            color: particleColor,
            size: Math.random() * 4 + 2,
            life: 20 + Math.random() * 10,
          })
        }
      }

      // 创建追踪子弹 - 起飞时自动追踪敌人
      function createTargetedBullet(x, y, target) {
        const text = getCurrentBulletText()
        const effectLevel = getTextEffectLevel()
        const speed = getBulletSpeed() * 1.5 // 追踪弹速度稍快

        // 计算朝向敌人的方向
        const dx = target.x + target.size / 2 - x
        const dy = target.y + target.size / 2 - y
        const dist = Math.hypot(dx, dy)
        const dirX = dist > 0 ? dx / dist : 1
        const dirY = dist > 0 ? dy / dist : 0

        bullets.push({
          x,
          y,
          vx: dirX * speed,
          vy: dirY * speed,
          text: text,
          effectLevel: effectLevel,
          color: getTextColor(effectLevel),
          damage: getBulletDamage() * 1.2, // 追踪弹伤害稍高
          size: 20, // 碰撞大小更大
          life: 150,
          fromPlayer: true,
          rotation: 0,
          targeted: true, // 标记为追踪弹
        })

        // 发射追踪粒子特效 - 简化
        const particleColor = getTextColor(effectLevel)
        for (let i = 0; i < 4; i++) {
          const angle = Math.random() * Math.PI * 2
          const pSpeed = Math.random() * 6 + 3
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * pSpeed,
            vy: Math.sin(angle) * pSpeed,
            color: particleColor,
            size: Math.random() * 4 + 2,
            life: 20 + Math.random() * 10,
          })
        }

        // 追踪特效 - 箭头（简化）
        for (let i = 0; i < 2; i++) {
          particles.push({
            x: x - dirX * (i + 1) * 15,
            y: y - dirY * (i + 1) * 15,
            vx: -dirX * 3,
            vy: -dirY * 3,
            color: '#ffffff',
            size: 4 - i,
            life: 15,
          })
        }
      }

      // 创建敌人子弹
      function createEnemyBullet(enemy) {
        const dir = enemy.facing
        enemyBullets.push({
          x: enemy.x + enemy.size / 2,
          y: enemy.y + enemy.size / 3,
          vx: dir * 6,
          vy: -2,
          color: enemy.color,
          size: 8,
          damage: enemy.damage || 15,
          life: 150,
          isBossBullet: false,
        })
      }

      // Boss子弹 - 更大更强
      function createBossBullet(boss, targetX, targetY) {
        const bossCenterX = boss.x + boss.size / 2
        const bossCenterY = boss.y + boss.size / 3
        const angle = Math.atan2(targetY - bossCenterY, targetX - bossCenterX)

        enemyBullets.push({
          x: bossCenterX,
          y: bossCenterY,
          vx: Math.cos(angle) * boss.bulletSpeed,
          vy: Math.sin(angle) * boss.bulletSpeed,
          color: boss.color,
          size: 15, // 更大的子弹
          damage: boss.bulletDamage,
          life: 200,
          isBossBullet: true, // 标记为Boss子弹
        })

        // 发射特效
        for (let i = 0; i < 4; i++) {
          particles.push({
            x: bossCenterX,
            y: bossCenterY,
            vx: Math.cos(angle + (Math.random() - 0.5)) * 5,
            vy: Math.sin(angle + (Math.random() - 0.5)) * 5,
            color: boss.color,
            size: Math.random() * 5 + 2,
            life: 15,
          })
        }
      }

      // 创建掉落物
      function createDrop(x, y, type) {
        const types = ['gold', 'speed', 'damage', 'hp']
        drops.push({
          x,
          y,
          vy: -5,
          type: type || types[Math.floor(Math.random() * types.length)],
          life: 300,
          collected: false,
        })
      }

      // 碰撞检测
      function collides(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        )
      }

      function pointInRect(px, py, r) {
        return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h
      }

      // 圆形碰撞检测 - 用于子弹击中敌人
      function circleHitsRect(cx, cy, radius, r) {
        const closestX = Math.max(r.x, Math.min(cx, r.x + r.w))
        const closestY = Math.max(r.y, Math.min(cy, r.y + r.h))
        const dx = cx - closestX
        const dy = cy - closestY
        return dx * dx + dy * dy < radius * radius
      }

      // 更新玩家
      function updatePlayer() {
        // 移动
        player.vx = 0
        if (keys['a'] || keys['arrowleft']) {
          player.vx = -player.speed
          player.facing = -1
        }
        if (keys['d'] || keys['arrowright']) {
          player.vx = player.speed
          player.facing = 1
        }

        // 下蹲
        player.crouching = (keys['s'] || keys['arrowdown']) && player.grounded
        if (player.crouching) player.vx *= 0.3

        // 跳跃
        if (
          (keys[' '] || keys['w'] || keys['arrowup']) &&
          player.grounded &&
          !player.crouching &&
          !player.rolling
        ) {
          player.vy = player.jumpForce
          player.grounded = false
        }

        // 翻跟头 - 快速闪避 (按L键)
        if (
          keys['l'] &&
          player.rollCooldown <= 0 &&
          !player.rolling &&
          player.grounded
        ) {
          player.rolling = true
          player.rollTimer = 15
          player.rollCooldown = 40
          player.invincible = 15
          player.vx = player.facing * 18
        }

        // 翻跟头状态处理
        if (player.rolling) {
          player.rollTimer--
          if (player.rollTimer % 3 === 0) {
            player.trailParticles.push({ x: player.x, y: player.y, alpha: 0.6 })
          }
          if (player.rollTimer <= 0) {
            player.rolling = false
          }
        }

        // 残影粒子衰减
        player.trailParticles = player.trailParticles.filter((t) => {
          t.alpha -= 0.08
          return t.alpha > 0
        })

        // 起飞 - 悬空飞行
        if (keys['f']) {
          player.flying = true
          player.flyHeight = 150 // 悬空高度
          player.vy = 0 // 取消重力
          player.grounded = false
        } else {
          player.flying = false
          player.flyHeight = 0
        }

        // 翠魔变身 - 按T键变身10秒
        if (keys['t'] && transformAvailable && !player.demonForm) {
          player.demonForm = true
          player.demonTimer = 600 // 10秒（60帧 * 10）
          transformAvailable = false
          player.invincible = 600 // 变身期间无敌
          // 变身特效
          for (let i = 0; i < 15; i++) {
            const angle = (i / 15) * Math.PI * 2
            particles.push({
              x: player.x + player.w / 2 + Math.cos(angle) * 50,
              y: player.y + player.h / 2 + Math.sin(angle) * 50,
              vx: Math.cos(angle) * -5,
              vy: Math.sin(angle) * -5,
              color: '#8b0000',
              size: 8,
              life: 30,
            })
          }
        }

        // 变身状态处理
        if (player.demonForm) {
          player.demonTimer--
          if (player.demonTimer <= 0) {
            player.demonForm = false
          }
        }

        // === 必杀技触发 ===
        // 翠雨梨花针 - 按1键
        if (keys['1'] && skill1Available && !skill1Active) {
          activateSkill1()
        }
        // 亢翠有悔 - 按2键
        if (keys['2'] && skill2Available && !skill2Active) {
          activateSkill2()
        }
        // 五毒拍翠掌 - 按3键
        if (keys['3'] && skill3Available && !skill3Active) {
          activateSkill3()
        }

        // 必杀技状态更新
        if (skill1Active) updateSkill1()
        if (skill2Active) updateSkill2()
        if (skill3Active) updateSkill3()

        // 地震效果更新
        if (earthquakeTimer > 0) earthquakeTimer--

        // 攻击 - 自动追踪敌人（有节流限制）
        const speedBoost =
          player.attackSpeedBoost > 0
            ? Math.max(5, 15 - player.attackSpeedBoost)
            : 15
        const maxBullets = 20 // 最多20发子弹
        if (keys['j'] && player.attackCooldown <= 0 && bullets.length < maxBullets) {
          // 起飞时自动追踪最近的敌人
          if (player.flying && enemies.length > 0) {
            let nearestEnemy = null
            let nearestDist = Infinity
            enemies.forEach((e) => {
              const dist = Math.hypot(e.x - player.x, e.y - player.y)
              if (dist < nearestDist) {
                nearestDist = dist
                nearestEnemy = e
              }
            })
            if (nearestEnemy) {
              createTargetedBullet(
                player.x + player.w / 2,
                player.y + player.h / 2 - 10,
                nearestEnemy,
              )
            }
          } else {
            createBullet(
              player.x + player.w / 2 + player.facing * 30,
              player.y + player.h / 2 - 10,
              player.facing,
            )
          }
          player.attackCooldown = speedBoost
        }

        // 技能攻击 - 发射多发文字子弹（有节流限制）
        if (keys['k'] && player.skillCooldown <= 0 && bullets.length < maxBullets - 3) {
          const effectLevel = getTextEffectLevel()
          const damageBoost =
            player.damageBoost > 0 ? 1 + player.damageBoost : 1
          // 发射3发子弹
          for (let i = -1; i <= 1; i++) {
            const text = getCurrentBulletText()
            bullets.push({
              x: player.x + player.w / 2,
              y: player.y + player.h / 2 - 10,
              vx: player.facing * getBulletSpeed() * 0.8,
              vy: i * 3,
              text: text,
              effectLevel: effectLevel,
              color: getTextColor(effectLevel),
              damage: getBulletDamage() * damageBoost,
              size: 15, // 碰撞大小
              life: 80,
            })
          }
          player.skillCooldown = Math.max(30, 60 - player.attackSpeedBoost)
        }

        // 子弹文字轮训计时
        bulletTextTimer++
        if (bulletTextTimer >= BULLET_TEXT_INTERVAL) {
          bulletTextTimer = 0
          bulletTextIndex++
        }

        // 冷却
        if (player.attackCooldown > 0) player.attackCooldown--
        if (player.skillCooldown > 0) player.skillCooldown--
        if (player.rollCooldown > 0) player.rollCooldown--
        if (player.invincible > 0) player.invincible--

        // 重力（不适用于飞行状态）
        if (!player.flying) {
          player.vy += GRAVITY
        }

        // 移动
        player.x += player.vx
        player.y += player.vy

        // 飞行时保持悬空高度
        if (player.flying) {
          player.y = H - 60 - player.h - player.flyHeight
          player.grounded = false
        }

        // 地面碰撞
        player.grounded = false
        const groundY = H - 60

        if (player.y + player.h > groundY) {
          player.y = groundY - player.h
          player.vy = 0
          player.grounded = true
        }

        // 平台碰撞
        platforms.forEach((p) => {
          if (p.type === 'moving') {
            p.x = p.ox + Math.sin(Date.now() * 0.002 * p.moveSpeed) * 50
          }

          if (
            player.vy >= 0 &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w &&
            player.y + player.h > p.y &&
            player.y + player.h < p.y + p.h + 20
          ) {
            player.y = p.y - player.h
            player.vy = 0
            player.grounded = true
          }
        })

        // 边界
        player.x = Math.max(cameraX, Math.min(levelWidth, player.x))

        // 动画
        if (Math.abs(player.vx) > 0) player.animation += 0.2
      }

      // =============================================
      // 必杀技系统
      // =============================================

      // 翠雨梨花针 - 漫天毒针落下
      function activateSkill1() {
        skill1Available = false
        skill1Active = true
        skill1Timer = 120 // 2秒动画
        earthquakeTimer = 180 // 3秒地震

        // 生成五颜六色的毒针
        for (let i = 0; i < 100; i++) {
          const colors = ['#ff0066', '#00ff66', '#ffff00', '#ff6600', '#00ffff', '#ff00ff', '#6600ff', '#66ff00']
          skillNeedles.push({
            x: cameraX + Math.random() * W,
            y: -50 - Math.random() * 200,
            vx: (Math.random() - 0.5) * 3,
            vy: 15 + Math.random() * 10,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 3 + Math.random() * 4,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.3,
            deadly: true
          })
        }

        // 特效粒子
        for (let i = 0; i < 80; i++) {
          particles.push({
            x: cameraX + Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            color: ['#ff0066', '#00ff66', '#ffff00', '#ff6600'][Math.floor(Math.random() * 4)],
            size: Math.random() * 8 + 4,
            life: 60
          })
        }
      }

      function updateSkill1() {
        skill1Timer--
        skillNeedles.forEach((needle, idx) => {
          needle.x += needle.vx
          needle.y += needle.vy
          needle.rotation += needle.rotationSpeed

          // 针落地后消失
          if (needle.y > H - 60) {
            needle.deadly = false
            // 落地特效
            for (let i = 0; i < 5; i++) {
              particles.push({
                x: needle.x,
                y: H - 60,
                vx: (Math.random() - 0.5) * 8,
                vy: -Math.random() * 8,
                color: needle.color,
                size: Math.random() * 4 + 2,
                life: 20
              })
            }
          }

          // 检测毒针是否击中敌人
          if (needle.deadly) {
            enemies.forEach(e => {
              if (Math.hypot(needle.x - (e.x + e.size/2), needle.y - (e.y + e.size/2)) < e.size/2 + needle.size) {
                e.hp -= 50
                needle.deadly = false
                // 击中特效
                for (let i = 0; i < 3; i++) {
                  particles.push({
                    x: needle.x,
                    y: needle.y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    color: needle.color,
                    size: Math.random() * 5 + 2,
                    life: 15
                  })
                }
              }
            })
          }
        })

        // 清理无效毒针
        skillNeedles = skillNeedles.filter(n => n.y < H + 50 && n.deadly)

        if (skill1Timer <= 0) {
          skill1Active = false
        }
      }

      // 亢翠有悔 - 巨龙横扫
      function activateSkill2() {
        skill2Available = false
        skill2Active = true
        skill2Timer = 120 // 2秒
        earthquakeTimer = 180

        skillDragon = {
          x: cameraX - 200,
          y: H / 2,
          frame: 0,
          speed: 15
        }

        // 特效
        for (let i = 0; i < 100; i++) {
          particles.push({
            x: cameraX + Math.random() * W,
            y: H - 60,
            vx: Math.random() * 5 + 2,
            vy: -Math.random() * 15 - 5,
            color: ['#ffd700', '#ff6600', '#ff0000'][Math.floor(Math.random() * 3)],
            size: Math.random() * 10 + 5,
            life: 80
          })
        }
      }

      function updateSkill2() {
        skill2Timer--
        skillDragon.frame++

        // 巨龙移动
        skillDragon.x += skillDragon.speed
        skillDragon.y = H / 2 + Math.sin(skillDragon.frame * 0.1) * 50

        // 巨龙经过之处敌人全部死亡
        enemies.forEach(e => {
          const dragonWidth = 300
          if (e.x + e.size > skillDragon.x - 100 && e.x < skillDragon.x + dragonWidth) {
            e.hp -= 200 // 秒杀
            // 特效
            for (let i = 0; i < 10; i++) {
              particles.push({
                x: e.x + e.size/2,
                y: e.y + e.size/2,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                color: ['#ffd700', '#ff6600', '#ff0000'][Math.floor(Math.random() * 3)],
                size: Math.random() * 12 + 6,
                life: 40
              })
            }
          }
        })

        // 留下轨迹粒子
        if (skillDragon.frame % 3 === 0) {
          particles.push({
            x: skillDragon.x + Math.random() * 100,
            y: skillDragon.y + (Math.random() - 0.5) * 100,
            vx: -5,
            vy: (Math.random() - 0.5) * 3,
            color: '#ffd700',
            size: Math.random() * 15 + 8,
            life: 30
          })
        }

        if (skill2Timer <= 0 || skillDragon.x > cameraX + W + 300) {
          skill2Active = false
        }
      }

      // 五毒拍翠掌 - 天降掌法
      function activateSkill3() {
        skill3Available = false
        skill3Active = true
        skill3Timer = 150 // 2.5秒
        earthquakeTimer = 180

        skillPalm = {
          x: cameraX + W / 2,
          y: -300,
          targetY: H / 2 - 100,
          frame: 0,
          width: 400,
          height: 500
        }

        // 特效
        for (let i = 0; i < 150; i++) {
          particles.push({
            x: cameraX + Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * 20,
            vy: (Math.random() - 0.5) * 20,
            color: ['#00ff00', '#ff00ff', '#ffff00', '#00ffff', '#ff6600'][Math.floor(Math.random() * 5)],
            size: Math.random() * 10 + 5,
            life: 60
          })
        }
      }

      function updateSkill3() {
        skill3Timer--
        skillPalm.frame++

        // 掌法下落
        if (skillPalm.y < skillPalm.targetY) {
          skillPalm.y += 20
        } else {
          // 掌法停留并震动
          skillPalm.y = skillPalm.targetY + Math.sin(skillPalm.frame * 0.5) * 5
        }

        // 掌法覆盖范围内敌人死亡
        enemies.forEach(e => {
          const palmLeft = skillPalm.x - skillPalm.width/2
          const palmRight = skillPalm.x + skillPalm.width/2
          const palmTop = skillPalm.y - skillPalm.height/2
          const palmBottom = skillPalm.y + skillPalm.height/2

          if (e.x + e.size > palmLeft && e.x < palmRight &&
              e.y + e.size > palmTop && e.y < palmBottom) {
            e.hp -= 200
            // 中毒特效
            for (let i = 0; i < 15; i++) {
              particles.push({
                x: e.x + e.size/2,
                y: e.y + e.size/2,
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 0.5) * 12 - 3,
                color: ['#00ff00', '#ff00ff', '#ff6600'][Math.floor(Math.random() * 3)],
                size: Math.random() * 10 + 5,
                life: 50
              })
            }
          }
        })

        // 毒气特效
        if (skillPalm.frame % 5 === 0) {
          for (let i = 0; i < 10; i++) {
            particles.push({
              x: skillPalm.x + (Math.random() - 0.5) * skillPalm.width,
              y: skillPalm.y + (Math.random() - 0.5) * skillPalm.height,
              vx: (Math.random() - 0.5) * 8,
              vy: -Math.random() * 5,
              color: ['#00ff00', '#ff00ff'][Math.floor(Math.random() * 2)],
              size: Math.random() * 20 + 10,
              life: 40
            })
          }
        }

        if (skill3Timer <= 0) {
          skill3Active = false
        }
      }

      // 绘制必杀技特效
      function drawSkills() {
        // 地震效果
        if (earthquakeTimer > 0) {
          ctx.save()
          const intensity = earthquakeTimer > 120 ? 8 : (earthquakeTimer > 60 ? 5 : 3)
          ctx.translate(
            (Math.random() - 0.5) * intensity,
            (Math.random() - 0.5) * intensity
          )
        }

        // 翠雨梨花针
        if (skill1Active) {
          ctx.save()
          skillNeedles.forEach(needle => {
            ctx.save()
            ctx.translate(needle.x, needle.y)
            ctx.rotate(needle.rotation)

            // 针的光芒
            ctx.shadowBlur = 15
            ctx.shadowColor = needle.color

            // 绘制毒针
            ctx.fillStyle = needle.color
            ctx.beginPath()
            ctx.moveTo(0, -needle.size * 2)
            ctx.lineTo(-needle.size/2, needle.size)
            ctx.lineTo(needle.size/2, needle.size)
            ctx.closePath()
            ctx.fill()

            // 针的尾迹
            ctx.globalAlpha = 0.5
            ctx.fillStyle = needle.color
            ctx.fillRect(-needle.size/4, needle.size, needle.size/2, needle.size * 3)

            ctx.restore()
          })
          ctx.restore()

          // 屏幕文字
          ctx.save()
          ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'
          ctx.font = 'bold 48px sans-serif'
          ctx.textAlign = 'center'
          ctx.shadowBlur = 20
          ctx.shadowColor = '#00ff66'
          ctx.fillText('翠雨梨花针', W/2, 100)
          ctx.restore()
        }

        // 亢翠有悔
        if (skill2Active) {
          ctx.save()
          const dx = skillDragon.x - cameraX
          const dy = skillDragon.y

          // 巨龙主体
          ctx.shadowBlur = 50
          ctx.shadowColor = '#ffd700'

          // 龙头
          const dragonGrad = ctx.createRadialGradient(dx, dy, 0, dx, dy, 80)
          dragonGrad.addColorStop(0, '#ffff00')
          dragonGrad.addColorStop(0.3, '#ff6600')
          dragonGrad.addColorStop(0.7, '#ff0000')
          dragonGrad.addColorStop(1, 'transparent')
          ctx.fillStyle = dragonGrad
          ctx.beginPath()
          ctx.ellipse(dx, dy, 80, 50, 0, 0, Math.PI * 2)
          ctx.fill()

          // 龙角
          ctx.fillStyle = '#ffd700'
          ctx.beginPath()
          ctx.moveTo(dx - 30, dy - 30)
          ctx.lineTo(dx - 60, dy - 80)
          ctx.lineTo(dx - 10, dy - 40)
          ctx.closePath()
          ctx.fill()
          ctx.beginPath()
          ctx.moveTo(dx + 30, dy - 30)
          ctx.lineTo(dx + 60, dy - 80)
          ctx.lineTo(dx + 10, dy - 40)
          ctx.closePath()
          ctx.fill()

          // 龙眼
          ctx.fillStyle = '#ff0000'
          ctx.beginPath()
          ctx.ellipse(dx - 25, dy - 10, 15, 10, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.ellipse(dx + 25, dy - 10, 15, 10, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.fillStyle = '#ffff00'
          ctx.beginPath()
          ctx.arc(dx - 25, dy - 10, 5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(dx + 25, dy - 10, 5, 0, Math.PI * 2)
          ctx.fill()

          // 龙须
          ctx.strokeStyle = '#ffd700'
          ctx.lineWidth = 4
          ctx.beginPath()
          ctx.moveTo(dx - 50, dy + 10)
          ctx.quadraticCurveTo(dx - 120, dy + 30, dx - 150, dy + 50)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(dx + 50, dy + 10)
          ctx.quadraticCurveTo(dx + 120, dy + 30, dx + 150, dy + 50)
          ctx.stroke()

          // 龙身
          ctx.shadowBlur = 30
          for (let i = 0; i < 5; i++) {
            const segmentX = dx - 100 - i * 60
            const segmentY = dy + Math.sin(skillDragon.frame * 0.2 + i) * 20
            const segGrad = ctx.createRadialGradient(segmentX, segmentY, 0, segmentX, segmentY, 40 - i * 5)
            segGrad.addColorStop(0, '#ff6600')
            segGrad.addColorStop(1, 'transparent')
            ctx.fillStyle = segGrad
            ctx.beginPath()
            ctx.ellipse(segmentX, segmentY, 40 - i * 5, 30 - i * 3, 0, 0, Math.PI * 2)
            ctx.fill()
          }

          // 龙尾
          const tailX = dx - 400
          const tailY = dy + Math.sin(skillDragon.frame * 0.2 + 5) * 30
          ctx.beginPath()
          ctx.moveTo(tailX + 30, tailY)
          ctx.quadraticCurveTo(tailX, tailY - 20, tailX - 50, tailY)
          ctx.quadraticCurveTo(tailX, tailY + 20, tailX + 30, tailY)
          ctx.fillStyle = '#ff3300'
          ctx.fill()

          // 火焰效果
          ctx.fillStyle = 'rgba(255, 100, 0, 0.5)'
          for (let i = 0; i < 20; i++) {
            const flameX = dx + 60 + Math.random() * 30
            const flameY = dy + (Math.random() - 0.5) * 60
            ctx.beginPath()
            ctx.arc(flameX, flameY, Math.random() * 15 + 5, 0, Math.PI * 2)
            ctx.fill()
          }

          ctx.restore()

          // 屏幕文字
          ctx.save()
          ctx.fillStyle = 'rgba(255, 215, 0, 0.9)'
          ctx.font = 'bold 48px sans-serif'
          ctx.textAlign = 'center'
          ctx.shadowBlur = 30
          ctx.shadowColor = '#ff6600'
          ctx.fillText('亢翠有悔', W/2, 100)
          ctx.restore()
        }

        // 五毒拍翠掌
        if (skill3Active) {
          ctx.save()

          const palmX = skillPalm.x - cameraX
          const palmY = skillPalm.y
          const palmW = skillPalm.width
          const palmH = skillPalm.height

          // 毒气云
          ctx.globalAlpha = 0.3
          const gasGrad = ctx.createRadialGradient(palmX, palmY, 0, palmX, palmY, palmW/2)
          gasGrad.addColorStop(0, '#00ff00')
          gasGrad.addColorStop(0.5, '#ff00ff')
          gasGrad.addColorStop(1, 'transparent')
          ctx.fillStyle = gasGrad
          ctx.beginPath()
          ctx.ellipse(palmX, palmY, palmW/2, palmH/2, 0, 0, Math.PI * 2)
          ctx.fill()
          ctx.globalAlpha = 1

          // 掌印
          ctx.shadowBlur = 60
          ctx.shadowColor = '#00ff00'

          const palmGrad = ctx.createRadialGradient(palmX, palmY, 0, palmX, palmY, palmW/3)
          palmGrad.addColorStop(0, '#ffff00')
          palmGrad.addColorStop(0.3, '#00ff00')
          palmGrad.addColorStop(0.6, '#ff00ff')
          palmGrad.addColorStop(1, 'rgba(0,0,0,0.5)')

          ctx.fillStyle = palmGrad
          // 掌心
          ctx.beginPath()
          ctx.ellipse(palmX, palmY, palmW/4, palmH/3, 0, 0, Math.PI * 2)
          ctx.fill()

          // 五指
          ctx.fillStyle = '#00ff00'
          for (let i = 0; i < 5; i++) {
            const fingerAngle = -Math.PI/2 + (i - 2) * 0.3
            const fingerLength = palmH/2 + 30
            const fingerX = palmX + Math.cos(fingerAngle) * (palmW/4)
            const fingerY = palmY + Math.sin(fingerAngle) * (palmH/3)

            ctx.beginPath()
            ctx.ellipse(
              fingerX + Math.cos(fingerAngle) * fingerLength/2,
              fingerY + Math.sin(fingerAngle) * fingerLength/2,
              20, fingerLength/2, fingerAngle, 0, Math.PI * 2
            )
            ctx.fill()
          }

          // 毒文字
          ctx.fillStyle = '#ffff00'
          ctx.font = 'bold 36px sans-serif'
          ctx.textAlign = 'center'
          ctx.shadowBlur = 20
          ctx.shadowColor = '#00ff00'
          ctx.fillText('五毒神掌', palmX, palmY + palmH/4 + 50)

          ctx.restore()

          // 屏幕文字
          ctx.save()
          ctx.fillStyle = 'rgba(0, 255, 0, 0.9)'
          ctx.font = 'bold 48px sans-serif'
          ctx.textAlign = 'center'
          ctx.shadowBlur = 30
          ctx.shadowColor = '#00ff00'
          ctx.fillText('五毒拍翠掌', W/2, 100)
          ctx.restore()
        }

        if (earthquakeTimer > 0) {
          ctx.restore()
        }
      }

      // 更新敌人
      function updateEnemies() {
        enemies.forEach((e, idx) => {
          // AI行为
          const dx = player.x - e.x
          const dy = player.y - e.y
          e.facing = dx > 0 ? 1 : -1

          switch (e.pattern) {
            case 'chase':
              if (Math.abs(dx) > 100) e.vx = e.facing * e.speed
              else e.vx = 0
              break
            case 'patrol':
              e.vx = e.facing * e.speed
              if (Math.random() < 0.02) e.facing *= -1
              break
            case 'shoot':
              e.vx = Math.abs(dx) > 200 ? e.facing * e.speed : 0
              e.attackTimer++
              if (e.attackTimer > 90) {
                createEnemyBullet(e)
                e.attackTimer = 0
              }
              break
            case 'boss':
              if (Math.abs(dx) > 150) e.vx = e.facing * e.speed
              else e.vx = 0
              e.attackTimer++
              if (e.attackTimer > 60) {
                createEnemyBullet(e)
                if (currentLevel >= 18) createEnemyBullet(e)
                e.attackTimer = 0
              }
              break
          }

          // 重力
          e.vy += GRAVITY
          e.x += e.vx
          e.y += e.vy

          // 地面
          if (e.y + e.size > H - 60) {
            e.y = H - 60 - e.size
            e.vy = 0
          }

          // 平台
          platforms.forEach((p) => {
            if (
              e.vy >= 0 &&
              e.x + (e.size || 40) > p.x &&
              e.x < p.x + p.w &&
              e.y + (e.size || 40) > p.y &&
              e.y + (e.size || 40) < p.y + p.h + 20
            ) {
              e.y = p.y - (e.size || 40)
              e.vy = 0
            }
          })

          // 伤害玩家
          if (
            player.invincible <= 0 &&
            collides(
              { x: player.x, y: player.y, w: player.w, h: player.h },
              { x: e.x, y: e.y, w: e.size || 40, h: e.size || 40 },
            )
          ) {
            player.hp -= e.damage
            player.invincible = 60
            player.vx = -player.facing * 10
            player.vy = -5
          }

          // 死亡 - 简化爆炸特效
          if (e.hp <= 0) {
            gold += e.gold
            levelKills++
            createDrop(e.x, e.y, 'gold')
            if (Math.random() < 0.2) createDrop(e.x, e.y, 'speed')
            if (Math.random() < 0.2) createDrop(e.x, e.y, 'damage')

            const centerX = e.x + e.size / 2
            const centerY = e.y + e.size / 2

            // 爆炸粒子 - 简化
            for (let i = 0; i < 6; i++) {
              const angle = Math.random() * Math.PI * 2
              const speed = Math.random() * 8 + 5
              particles.push({
                x: centerX,
                y: centerY,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 3,
                color: e.color,
                size: Math.random() * 6 + 3,
                life: 30 + Math.random() * 15,
              })
            }

            enemies.splice(idx, 1)
          }
        })

        // 更新Boss
        if (boss && boss.hp > 0) {
          const dx = player.x - boss.x
          const dy = player.y - boss.y
          boss.facing = dx > 0 ? 1 : -1

          // Boss狂暴模式 - 低血量时
          if (boss.hp < boss.maxHp * 0.3 && !boss.rageMode) {
            boss.rageMode = true
            boss.speed *= 1.5
            // 狂暴特效
            for (let i = 0; i < 8; i++) {
              particles.push({
                x: boss.x + boss.size / 2,
                y: boss.y + boss.size / 2,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                color: '#ff0000',
                size: Math.random() * 10 + 5,
                life: 40,
              })
            }
          }

          // Boss AI
          switch (boss.pattern) {
            case 'berserker': // 狂暴型
              if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed
              else boss.vx = 0
              break
            case 'teleport': // 瞬移型
              if (Math.random() < 0.01) {
                // 瞬移到玩家附近
                boss.x = player.x + (Math.random() - 0.5) * 400
                boss.y = H - 60 - boss.size
                // 瞬移特效
                for (let i = 0; i < 5; i++) {
                  particles.push({
                    x: boss.x + boss.size / 2,
                    y: boss.y + boss.size / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    color: '#ff00ff',
                    size: Math.random() * 8 + 3,
                    life: 20,
                  })
                }
              }
              boss.vx = boss.facing * boss.speed * 0.5
              break
            case 'vampire': // 吸血型
              if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed
              else boss.vx = 0
              // 吸血特效
              if (Math.random() < 0.05) {
                boss.hp = Math.min(boss.maxHp, boss.hp + boss.drainAmount)
                for (let i = 0; i < 5; i++) {
                  particles.push({
                    x: boss.x + boss.size / 2,
                    y: boss.y + boss.size / 2,
                    vx: (Math.random() - 0.5) * 5,
                    vy: -Math.random() * 5,
                    color: '#8b0000',
                    size: Math.random() * 5 + 2,
                    life: 25,
                  })
                }
              }
              break
            case 'ultimate': // 终极型
              // 快速移动
              if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed
              else boss.vx = 0
              // 跳跃攻击
              if (Math.random() < 0.02 && boss.y >= H - 60 - boss.size) {
                boss.vy = -20
              }
              break
            default:
              if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed
          }

          // Boss射击
          if (boss.canShoot) {
            boss.attackTimer++
            const shootRate = boss.rageMode
              ? boss.shootRate * 0.5
              : boss.shootRate
            if (boss.attackTimer > shootRate) {
              // 普通射击
              createBossBullet(
                boss,
                player.x + player.w / 2,
                player.y + player.h / 2,
              )

              // 多重射击（终极Boss）
              if (boss.special === 'multishot') {
                for (let i = 1; i < boss.bulletCount; i++) {
                  const offsetY = (i % 2 === 0 ? 1 : -1) * i * 30
                  createBossBullet(
                    boss,
                    player.x + player.w / 2,
                    player.y + player.h / 2 + offsetY,
                  )
                }
              }

              boss.attackTimer = 0
            }
          }

          // Boss重力
          boss.vy += GRAVITY
          boss.x += boss.vx
          boss.y += boss.vy

          // Boss地面碰撞
          if (boss.y + boss.size > H - 60) {
            boss.y = H - 60 - boss.size
            boss.vy = 0
          }

          // Boss伤害玩家
          if (
            player.invincible <= 0 &&
            collides(
              { x: player.x, y: player.y, w: player.w, h: player.h },
              { x: boss.x, y: boss.y, w: boss.size, h: boss.size },
            )
          ) {
            player.hp -= boss.damage
            player.invincible = 60
            player.vx = -boss.facing * 15
            player.vy = -8
          }

          // Boss死亡
          if (boss.hp <= 0) {
            gold += boss.gold
            bossDefeated = true

            // 超大爆炸特效
            const centerX = boss.x + boss.size / 2
            const centerY = boss.y + boss.size / 2
            for (let i = 0; i < 20; i++) {
              const angle = Math.random() * Math.PI * 2
              const speed = Math.random() * 20 + 10
              particles.push({
                x: centerX,
                y: centerY,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 5,
                color: i % 2 === 0 ? boss.color : '#ff0000',
                size: Math.random() * 15 + 8,
                life: 80 + Math.random() * 40,
              })
            }

            // 大量掉落
            for (let i = 0; i < 5; i++) {
              createDrop(boss.x + Math.random() * boss.size, boss.y, 'gold')
              createDrop(boss.x + Math.random() * boss.size, boss.y, 'damage')
              createDrop(boss.x + Math.random() * boss.size, boss.y, 'speed')
            }
            createDrop(boss.x + boss.size / 2, boss.y, 'hp')

            boss = null
          }
        }
      }

      // 更新子弹
      function updateBullets() {
        bullets.forEach((b, idx) => {
          b.x += b.vx
          b.y += b.vy
          b.life--

          // 击中敌人 - 使用圆形碰撞
          enemies.forEach((e) => {
            if (
              circleHitsRect(b.x, b.y, b.size, {
                x: e.x,
                y: e.y,
                w: e.size,
                h: e.size,
              })
            ) {
              e.hp -= b.damage
              b.life = 0

              // 击中特效 - 简化
              for (let i = 0; i < 4; i++) {
                const angle = Math.random() * Math.PI * 2
                const speed = Math.random() * 6 + 3
                particles.push({
                  x: b.x,
                  y: b.y,
                  vx: Math.cos(angle) * speed,
                  vy: Math.sin(angle) * speed,
                  color: b.color,
                  size: Math.random() * 4 + 2,
                  life: 20 + Math.random() * 10,
                })
              }
            }
          })

          // 限制最大粒子数防止卡顿
          if (particles.length > 100) {
            particles = particles.slice(-100)
          }

          if (b.life <= 0 || b.x < cameraX - 50 || b.x > cameraX + W + 50) {
            bullets.splice(idx, 1)
          }
        })

        // 敌弹 - 可以被击碎
        enemyBullets.forEach((b, idx) => {
          b.x += b.vx
          b.y += b.vy
          if (!b.isBossBullet) b.vy += 0.05 // Boss子弹不下落
          b.life--

          // 玩家子弹击中敌弹 - 可以击碎
          bullets.forEach((pb, pbidx) => {
            const dist = Math.hypot(pb.x - b.x, pb.y - b.y)
            if (dist < pb.size + b.size) {
              b.life = 0
              pb.life = 0
              // 击碎特效
              for (let i = 0; i < 5; i++) {
                particles.push({
                  x: b.x,
                  y: b.y,
                  vx: (Math.random() - 0.5) * 10,
                  vy: (Math.random() - 0.5) * 10,
                  color: b.isBossBullet ? '#ff6600' : '#ffff00',
                  size: Math.random() * 5 + 2,
                  life: 20,
                })
              }
            }
          })

          // 敌弹伤害玩家
          if (
            player.invincible <= 0 &&
            pointInRect(b.x, b.y, {
              x: player.x,
              y: player.y,
              w: player.w,
              h: player.h,
            })
          ) {
            player.hp -= b.damage
            player.invincible = 60
            b.life = 0
          }

          if (b.life <= 0) {
            enemyBullets.splice(idx, 1)
          }
        })
      }

      // 更新掉落
      function updateDrops() {
        drops.forEach((d, idx) => {
          d.vy += 0.3
          d.y += d.vy
          d.life--

          if (d.y > H - 60) {
            d.y = H - 60
            d.vy = 0
          }

          // 收集
          const dist = Math.hypot(
            player.x + player.w / 2 - d.x,
            player.y + player.h / 2 - d.y,
          )
          if (dist < 50 && !d.collected) {
            d.collected = true

            switch (d.type) {
              case 'gold':
                gold += 10
                break
              case 'speed':
                player.attackSpeedBoost += 5 // 大幅增加攻速
                player.boostTimer = 400 // 更长持续时间
                break
              case 'damage':
                player.damageBoost += 0.5 // 大幅增加伤害
                player.boostTimer = 400
                break
              case 'hp':
                player.hp = Math.min(player.maxHp, player.hp + 30)
                break
            }

            drops.splice(idx, 1)
          }

          if (d.life <= 0) {
            drops.splice(idx, 1)
          }
        })
      }

      // 更新粒子
      function updateParticles() {
        particles.forEach((p, idx) => {
          p.x += p.vx
          p.y += p.vy
          p.vy += 0.1
          p.life--
          p.size *= 0.95

          if (p.life <= 0) {
            particles.splice(idx, 1)
          }
        })
      }

      // 更新相机
      function updateCamera() {
        const targetX = player.x - W * 0.3
        cameraX += (targetX - cameraX) * 0.1
        cameraX = Math.max(0, Math.min(levelWidth - W, cameraX))
      }

      // 桃花粒子系统
      const blossoms = []
      for (let i = 0; i < 30; i++) {
        blossoms.push({
          x: Math.random() * 3000,
          y: Math.random() * (H - 100),
          size: 3 + Math.random() * 4,
          speed: 0.5 + Math.random() * 1,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.02 + Math.random() * 0.02,
        })
      }

      // 云朵
      const clouds = []
      for (let i = 0; i < 5; i++) {
        clouds.push({
          x: Math.random() * 3000,
          y: 50 + Math.random() * 100,
          size: 40 + Math.random() * 60,
          speed: 0.1 + Math.random() * 0.2,
          opacity: 0.3 + Math.random() * 0.3,
        })
      }

      // 绘制背景 - 青山绿水
      function drawBackground() {
        const config = LEVELS[currentLevel - 1]
        const levelTheme = currentLevel % 4

        // 根据关卡设置不同主题
        let skyTop, skyBottom, mountainColors, treeColors

        switch (levelTheme) {
          case 0: // 桃花源
            skyTop = '#87CEEB'
            skyBottom = '#E0F6FF'
            mountainColors = ['#2E8B57', '#228B22', '#006400']
            treeColors = ['#FFB7C5', '#FF69B4', '#FF1493']
            break
          case 1: // 青山绿水
            skyTop = '#4A90D9'
            skyBottom = '#87CEEB'
            mountainColors = ['#1E5631', '#2E7D32', '#388E3C']
            treeColors = ['#90EE90', '#98FB98', '#00FA9A']
            break
          case 2: // 晚霞
            skyTop = '#FF6B6B'
            skyBottom = '#FEC89A'
            mountainColors = ['#6B4423', '#8B4513', '#A0522D']
            treeColors = ['#FFA07A', '#FF7F50', '#FF6347']
            break
          case 3: // 烟雨
            skyTop = '#708090'
            skyBottom = '#B0C4DE'
            mountainColors = ['#4A5568', '#5A6577', '#6A7588']
            treeColors = ['#D3D3D3', '#C0C0C0', '#A9A9A9']
            break
        }

        // 渐变天空
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7)
        skyGrad.addColorStop(0, skyTop)
        skyGrad.addColorStop(1, skyBottom)
        ctx.fillStyle = skyGrad
        ctx.fillRect(0, 0, W, H)

        // 远山（3层）
        for (let layer = 0; layer < 3; layer++) {
          ctx.fillStyle = mountainColors[layer] || mountainColors[0]
          ctx.beginPath()
          ctx.moveTo(0, H - 80 - layer * 40)

          for (let x = 0; x <= W; x += 30) {
            const worldX = x + cameraX * (0.1 + layer * 0.05)
            const h =
              Math.sin(worldX * 0.003 + layer) * 60 +
              Math.sin(worldX * 0.007 + layer * 2) * 30 +
              150 -
              layer * 30
            ctx.lineTo(x, H - h)
          }
          ctx.lineTo(W, H)
          ctx.lineTo(0, H)
          ctx.fill()
        }

        // 云朵
        clouds.forEach((cloud) => {
          const sx = cloud.x - cameraX * 0.3
          if (sx > -100 && sx < W + 100) {
            ctx.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`
            for (let i = 0; i < 4; i++) {
              ctx.beginPath()
              ctx.arc(
                sx + i * cloud.size * 0.3,
                cloud.y + Math.sin(i) * cloud.size * 0.2,
                cloud.size * 0.4,
                0,
                Math.PI * 2,
              )
              ctx.fill()
            }
          }
          // 移动云朵
          cloud.x += cloud.speed
          if (cloud.x > cameraX + W + 200) {
            cloud.x = cameraX - 200
          }
        })

        // 飘落的花瓣/桃花
        blossoms.forEach((blossom) => {
          const sx = blossom.x - cameraX
          if (sx > -50 && sx < W + 50) {
            const wobbleX =
              Math.sin(gameTime * blossom.wobbleSpeed + blossom.wobble) * 20
            ctx.fillStyle =
              treeColors[Math.floor(blossom.x / 500) % treeColors.length]
            ctx.shadowBlur = 5
            ctx.shadowColor = ctx.fillStyle

            // 画花瓣
            for (let p = 0; p < 5; p++) {
              const angle = (p * Math.PI * 2) / 5 + gameTime * 0.001
              ctx.beginPath()
              ctx.arc(
                sx + wobbleX + Math.cos(angle) * blossom.size,
                blossom.y + Math.sin(gameTime * 0.003 + blossom.wobble) * 5,
                blossom.size * 0.5,
                0,
                Math.PI * 2,
              )
              ctx.fill()
            }
          }

          // 移动花瓣
          blossom.y += blossom.speed
          if (blossom.y > H - 50) {
            blossom.y = -10
            blossom.x = cameraX + Math.random() * W
          }
        })
        ctx.shadowBlur = 0

        // 太阳/月亮
        const sunX = W - 100
        const sunY = 80
        const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 50)
        if (levelTheme === 2) {
          sunGrad.addColorStop(0, '#FFD700')
          sunGrad.addColorStop(0.5, '#FF6B6B')
          sunGrad.addColorStop(1, 'transparent')
        } else {
          sunGrad.addColorStop(0, '#FFE066')
          sunGrad.addColorStop(0.5, '#FFD700')
          sunGrad.addColorStop(1, 'transparent')
        }
        ctx.fillStyle = sunGrad
        ctx.beginPath()
        ctx.arc(sunX, sunY, 50, 0, Math.PI * 2)
        ctx.fill()
      }

      // 绘制地面 - 草地
      function drawGround() {
        const config = LEVELS[currentLevel - 1]
        const levelTheme = currentLevel % 4

        // 草地颜色
        const grassColors = ['#228B22', '#2E8B57', '#32CD32', '#3CB371']

        // 主地面 - 泥土
        const groundGrad = ctx.createLinearGradient(0, H - 60, 0, H)
        groundGrad.addColorStop(0, '#8B4513')
        groundGrad.addColorStop(0.3, '#654321')
        groundGrad.addColorStop(1, '#3E2723')
        ctx.fillStyle = groundGrad
        ctx.fillRect(0, H - 60, W, 60)

        // 草地层
        ctx.fillStyle = grassColors[levelTheme] || grassColors[0]
        for (let x = 0; x < W; x += 15) {
          const worldX = x + cameraX
          const h = 8 + Math.sin(worldX * 0.15) * 4 + Math.sin(worldX * 0.3) * 2
          ctx.beginPath()
          ctx.moveTo(x, H - 60)
          ctx.lineTo(x + 7, H - 60 - h)
          ctx.lineTo(x + 15, H - 60)
          ctx.fill()
        }

        // 小花装饰
        const flowerColors = [
          '#FF69B4',
          '#FFB6C1',
          '#FF1493',
          '#FFD700',
          '#87CEEB',
        ]
        for (let x = 0; x < W; x += 60) {
          const worldX = x + cameraX
          if ((worldX / 60) % 3 === 0) {
            ctx.fillStyle =
              flowerColors[Math.floor(worldX / 60) % flowerColors.length]
            ctx.beginPath()
            ctx.arc(x + 30, H - 60 - 3, 3, 0, Math.PI * 2)
            ctx.fill()
          }
        }

        // 河流/池塘效果
        ctx.fillStyle = 'rgba(30, 144, 255, 0.3)'
        const riverX = levelWidth * 0.3 - cameraX
        if (riverX > -200 && riverX < W + 200) {
          ctx.beginPath()
          ctx.ellipse(riverX, H - 30, 150, 15, 0, 0, Math.PI * 2)
          ctx.fill()
        }
      }

      // 绘制终点
      function drawGoal() {
        const sx = goalX - cameraX
        const config = LEVELS[currentLevel - 1]
        const hasBoss = !!config.boss
        const bossDefeatedOrNotSpawned = bossDefeated || !bossSpawned

        ctx.save()

        // 传送门效果 - 根据状态改变颜色
        let portalColor = '#f1c40f' // 默认金色
        let portalText = '终点'
        let portalTextColor = '#f1c40f'

        if (hasBoss && !bossDefeatedOrNotSpawned) {
          portalColor = '#e74c3c' // 红色-有Boss未击败
          portalText = '击败BOSS!'
          portalTextColor = '#e74c3c'
        } else if (bossDefeatedOrNotSpawned || !hasBoss) {
          portalColor = '#2ecc71' // 绿色-可以过关
          portalText = '过关!'
          portalTextColor = '#2ecc71'
        }

        // 外圈光环
        const gradient = ctx.createRadialGradient(
          sx,
          H - 100,
          0,
          sx,
          H - 100,
          80,
        )
        gradient.addColorStop(0, portalColor + 'cc')
        gradient.addColorStop(0.5, portalColor + '66')
        gradient.addColorStop(1, 'transparent')
        ctx.fillStyle = gradient
        ctx.beginPath()
        ctx.arc(sx, H - 100, 80, 0, Math.PI * 2)
        ctx.fill()

        // 旋转光环
        ctx.strokeStyle = portalColor
        ctx.lineWidth = 4
        ctx.shadowBlur = 25
        ctx.shadowColor = portalColor
        for (let i = 0; i < 4; i++) {
          const angle = Date.now() * 0.003 + i * ((Math.PI * 2) / 4)
          ctx.beginPath()
          ctx.arc(sx, H - 100, 50 + i * 8, angle, angle + Math.PI * 0.3)
          ctx.stroke()
        }

        // 中心
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(sx, H - 100, 20, 0, Math.PI * 2)
        ctx.fill()

        // 文字
        ctx.fillStyle = portalTextColor
        ctx.font = 'bold 18px sans-serif'
        ctx.textAlign = 'center'
        ctx.shadowColor = '#000'
        ctx.shadowBlur = 5
        ctx.fillText(portalText, sx, H - 170)

        // 箭头指示
        const arrowBob = Math.sin(Date.now() * 0.005) * 10
        ctx.fillStyle = portalTextColor
        ctx.beginPath()
        ctx.moveTo(sx, H - 150 + arrowBob)
        ctx.lineTo(sx - 15, H - 170 + arrowBob)
        ctx.lineTo(sx + 15, H - 170 + arrowBob)
        ctx.closePath()
        ctx.fill()

        ctx.restore()
      }

      // 绘制增益UI
      function drawBoostUI() {
        // 翠魔变身状态指示器
        ctx.save()
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.fillRect(W - 90, 10, 80, 35)
        ctx.strokeStyle = transformAvailable ? '#8b0000' : '#444'
        ctx.lineWidth = 2
        ctx.strokeRect(W - 90, 10, 80, 35)
        ctx.fillStyle = transformAvailable ? '#ff0000' : '#666'
        ctx.font = 'bold 12px sans-serif'
        ctx.textAlign = 'center'
        if (player.demonForm) {
          ctx.fillStyle = '#ff0000'
          ctx.fillText(`魔 ${Math.ceil(player.demonTimer / 60)}s`, W - 50, 32)
        } else {
          ctx.fillStyle = transformAvailable ? '#ff6666' : '#666'
          ctx.fillText('魔 ' + (transformAvailable ? '就绪' : '已用'), W - 50, 32)
        }
        ctx.restore()

        // 必杀技状态指示器
        const skillY = 50
        const skillSize = 28
        const skillGap = 35

        // 技能1 - 翠雨梨花针
        ctx.save()
        ctx.fillStyle = skill1Available ? 'rgba(255,0,102,0.8)' : 'rgba(100,100,100,0.8)'
        ctx.strokeStyle = skill1Available ? '#ff0066' : '#444'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.arc(10 + skillSize/2, skillY, skillSize/2, 0, Math.PI * 2)
        ctx.fill()
        ctx.stroke()
        ctx.fillStyle = '#fff'
        ctx.font = 'bold 14px sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('1', 10 + skillSize/2, skillY + 5)
        ctx.restore()

        // 技能2 - 亢翠有悔
        ctx.save()
        ctx.fillStyle = skill2Available ? 'rgba(255,215,0,0.8)' : 'rgba(100,100,100,0.8)'
        ctx.strokeStyle = skill2Available ? '#ffd700' : '#444'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.arc(10 + skillSize/2, skillY + skillGap, skillSize/2, 0, Math.PI * 2)
        ctx.fill()
        ctx.stroke()
        ctx.fillStyle = '#fff'
        ctx.font = 'bold 14px sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('2', 10 + skillSize/2, skillY + skillGap + 5)
        ctx.restore()

        // 技能3 - 五毒拍翠掌
        ctx.save()
        ctx.fillStyle = skill3Available ? 'rgba(0,255,0,0.8)' : 'rgba(100,100,100,0.8)'
        ctx.strokeStyle = skill3Available ? '#00ff00' : '#444'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.arc(10 + skillSize/2, skillY + skillGap * 2, skillSize/2, 0, Math.PI * 2)
        ctx.fill()
        ctx.stroke()
        ctx.fillStyle = '#fff'
        ctx.font = 'bold 14px sans-serif'
        ctx.textAlign = 'center'
        ctx.fillText('3', 10 + skillSize/2, skillY + skillGap * 2 + 5)
        ctx.restore()

        // 翻跟头冷却指示器
        if (player.rollCooldown > 0) {
          const rollReady = player.rollCooldown <= 0
          ctx.save()
          ctx.fillStyle = 'rgba(0,0,0,0.7)'
          ctx.fillRect(10, 175, 80, 20)
          ctx.strokeStyle = rollReady ? '#f1c40f' : '#666'
          ctx.lineWidth = 2
          ctx.strokeRect(10, 175, 80, 20)
          ctx.fillStyle = rollReady ? '#f1c40f' : '#888'
          ctx.font = '12px sans-serif'
          ctx.fillText(
            `⚡翻 ${rollReady ? '就绪' : Math.ceil(player.rollCooldown / 60) + 's'}`,
            15,
            190,
          )
          ctx.restore()
        }

        if (player.boostTimer <= 0) return

        ctx.save()
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        ctx.fillRect(10, 130, 120, 40)
        ctx.strokeStyle = '#f1c40f'
        ctx.lineWidth = 2
        ctx.strokeRect(10, 130, 120, 40)

        if (player.attackSpeedBoost > 0) {
          ctx.fillStyle = '#00d9ff'
          ctx.font = '12px sans-serif'
          ctx.fillText(`⚡ 攻速 +${player.attackSpeedBoost}`, 15, 148)
        }
        if (player.damageBoost > 0) {
          ctx.fillStyle = '#ff4757'
          ctx.font = '12px sans-serif'
          ctx.fillText(
            `⚔ 伤害 +${Math.floor(player.damageBoost * 100)}%`,
            15,
            163,
          )
        }

        // 倒计时条
        const barWidth = 100 * (player.boostTimer / 400)
        ctx.fillStyle = '#4CAF50'
        ctx.fillRect(15, 165, barWidth, 4)

        ctx.restore()
      }

      // 绘制平台
      function drawPlatforms() {
        platforms.forEach((p) => {
          const sx = p.x - cameraX

          // 平台主体
          ctx.fillStyle = '#5d4e37'
          ctx.fillRect(sx, p.y, p.w, p.h)

          // 平台顶
          ctx.fillStyle = '#7d6e57'
          ctx.fillRect(sx, p.y, p.w, 5)

          // 装饰
          ctx.fillStyle = '#4d3e27'
          ctx.fillRect(sx, p.y + p.h - 5, p.w, 5)
        })
      }

      // 绘制玩家
      function drawPlayer() {
        const sx = player.x - cameraX
        const sy = player.y
        const centerX = sx + player.w / 2
        const centerY = sy + player.h / 2

        // 绘制残影
        player.trailParticles.forEach((t) => {
          ctx.save()
          ctx.globalAlpha = t.alpha * 0.5
          ctx.fillStyle = '#f1c40f'
          ctx.beginPath()
          ctx.ellipse(
            t.x - cameraX + player.w / 2,
