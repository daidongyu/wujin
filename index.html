<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古风人物模型查看器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            text-align: center;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="loading">正在加载模型...</div>
    <div id="info">左键拖动: 旋转 | 右键拖动: 平移 | 滚轮: 缩放</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        let camera, scene, renderer, controls;
        let loadedModel = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 1;
            controls.maxDistance = 20;
            controls.target.set(0, 1, 0);

            setupLights();
            createGround();
            loadModel();

            window.addEventListener('resize', onWindowResize);
        }

        function setupLights() {
            // 环境光
            const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.5);
            scene.add(ambientLight);

            // 主光源
            const keyLight = new THREE.DirectionalLight(0xfff0dd, 1.3);
            keyLight.position.set(5, 10, 7);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            scene.add(keyLight);

            // 补光
            const fillLight = new THREE.DirectionalLight(0xe6f0ff, 0.5);
            fillLight.position.set(-5, 5, -5);
            scene.add(fillLight);

            // 背光
            const backLight = new THREE.DirectionalLight(0xffeedd, 0.4);
            backLight.position.set(0, 8, -10);
            scene.add(backLight);

            // 点光源增加层次
            const pointLight = new THREE.PointLight(0xffddaa, 0.4, 15);
            pointLight.position.set(3, 4, 3);
            scene.add(pointLight);
        }

        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(30, 30);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x3d2b1f,
                roughness: 0.9
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const gridHelper = new THREE.GridHelper(30, 30, 0x4a4a5a, 0x3a3a4a);
            scene.add(gridHelper);
        }

        function loadModel() {
            const loader = new FBXLoader();
            loader.load(
                './model.FBX',
                (object) => {
                    console.log('模型加载成功');
                    document.getElementById('loading').style.display = 'none';

                    loadedModel = object;

                    object.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;

                            if (child.material) {
                                applyGufengMaterial(child.material, child.name);
                            }
                        }
                    });

                    centerAndScale(object);
                    scene.add(object);

                    if (object.animations && object.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(object);
                        object.animations.forEach(clip => {
                            mixer.clipAction(clip).play();
                        });
                    }
                },
                (progress) => {
                    if (progress.total > 0) {
                        const percent = Math.round(progress.loaded / progress.total * 100);
                        document.getElementById('loading').textContent = `加载中... ${percent}%`;
                    }
                },
                (error) => {
                    console.error('加载错误:', error);
                    document.getElementById('loading').textContent = '加载失败';
                }
            );
        }

        function applyGufengMaterial(material, meshName = '') {
            material.side = THREE.DoubleSide;
            material.depthWrite = true;

            const name = (meshName + ' ' + (material.name || '')).toLowerCase();

            // 古风鲜艳配色预设
            if (name.includes('skin') || name.includes('body') || name.includes('face') ||
                name.includes('head') || name.includes('flesh') || name.includes('arm') ||
                name.includes('leg')) {
                // 肤色 - 粉嫩
                material.color = new THREE.Color(0xfcd5ce);
                material.roughness = 0.5;
                material.metalness = 0.0;
                material.emissive = new THREE.Color(0x220a00);
            }
            else if (name.includes('hair')) {
                // 头发 - 黑色
                material.color = new THREE.Color(0x1a1a1a);
                material.roughness = 0.6;
                material.metalness = 0.1;
            }
            else if (name.includes('cloth') || name.includes('dress') || name.includes('sleeve') ||
                     name.includes('skirt') || name.includes('coat') || name.includes('gown')) {
                // 服装 - 中国红
                material.color = new THREE.Color(0xc41e3a);
                material.roughness = 0.6;
                material.metalness = 0.05;
                material.emissive = new THREE.Color(0x330500);
            }
            else if (name.includes('accent') || name.includes('trim') || name.includes('ribbon') ||
                     name.includes('belt') || name.includes('collar') || name.includes('edge')) {
                // 装饰 - 金色
                material.color = new THREE.Color(0xdaa520);
                material.roughness = 0.3;
                material.metalness = 0.6;
                material.emissive = new THREE.Color(0x110800);
            }
            else if (name.includes('eye') || name.includes('pupil')) {
                // 眼睛 - 棕色
                material.color = new THREE.Color(0x4a3728);
                material.roughness = 0.3;
                material.metalness = 0.0;
                material.emissive = new THREE.Color(0x110500);
            }
            else if (name.includes('shoe') || name.includes('boot')) {
                // 鞋
                material.color = new THREE.Color(0x2a1a0a);
                material.roughness = 0.7;
            }
            else if (name.includes('lip') || name.includes('mouth')) {
                // 嘴唇 - 红色
                material.color = new THREE.Color(0xb22222);
                material.roughness = 0.3;
                material.metalness = 0.0;
            }
            else {
                // 默认：根据亮度判断
                const lum = material.color ? material.color.getLuminance() : 0.5;
                if (lum < 0.15) {
                    // 深色 → 头发
                    material.color = new THREE.Color(0x2a1a1a);
                    material.roughness = 0.7;
                } else if (lum > 0.8) {
                    // 亮色 → 肤色
                    material.color = new THREE.Color(0xfcd5ce);
                    material.roughness = 0.5;
                } else {
                    // 中间色 → 服装
                    material.color = new THREE.Color(0xc41e3a);
                    material.roughness = 0.6;
                    material.emissive = new THREE.Color(0x330500);
                }
            }

            if (!material.emissive) {
                material.emissive = new THREE.Color(0x000000);
            }
        }

        function centerAndScale(object) {
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim;
            object.scale.set(scale, scale, scale);

            box.setFromObject(object);
            object.position.x = -box.getCenter(new THREE.Vector3()).x;
            object.position.z = -box.getCenter(new THREE.Vector3()).z;
            object.position.y = -box.min.y;

            controls.target.set(0, size.y * scale / 2, 0);
            camera.position.set(0, size.y * scale / 2 + 1, maxDim * scale + 3);
            controls.update();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
