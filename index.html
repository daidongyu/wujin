        // 生成敌人
        let lastSpawn = 0;
        function spawnEnemy() {
            const config = LEVELS[currentLevel - 1];
            const difficulty = config.difficultyMultiplier || 1;

            // Boss生成 - 当普通敌人击杀足够后出现
            if (config.boss && !bossSpawned && enemies.length < 3) {
                const bossTemplate = BOSSES[config.boss];
                boss = {
                    type: config.boss,
                    x: cameraX + W + 300,
                    y: H - 60 - bossTemplate.size,
                    ...bossTemplate,
                    maxHp: bossTemplate.hp * difficulty,
                    hp: bossTemplate.hp * difficulty,
                    vx: 0,
                    vy: 0,
                    attackTimer: 0,
                    facing: -1,
                    isBoss: true,
                    phase: 0, // Boss阶段
                    rageMode: false // 狂暴模式
                };
                bossSpawned = true;
                bossDefeated = false;

                // Boss出现特效
                for (let i = 0; i < 50; i++) {
                    particles.push({
                        x: boss.x + boss.size/2,
                        y: boss.y + boss.size/2,
                        vx: (Math.random() - 0.5) * 20,
                        vy: (Math.random() - 0.5) * 20,
                        color: boss.color,
                        size: Math.random() * 15 + 5,
                        life: 60
                    });
                }
                return;
            }

            if (enemies.length < config.enemyCount && Date.now() - lastSpawn > config.spawnRate) {
                const type = config.enemyTypes[Math.floor(Math.random() * config.enemyTypes.length)];
                const template = ENEMIES[type];
                enemies.push({
                    type,
                    x: cameraX + W + 100 + Math.random() * 200,
                    y: H - 60 - template.size,
                    ...template,
                    maxHp: template.hp * difficulty * (1 + currentLevel * 0.05),
                    hp: template.hp * difficulty * (1 + currentLevel * 0.05),
                    vx: 0,
                    vy: 0,
                    attackTimer: 0,
                    facing: -1
                });
                lastSpawn = Date.now();
            }
        }

        // 创建子弹
        function createBullet(x, y, dir, skill) {
            const s = SKILLS[skill];
            const damageBoost = player.damageBoost > 0 ? 1 + player.damageBoost : 1;

            bullets.push({
                x, y,
                vx: dir * s.speed,
                vy: 0,
                ...s,
                damage: s.damage * damageBoost, // 应用伤害加成
                life: 100,
                fromPlayer: true
            });

            // 发射炫酷粒子特效
            for (let i = 0; i < 6; i++) {
                const angle = (Math.random() - 0.5) * 1.5;
                const speed = Math.random() * 8 + 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed * dir,
                    vy: Math.sin(angle) * speed - Math.random() * 3,
                    color: s.bulletColor,
                    size: Math.random() * 6 + 3,
                    life: 30 + Math.random() * 20
                });
            }

            // 额外特效 - 能量波纹
            for (let i = 0; i < 4; i++) {
                const angle = (i / 8) * Math.PI * 2;
                particles.push({
                    x: x + Math.cos(angle) * 20,
                    y: y + Math.sin(angle) * 20,
                    vx: Math.cos(angle) * 2,
                    vy: Math.sin(angle) * 2,
                    color: '#ffffff',
                    size: Math.random() * 3 + 1,
                    life: 15
                });
            }
        }

        // 创建敌人子弹
        function createEnemyBullet(enemy) {
            const dir = enemy.facing;
            enemyBullets.push({
                x: enemy.x + enemy.size/2,
                y: enemy.y + enemy.size/3,
                vx: dir * 6,
                vy: -2,
                color: enemy.color,
                size: 8,
                damage: enemy.damage || 15,
                life: 150,
                isBossBullet: false
            });
        }

        // Boss子弹 - 更大更强
        function createBossBullet(boss, targetX, targetY) {
            const bossCenterX = boss.x + boss.size/2;
            const bossCenterY = boss.y + boss.size/3;
            const angle = Math.atan2(targetY - bossCenterY, targetX - bossCenterX);

            enemyBullets.push({
                x: bossCenterX,
                y: bossCenterY,
                vx: Math.cos(angle) * boss.bulletSpeed,
                vy: Math.sin(angle) * boss.bulletSpeed,
                color: boss.color,
                size: 15, // 更大的子弹
                damage: boss.bulletDamage,
                life: 200,
                isBossBullet: true // 标记为Boss子弹
            });

            // 发射特效
            for (let i = 0; i < 4; i++) {
                particles.push({
                    x: bossCenterX,
                    y: bossCenterY,
                    vx: Math.cos(angle + (Math.random() - 0.5)) * 5,
                    vy: Math.sin(angle + (Math.random() - 0.5)) * 5,
                    color: boss.color,
                    size: Math.random() * 5 + 2,
                    life: 15
                });
            }
        }

        // 创建掉落物
        function createDrop(x, y, type) {
            const types = ['gold', 'speed', 'damage', 'hp'];
            drops.push({
                x, y,
                vy: -5,
                type: type || types[Math.floor(Math.random() * types.length)],
                life: 300,
                collected: false
            });
        }

        // 碰撞检测
        function collides(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function pointInRect(px, py, r) {
            return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
        }

        // 圆形碰撞检测 - 用于子弹击中敌人
        function circleHitsRect(cx, cy, radius, r) {
            const closestX = Math.max(r.x, Math.min(cx, r.x + r.w));
            const closestY = Math.max(r.y, Math.min(cy, r.y + r.h));
            const dx = cx - closestX;
            const dy = cy - closestY;
            return (dx * dx + dy * dy) < (radius * radius);
        }

        // 更新玩家
        function updatePlayer() {
            // 移动
            player.vx = 0;
            if (keys['a'] || keys['arrowleft']) {
                player.vx = -player.speed;
                player.facing = -1;
            }
            if (keys['d'] || keys['arrowright']) {
                player.vx = player.speed;
                player.facing = 1;
            }

            // 下蹲
            player.crouching = (keys['s'] || keys['arrowdown']) && player.grounded;
            if (player.crouching) player.vx *= 0.3;

            // 跳跃
            if ((keys[' '] || keys['w'] || keys['arrowup']) && player.grounded && !player.crouching && !player.rolling) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            // 翻跟头 - 快速闪避 (按L键)
            if ((keys['l']) && player.rollCooldown <= 0 && !player.rolling && player.grounded) {
                player.rolling = true;
                player.rollTimer = 15;
                player.rollCooldown = 40;
                player.invincible = 15;
                player.vx = player.facing * 18;
            }

            // 翻跟头状态处理
            if (player.rolling) {
                player.rollTimer--;
                if (player.rollTimer % 3 === 0) {
                    player.trailParticles.push({ x: player.x, y: player.y, alpha: 0.6 });
                }
                if (player.rollTimer <= 0) {
                    player.rolling = false;
                }
            }

            // 残影粒子衰减
            player.trailParticles = player.trailParticles.filter(t => {
                t.alpha -= 0.08;
                return t.alpha > 0;
            });

            // 攻击
            const speedBoost = player.attackSpeedBoost > 0 ? Math.max(5, 15 - player.attackSpeedBoost) : 15;
            if ((keys['j']) && player.attackCooldown <= 0) {
                createBullet(
                    player.x + player.w/2 + player.facing * 30,
                    player.y + player.h/2 - 10,
                    player.facing,
                    player.currentSkill
                );
                player.attackCooldown = speedBoost;
            }

            // 技能攻击
            if ((keys['k']) && player.skillCooldown <= 0) {
                const s = SKILLS[player.currentSkill];
                const damageBoost = player.damageBoost > 0 ? 1 + player.damageBoost : 1;
                // 发射多发子弹
                for (let i = -1; i <= 1; i++) {
                    bullets.push({
                        x: player.x + player.w/2,
                        y: player.y + player.h/2 - 10,
                        vx: player.facing * s.speed * 0.8,
                        vy: i * 3,
                        ...s,
                        damage: s.damage * damageBoost,
                        life: 80
                    });
                }
                player.skillCooldown = Math.max(30, 60 - player.attackSpeedBoost);
            }

            // 冷却
            if (player.attackCooldown > 0) player.attackCooldown--;
            if (player.skillCooldown > 0) player.skillCooldown--;
            if (player.rollCooldown > 0) player.rollCooldown--;
            if (player.invincible > 0) player.invincible--;

            // 重力
            player.vy += GRAVITY;

            // 移动
            player.x += player.vx;
            player.y += player.vy;

            // 地面碰撞
            player.grounded = false;
            const groundY = H - 60;

            if (player.y + player.h > groundY) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.grounded = true;
            }

            // 平台碰撞
            platforms.forEach(p => {
                if (p.type === 'moving') {
                    p.x = p.ox + Math.sin(Date.now() * 0.002 * p.moveSpeed) * 50;
                }

                if (player.vy >= 0 &&
                    player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
            });

            // 边界
            player.x = Math.max(cameraX, Math.min(levelWidth, player.x));

            // 动画
            if (Math.abs(player.vx) > 0) player.animation += 0.2;
        }

        // 更新敌人
        function updateEnemies() {
            enemies.forEach((e, idx) => {
                // AI行为
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                e.facing = dx > 0 ? 1 : -1;

                switch(e.pattern) {
                    case 'chase':
                        if (Math.abs(dx) > 100) e.vx = e.facing * e.speed;
                        else e.vx = 0;
                        break;
                    case 'patrol':
                        e.vx = e.facing * e.speed;
                        if (Math.random() < 0.02) e.facing *= -1;
                        break;
                    case 'shoot':
                        e.vx = Math.abs(dx) > 200 ? e.facing * e.speed : 0;
                        e.attackTimer++;
                        if (e.attackTimer > 90) {
                            createEnemyBullet(e);
                            e.attackTimer = 0;
                        }
                        break;
                    case 'boss':
                        if (Math.abs(dx) > 150) e.vx = e.facing * e.speed;
                        else e.vx = 0;
                        e.attackTimer++;
                        if (e.attackTimer > 60) {
                            createEnemyBullet(e);
                            if (currentLevel >= 18) createEnemyBullet(e);
                            e.attackTimer = 0;
                        }
                        break;
                }

                // 重力
                e.vy += GRAVITY;
                e.x += e.vx;
                e.y += e.vy;

                // 地面
                if (e.y + e.size > H - 60) {
                    e.y = H - 60 - e.size;
                    e.vy = 0;
                }

                // 平台
                platforms.forEach(p => {
                    if (e.vy >= 0 &&
                        e.x + (e.size || 40) > p.x && e.x < p.x + p.w &&
                        e.y + (e.size || 40) > p.y && e.y + (e.size || 40) < p.y + p.h + 20) {
                        e.y = p.y - (e.size || 40);
                        e.vy = 0;
                    }
                });

                // 伤害玩家
                if (player.invincible <= 0 && collides(
                    {x: player.x, y: player.y, w: player.w, h: player.h},
                    {x: e.x, y: e.y, w: e.size || 40, h: e.size || 40}
                )) {
                    player.hp -= e.damage;
                    player.invincible = 60;
                    player.vx = -player.facing * 10;
                    player.vy = -5;
                }

                // 死亡 - 炫酷爆炸特效
                if (e.hp <= 0) {
                    gold += e.gold;
                    levelKills++; // 增加击杀计数
                    createDrop(e.x, e.y, 'gold');
                    if (Math.random() < 0.25) createDrop(e.x, e.y, 'speed');
                    if (Math.random() < 0.25) createDrop(e.x, e.y, 'damage');
                    if (Math.random() < 0.3) createDrop(e.x, e.y, 'hp');

                    const centerX = e.x + e.size/2;
                    const centerY = e.y + e.size/2;

                    // 大爆炸粒子
                    for (let i = 0; i < 10; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 15 + 8;
                        particles.push({
                            x: centerX,
                            y: centerY,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 3,
                            color: e.color,
                            size: Math.random() * 10 + 5,
                            life: 50 + Math.random() * 30
                        });
                    }

                    // 白色闪光粒子
                    for (let i = 0; i < 5; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 8 + 3;
                        particles.push({
                            x: centerX,
                            y: centerY,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            color: '#ffffff',
                            size: Math.random() * 6 + 3,
                            life: 25
                        });
                    }

                    // 冲击波
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        particles.push({
                            x: centerX + Math.cos(angle) * 20,
                            y: centerY + Math.sin(angle) * 20,
                            vx: Math.cos(angle) * 6,
                            vy: Math.sin(angle) * 6,
                            color: e.color,
                            size: Math.random() * 8 + 4,
                            life: 30
                        });
                    }

                    enemies.splice(idx, 1);
                }
            });

            // 更新Boss
            if (boss && boss.hp > 0) {
                const dx = player.x - boss.x;
                const dy = player.y - boss.y;
                boss.facing = dx > 0 ? 1 : -1;

                // Boss狂暴模式 - 低血量时
                if (boss.hp < boss.maxHp * 0.3 && !boss.rageMode) {
                    boss.rageMode = true;
                    boss.speed *= 1.5;
                    // 狂暴特效
                    for (let i = 0; i < 8; i++) {
                        particles.push({
                            x: boss.x + boss.size/2,
                            y: boss.y + boss.size/2,
                            vx: (Math.random() - 0.5) * 15,
                            vy: (Math.random() - 0.5) * 15,
                            color: '#ff0000',
                            size: Math.random() * 10 + 5,
                            life: 40
                        });
                    }
                }

                // Boss AI
                switch(boss.pattern) {
                    case 'berserker': // 狂暴型
                        if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed;
                        else boss.vx = 0;
                        break;
                    case 'teleport': // 瞬移型
                        if (Math.random() < 0.01) {
                            // 瞬移到玩家附近
                            boss.x = player.x + (Math.random() - 0.5) * 400;
                            boss.y = H - 60 - boss.size;
                            // 瞬移特效
                            for (let i = 0; i < 5; i++) {
                                particles.push({
                                    x: boss.x + boss.size/2,
                                    y: boss.y + boss.size/2,
                                    vx: (Math.random() - 0.5) * 10,
                                    vy: (Math.random() - 0.5) * 10,
                                    color: '#ff00ff',
                                    size: Math.random() * 8 + 3,
                                    life: 20
                                });
                            }
                        }
                        boss.vx = boss.facing * boss.speed * 0.5;
                        break;
                    case 'vampire': // 吸血型
                        if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed;
                        else boss.vx = 0;
                        // 吸血特效
                        if (Math.random() < 0.05) {
                            boss.hp = Math.min(boss.maxHp, boss.hp + boss.drainAmount);
                            for (let i = 0; i < 5; i++) {
                                particles.push({
                                    x: boss.x + boss.size/2,
                                    y: boss.y + boss.size/2,
                                    vx: (Math.random() - 0.5) * 5,
                                    vy: -Math.random() * 5,
                                    color: '#8b0000',
                                    size: Math.random() * 5 + 2,
                                    life: 25
                                });
                            }
                        }
                        break;
                    case 'ultimate': // 终极型
                        // 快速移动
                        if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed;
                        else boss.vx = 0;
                        // 跳跃攻击
                        if (Math.random() < 0.02 && boss.y >= H - 60 - boss.size) {
                            boss.vy = -20;
                        }
                        break;
                    default:
                        if (Math.abs(dx) > boss.size) boss.vx = boss.facing * boss.speed;
                }

                // Boss射击
                if (boss.canShoot) {
                    boss.attackTimer++;
                    const shootRate = boss.rageMode ? boss.shootRate * 0.5 : boss.shootRate;
                    if (boss.attackTimer > shootRate) {
                        // 普通射击
                        createBossBullet(boss, player.x + player.w/2, player.y + player.h/2);

                        // 多重射击（终极Boss）
                        if (boss.special === 'multishot') {
                            for (let i = 1; i < boss.bulletCount; i++) {
                                const offsetY = (i % 2 === 0 ? 1 : -1) * i * 30;
                                createBossBullet(boss, player.x + player.w/2, player.y + player.h/2 + offsetY);
                            }
                        }

                        boss.attackTimer = 0;
                    }
                }

                // Boss重力
                boss.vy += GRAVITY;
                boss.x += boss.vx;
                boss.y += boss.vy;

                // Boss地面碰撞
                if (boss.y + boss.size > H - 60) {
                    boss.y = H - 60 - boss.size;
                    boss.vy = 0;
                }

                // Boss伤害玩家
                if (player.invincible <= 0 && collides(
                    {x: player.x, y: player.y, w: player.w, h: player.h},
                    {x: boss.x, y: boss.y, w: boss.size, h: boss.size}
                )) {
                    player.hp -= boss.damage;
                    player.invincible = 60;
                    player.vx = -boss.facing * 15;
                    player.vy = -8;
                }

                // Boss死亡
                if (boss.hp <= 0) {
                    gold += boss.gold;
                    bossDefeated = true;

                    // 超大爆炸特效
                    const centerX = boss.x + boss.size/2;
                    const centerY = boss.y + boss.size/2;
                    for (let i = 0; i < 20; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 20 + 10;
                        particles.push({
                            x: centerX,
                            y: centerY,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 5,
                            color: i % 2 === 0 ? boss.color : '#ff0000',
                            size: Math.random() * 15 + 8,
                            life: 80 + Math.random() * 40
                        });
                    }

                    // 大量掉落
                    for (let i = 0; i < 5; i++) {
                        createDrop(boss.x + Math.random() * boss.size, boss.y, 'gold');
                        createDrop(boss.x + Math.random() * boss.size, boss.y, 'damage');
                        createDrop(boss.x + Math.random() * boss.size, boss.y, 'speed');
                    }
                    createDrop(boss.x + boss.size/2, boss.y, 'hp');

                    boss = null;
                }
            }
        }

        // 更新子弹
        function updateBullets() {
            bullets.forEach((b, idx) => {
                b.x += b.vx;
                b.y += b.vy;
                b.life--;

                // 击中敌人 - 使用圆形碰撞
                enemies.forEach(e => {
                    if (circleHitsRect(b.x, b.y, b.size, {x: e.x, y: e.y, w: e.size, h: e.size})) {
                        e.hp -= b.damage;
                        b.life = 0;

                        // 击中炫酷特效
                        for (let i = 0; i < 8; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            const speed = Math.random() * 10 + 5;
                            particles.push({
                                x: b.x,
                                y: b.y,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                color: b.bulletColor,
                                size: Math.random() * 8 + 4,
                                life: 40 + Math.random() * 20
                            });
                        }

                        // 冲击波特效
                        for (let i = 0; i < 4; i++) {
                            const angle = (i / 4) * Math.PI * 2;
                            particles.push({
                                x: b.x + Math.cos(angle) * 10,
                                y: b.y + Math.sin(angle) * 10,
                                vx: Math.cos(angle) * 8,
                                vy: Math.sin(angle) * 8,
                                color: '#ffffff',
                                size: Math.random() * 4 + 2,
                                life: 20
                            });
                        }

                        // 雷电链式效果
                        if (b.chain) {
                            enemies.forEach(e2 => {
                                if (e2 !== e && Math.abs(e2.x - e.x) < 150) {
                                    e2.hp -= b.damage * 0.5;
                                    // 链式闪电特效
                                    for (let i = 0; i < 4; i++) {
                                        particles.push({
                                            x: (e.x + e2.x) / 2,
                                            y: (e.y + e2.y) / 2,
                                            vx: (Math.random() - 0.5) * 10,
                                            vy: (Math.random() - 0.5) * 10,
                                            color: '#ffff00',
                                            size: Math.random() * 5 + 2,
                                            life: 15
                                        });
                                    }
                                }
                            });
                        }

                        // 冰霜减速特效
                        if (b.freeze) {
                            e.speed *= 0.5;
                            for (let i = 0; i < 5; i++) {
                                particles.push({
                                    x: e.x + e.size/2,
                                    y: e.y + e.size/2,
                                    vx: (Math.random() - 0.5) * 5,
                                    vy: -Math.random() * 5,
                                    color: '#00ffff',
                                    size: Math.random() * 6 + 2,
                                    life: 40
                                });
                            }
                            setTimeout(() => e.speed /= 0.5, 2000);
                        }
                    }
                });

                if (b.life <= 0 || b.x < cameraX - 50 || b.x > cameraX + W + 50) {
                    bullets.splice(idx, 1);
                }
            });

            // 敌弹 - 可以被击碎
            enemyBullets.forEach((b, idx) => {
                b.x += b.vx;
                b.y += b.vy;
                if (!b.isBossBullet) b.vy += 0.05; // Boss子弹不下落
                b.life--;

                // 玩家子弹击中敌弹 - 可以击碎
                bullets.forEach((pb, pbidx) => {
                    const dist = Math.hypot(pb.x - b.x, pb.y - b.y);
                    if (dist < pb.size + b.size) {
                        b.life = 0;
                        pb.life = 0;
                        // 击碎特效
                        for (let i = 0; i < 5; i++) {
                            particles.push({
                                x: b.x,
                                y: b.y,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                color: b.isBossBullet ? '#ff6600' : '#ffff00',
                                size: Math.random() * 5 + 2,
                                life: 20
                            });
                        }
                    }
                });

                // 敌弹伤害玩家
                if (player.invincible <= 0 && pointInRect(b.x, b.y, {x: player.x, y: player.y, w: player.w, h: player.h})) {
                    player.hp -= b.damage;
                    player.invincible = 60;
                    b.life = 0;
                }

                if (b.life <= 0) {
                    enemyBullets.splice(idx, 1);
                }
            });
        }

        // 更新掉落
        function updateDrops() {
            drops.forEach((d, idx) => {
                d.vy += 0.3;
                d.y += d.vy;
                d.life--;

                if (d.y > H - 60) {
                    d.y = H - 60;
                    d.vy = 0;
                }

                // 收集
                const dist = Math.hypot(player.x + player.w/2 - d.x, player.y + player.h/2 - d.y);
                if (dist < 50 && !d.collected) {
                    d.collected = true;

                    switch(d.type) {
                        case 'gold':
                            gold += 10;
                            break;
                        case 'speed':
                            player.attackSpeedBoost += 5; // 大幅增加攻速
                            player.boostTimer = 400; // 更长持续时间
                            break;
                        case 'damage':
                            player.damageBoost += 0.5; // 大幅增加伤害
                            player.boostTimer = 400;
                            break;
                        case 'hp':
                            player.hp = Math.min(player.maxHp, player.hp + 30);
                            break;
                    }

                    drops.splice(idx, 1);
                }

                if (d.life <= 0) {
                    drops.splice(idx, 1);
                }
            });
        }

        // 更新粒子
        function updateParticles() {
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                p.size *= 0.95;

                if (p.life <= 0) {
                    particles.splice(idx, 1);
                }
            });
        }

        // 更新相机
        function updateCamera() {
            const targetX = player.x - W * 0.3;
            cameraX += (targetX - cameraX) * 0.1;
            cameraX = Math.max(0, Math.min(levelWidth - W, cameraX));
        }

        // 桃花粒子系统
        const blossoms = [];
        for (let i = 0; i < 30; i++) {
            blossoms.push({
                x: Math.random() * 3000,
                y: Math.random() * (H - 100),
                size: 3 + Math.random() * 4,
                speed: 0.5 + Math.random() * 1,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.02
            });
        }

        // 云朵
        const clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * 3000,
                y: 50 + Math.random() * 100,
                size: 40 + Math.random() * 60,
                speed: 0.1 + Math.random() * 0.2,
                opacity: 0.3 + Math.random() * 0.3
            });
        }

        // 绘制背景 - 青山绿水
        function drawBackground() {
            const config = LEVELS[currentLevel - 1];
            const levelTheme = currentLevel % 4;

            // 根据关卡设置不同主题
            let skyTop, skyBottom, mountainColors, treeColors;

            switch(levelTheme) {
                case 0: // 桃花源
                    skyTop = '#87CEEB';
                    skyBottom = '#E0F6FF';
                    mountainColors = ['#2E8B57', '#228B22', '#006400'];
                    treeColors = ['#FFB7C5', '#FF69B4', '#FF1493'];
                    break;
                case 1: // 青山绿水
                    skyTop = '#4A90D9';
                    skyBottom = '#87CEEB';
                    mountainColors = ['#1E5631', '#2E7D32', '#388E3C'];
                    treeColors = ['#90EE90', '#98FB98', '#00FA9A'];
                    break;
                case 2: // 晚霞
                    skyTop = '#FF6B6B';
                    skyBottom = '#FEC89A';
                    mountainColors = ['#6B4423', '#8B4513', '#A0522D'];
                    treeColors = ['#FFA07A', '#FF7F50', '#FF6347'];
                    break;
                case 3: // 烟雨
                    skyTop = '#708090';
                    skyBottom = '#B0C4DE';
                    mountainColors = ['#4A5568', '#5A6577', '#6A7588'];
                    treeColors = ['#D3D3D3', '#C0C0C0', '#A9A9A9'];
                    break;
            }

            // 渐变天空
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
            skyGrad.addColorStop(0, skyTop);
            skyGrad.addColorStop(1, skyBottom);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // 远山（3层）
            for (let layer = 0; layer < 3; layer++) {
                ctx.fillStyle = mountainColors[layer] || mountainColors[0];
                ctx.beginPath();
                ctx.moveTo(0, H - 80 - layer * 40);

                for (let x = 0; x <= W; x += 30) {
                    const worldX = x + cameraX * (0.1 + layer * 0.05);
                    const h = Math.sin(worldX * 0.003 + layer) * 60 +
                              Math.sin(worldX * 0.007 + layer * 2) * 30 +
                              150 - layer * 30;
                    ctx.lineTo(x, H - h);
                }
                ctx.lineTo(W, H);
                ctx.lineTo(0, H);
                ctx.fill();
            }

            // 云朵
            clouds.forEach(cloud => {
                const sx = cloud.x - cameraX * 0.3;
                if (sx > -100 && sx < W + 100) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`;
                    for (let i = 0; i < 4; i++) {
                        ctx.beginPath();
                        ctx.arc(sx + i * cloud.size * 0.3, cloud.y + Math.sin(i) * cloud.size * 0.2, cloud.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                // 移动云朵
                cloud.x += cloud.speed;
                if (cloud.x > cameraX + W + 200) {
                    cloud.x = cameraX - 200;
                }
            });

            // 飘落的花瓣/桃花
            blossoms.forEach(blossom => {
                const sx = blossom.x - cameraX;
                if (sx > -50 && sx < W + 50) {
                    const wobbleX = Math.sin(gameTime * blossom.wobbleSpeed + blossom.wobble) * 20;
                    ctx.fillStyle = treeColors[Math.floor(blossom.x / 500) % treeColors.length];
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = ctx.fillStyle;

                    // 画花瓣
                    for (let p = 0; p < 5; p++) {
                        const angle = p * Math.PI * 2 / 5 + gameTime * 0.001;
                        ctx.beginPath();
                        ctx.arc(sx + wobbleX + Math.cos(angle) * blossom.size, blossom.y + Math.sin(gameTime * 0.003 + blossom.wobble) * 5, blossom.size * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // 移动花瓣
                blossom.y += blossom.speed;
                if (blossom.y > H - 50) {
                    blossom.y = -10;
                    blossom.x = cameraX + Math.random() * W;
                }
            });
            ctx.shadowBlur = 0;

            // 太阳/月亮
            const sunX = W - 100;
            const sunY = 80;
            const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 50);
            if (levelTheme === 2) {
                sunGrad.addColorStop(0, '#FFD700');
                sunGrad.addColorStop(0.5, '#FF6B6B');
                sunGrad.addColorStop(1, 'transparent');
            } else {
                sunGrad.addColorStop(0, '#FFE066');
                sunGrad.addColorStop(0.5, '#FFD700');
                sunGrad.addColorStop(1, 'transparent');
            }
            ctx.fillStyle = sunGrad;
            ctx.beginPath();
            ctx.arc(sunX, sunY, 50, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制地面 - 草地
        function drawGround() {
            const config = LEVELS[currentLevel - 1];
            const levelTheme = currentLevel % 4;

            // 草地颜色
            const grassColors = ['#228B22', '#2E8B57', '#32CD32', '#3CB371'];

            // 主地面 - 泥土
            const groundGrad = ctx.createLinearGradient(0, H - 60, 0, H);
            groundGrad.addColorStop(0, '#8B4513');
            groundGrad.addColorStop(0.3, '#654321');
            groundGrad.addColorStop(1, '#3E2723');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, H - 60, W, 60);

            // 草地层
            ctx.fillStyle = grassColors[levelTheme] || grassColors[0];
            for (let x = 0; x < W; x += 15) {
                const worldX = x + cameraX;
                const h = 8 + Math.sin(worldX * 0.15) * 4 + Math.sin(worldX * 0.3) * 2;
                ctx.beginPath();
                ctx.moveTo(x, H - 60);
                ctx.lineTo(x + 7, H - 60 - h);
                ctx.lineTo(x + 15, H - 60);
                ctx.fill();
            }

            // 小花装饰
            const flowerColors = ['#FF69B4', '#FFB6C1', '#FF1493', '#FFD700', '#87CEEB'];
            for (let x = 0; x < W; x += 60) {
                const worldX = x + cameraX;
                if ((worldX / 60) % 3 === 0) {
                    ctx.fillStyle = flowerColors[Math.floor(worldX / 60) % flowerColors.length];
                    ctx.beginPath();
                    ctx.arc(x + 30, H - 60 - 3, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 河流/池塘效果
            ctx.fillStyle = 'rgba(30, 144, 255, 0.3)';
            const riverX = (levelWidth * 0.3 - cameraX);
            if (riverX > -200 && riverX < W + 200) {
                ctx.beginPath();
                ctx.ellipse(riverX, H - 30, 150, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 绘制终点
        function drawGoal() {
            const sx = goalX - cameraX;
            const config = LEVELS[currentLevel - 1];
            const hasBoss = !!config.boss;
            const bossDefeatedOrNotSpawned = bossDefeated || !bossSpawned;

            ctx.save();

            // 传送门效果 - 根据状态改变颜色
            let portalColor = '#f1c40f'; // 默认金色
            let portalText = '终点';
            let portalTextColor = '#f1c40f';

            if (hasBoss && !bossDefeatedOrNotSpawned) {
                portalColor = '#e74c3c'; // 红色-有Boss未击败
                portalText = '击败BOSS!';
                portalTextColor = '#e74c3c';
            } else if (bossDefeatedOrNotSpawned || !hasBoss) {
                portalColor = '#2ecc71'; // 绿色-可以过关
                portalText = '过关!';
                portalTextColor = '#2ecc71';
            }

            // 外圈光环
            const gradient = ctx.createRadialGradient(sx, H - 100, 0, sx, H - 100, 80);
            gradient.addColorStop(0, portalColor + 'cc');
            gradient.addColorStop(0.5, portalColor + '66');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(sx, H - 100, 80, 0, Math.PI * 2);
            ctx.fill();

            // 旋转光环
            ctx.strokeStyle = portalColor;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 25;
            ctx.shadowColor = portalColor;
            for (let i = 0; i < 4; i++) {
                const angle = Date.now() * 0.003 + i * (Math.PI * 2 / 4);
                ctx.beginPath();
                ctx.arc(sx, H - 100, 50 + i * 8, angle, angle + Math.PI * 0.3);
                ctx.stroke();
            }

            // 中心
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(sx, H - 100, 20, 0, Math.PI * 2);
            ctx.fill();

            // 文字
            ctx.fillStyle = portalTextColor;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 5;
            ctx.fillText(portalText, sx, H - 170);

            // 箭头指示
            const arrowBob = Math.sin(Date.now() * 0.005) * 10;
            ctx.fillStyle = portalTextColor;
            ctx.beginPath();
            ctx.moveTo(sx, H - 150 + arrowBob);
            ctx.lineTo(sx - 15, H - 170 + arrowBob);
            ctx.lineTo(sx + 15, H - 170 + arrowBob);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // 绘制增益UI
        function drawBoostUI() {
            // 翻跟头冷却指示器
            if (player.rollCooldown > 0) {
                const rollReady = player.rollCooldown <= 0;
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(10, 215, 80, 20);
                ctx.strokeStyle = rollReady ? '#f1c40f' : '#666';
                ctx.lineWidth = 2;
                ctx.strokeRect(10, 215, 80, 20);
                ctx.fillStyle = rollReady ? '#f1c40f' : '#888';
                ctx.font = '12px sans-serif';
                ctx.fillText(`⚡翻跟头 ${rollReady ? '就绪' : Math.ceil(player.rollCooldown/60) + 's'}`, 15, 230);
                ctx.restore();
            }

            if (player.boostTimer <= 0) return;

            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(10, 150, 120, 60);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 150, 120, 60);

            if (player.attackSpeedBoost > 0) {
                ctx.fillStyle = '#00d9ff';
                ctx.font = '14px sans-serif';
                ctx.fillText(`⚡ 攻速 +${player.attackSpeedBoost}`, 20, 175);
            }
            if (player.damageBoost > 0) {
                ctx.fillStyle = '#ff4757';
                ctx.font = '14px sans-serif';
                ctx.fillText(`⚔ 伤害 +${Math.floor(player.damageBoost * 100)}%`, 20, 195);
            }

            // 倒计时条
            const barWidth = 100 * (player.boostTimer / 400);
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(20, 200, barWidth, 5);

            ctx.restore();
        }

        // 绘制平台
        function drawPlatforms() {
            platforms.forEach(p => {
                const sx = p.x - cameraX;

                // 平台主体
                ctx.fillStyle = '#5d4e37';
                ctx.fillRect(sx, p.y, p.w, p.h);

                // 平台顶
                ctx.fillStyle = '#7d6e57';
                ctx.fillRect(sx, p.y, p.w, 5);

                // 装饰
                ctx.fillStyle = '#4d3e27';
                ctx.fillRect(sx, p.y + p.h - 5, p.w, 5);
            });
        }

        // 绘制玩家
        function drawPlayer() {
            const sx = player.x - cameraX;
            const sy = player.y;

            // 绘制残影
            player.trailParticles.forEach(t => {
                ctx.save();
                ctx.globalAlpha = t.alpha * 0.5;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.ellipse(t.x - cameraX + player.w/2, t.y + player.h/2, player.w/2, player.h/2 * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            ctx.save();

            // 翻跟头时特殊效果
            if (player.rolling) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#f1c40f';
            }

            // 无敌闪烁
            if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            // 身体
            const h = player.crouching ? player.h * 0.6 : player.h;
            const yOffset = player.crouching ? player.h * 0.4 : 0;

            // 身体阴影
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(sx + player.w/2, H - 60, player.w/2 + 5, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // 古风服装
            const dressGrad = ctx.createLinearGradient(sx, sy, sx, sy + h);
            dressGrad.addColorStop(0, '#9b59b6');
            dressGrad.addColorStop(1, '#8e44ad');
            ctx.fillStyle = dressGrad;

            // 长裙
            ctx.beginPath();
            ctx.moveTo(sx, sy + yOffset + 20);
            ctx.lineTo(sx - 5, sy + h);
            ctx.lineTo(sx + player.w + 5, sy + h);
            ctx.lineTo(sx + player.w, sy + yOffset + 20);
            ctx.closePath();
            ctx.fill();

            // 上身
            ctx.fillStyle = '#faf0fa';
            ctx.fillRect(sx + 5, sy + yOffset, player.w - 10, 25);

            // 袖子飘动
            const sleeveWave = Math.sin(player.animation) * 5;
            ctx.fillStyle = '#f5e6f5';
            ctx.beginPath();
            ctx.moveTo(sx, sy + yOffset + 10);
            ctx.quadraticCurveTo(sx - 15 + sleeveWave, sy + yOffset + 25, sx - 10, sy + yOffset + 40);
            ctx.lineTo(sx + 5, sy + yOffset + 30);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(sx + player.w, sy + yOffset + 10);
            ctx.quadraticCurveTo(sx + player.w + 15 - sleeveWave, sy + yOffset + 25, sx + player.w + 10, sy + yOffset + 40);
            ctx.lineTo(sx + player.w - 5, sy + yOffset + 30);
            ctx.closePath();
            ctx.fill();

            // 头部
            ctx.fillStyle = '#fce4d6';
            ctx.beginPath();
            ctx.arc(sx + player.w/2, sy + yOffset - 5, 15, 0, Math.PI * 2);
            ctx.fill();

            // 头像
            if (playerImgLoaded) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(sx + player.w/2, sy + yOffset - 5, 15, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerImg, sx + player.w/2 - 15, sy + yOffset - 20, 30, 30);
                ctx.restore();
            }

            // 发髻
            ctx.fillStyle = '#2c2c4a';
            ctx.beginPath();
            ctx.arc(sx + player.w/2, sy + yOffset - 15, 12, Math.PI, 0);
            ctx.fill();

            // 装饰
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(sx + player.w/2, sy + yOffset - 22, 3, 0, Math.PI * 2);
            ctx.fill();

            // 移动动画
            if (Math.abs(player.vx) > 0 && player.grounded) {
                const bobY = Math.sin(player.animation * 2) * 2;
                ctx.translate(0, bobY);
            }

                // 翠翠名字标签
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#000';
                ctx.fillText('翠翠', sx + player.w/2, sy + yOffset - 30);
                ctx.shadowBlur = 0;

                ctx.restore();

                // 绘制翅膀 - 在玩家背后
                const wingGlow = WING_COLORS[currentWingColor].glow;
                const wingColor = WING_COLORS[currentWingColor].primary;
                const breathOffset = Math.sin(gameTime * 0.003) * 3;

                // 更新翅膀位置和角度
                const wingCenterX = sx + player.w/2;
                const wingCenterY = sy + player.h/2 - 10;

                leftWings.forEach((wing, i) => {
                    wing.baseX = wingCenterX - 15;
                    wing.baseY = wingCenterY + breathOffset;
                    wing.update(gameTime, breathOffset);
                    wing.angle = -Math.PI * 0.65 - (i * 0.12) - Math.sin(gameTime * 0.006 + i * 0.3) * 0.15;
                    wing.draw(ctx);
                });

                rightWings.forEach((wing, i) => {
                    wing.baseX = wingCenterX + 15;
                    wing.baseY = wingCenterY + breathOffset;
                    wing.update(gameTime, breathOffset);
                    wing.angle = -Math.PI * 0.35 + (i * 0.12) + Math.sin(gameTime * 0.006 + i * 0.3) * 0.15;
                    wing.draw(ctx);
                });

                // 翅膀光晕
                ctx.save();
                ctx.globalAlpha = 0.3;
                const glowGrad = ctx.createRadialGradient(wingCenterX, wingCenterY, 0, wingCenterX, wingCenterY, 60);
                glowGrad.addColorStop(0, wingGlow + '66');
                glowGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(wingCenterX, wingCenterY, 60, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // 绘制敌人
        function drawEnemies() {
            enemies.forEach(e => {
                const sx = e.x - cameraX;
                const size = e.size || 40;

                ctx.save();

                // 受伤闪烁
                if (e.hp < e.maxHp) {
                    ctx.globalAlpha = 0.9;
                }

                // 身体 - 恐怖风格
                ctx.fillStyle = e.color;

                // 根据类型绘制不同恐怖形状
                if (e.pattern === 'boss') {
                    // Boss - 更恐怖
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#8b0000';

                    ctx.beginPath();
                    ctx.moveTo(sx, e.y + size * 0.3);
                    ctx.lineTo(sx - size * 0.2, e.y + size);
                    ctx.lineTo(sx + size + size * 0.2, e.y + size);
                    ctx.lineTo(sx + size, e.y + size * 0.3);
                    ctx.closePath();
                    ctx.fill();

                    // 恐怖王冠
                    ctx.fillStyle = '#8b0000';
                    ctx.beginPath();
                    ctx.moveTo(sx + size/2, e.y - 15);
                    ctx.lineTo(sx + size/2 - 10, e.y + 5);
                    ctx.lineTo(sx + size/2, e.y);
                    ctx.lineTo(sx + size/2 + 10, e.y + 5);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // 普通敌人 - 恐怖化
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = e.color;

                    // 扭曲的身体形状
                    ctx.beginPath();
                    ctx.moveTo(sx + size/2, e.y);
                    ctx.lineTo(sx + size, e.y + size * 0.2);
                    ctx.lineTo(sx + size * 0.9, e.y + size * 0.5);
                    ctx.lineTo(sx + size, e.y + size * 0.8);
                    ctx.lineTo(sx + size * 0.7, e.y + size);
                    ctx.lineTo(sx + size * 0.3, e.y + size);
                    ctx.lineTo(sx, e.y + size * 0.8);
                    ctx.lineTo(sx + size * 0.1, e.y + size * 0.5);
                    ctx.lineTo(sx, e.y + size * 0.2);
                    ctx.closePath();
                    ctx.fill();

                    // 尖角装饰
                    ctx.fillStyle = '#000';
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(sx + size * 0.2 + i * size * 0.3, e.y);
                        ctx.lineTo(sx + size * 0.3 + i * size * 0.3, e.y - 12);
                        ctx.lineTo(sx + size * 0.4 + i * size * 0.3, e.y);
                        ctx.fill();
                    }
                }

                // 恐怖眼睛 - 红色发光
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff0000';
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(sx + size * 0.3, e.y + size * 0.35, size * 0.15, 0, Math.PI * 2);
                ctx.arc(sx + size * 0.7, e.y + size * 0.35, size * 0.15, 0, Math.PI * 2);
                ctx.fill();

                // 瞳孔 - 竖瞳
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(sx + size * 0.3 + e.facing * 3, e.y + size * 0.35, size * 0.05, size * 0.1, 0, 0, Math.PI * 2);
                ctx.ellipse(sx + size * 0.7 + e.facing * 3, e.y + size * 0.35, size * 0.05, size * 0.1, 0, 0, Math.PI * 2);
                ctx.fill();

                // 恐怖眉毛 - 愤怒
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.15, e.y + size * 0.2);
                ctx.lineTo(sx + size * 0.4, e.y + size * 0.28);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.6, e.y + size * 0.28);
                ctx.lineTo(sx + size * 0.85, e.y + size * 0.2);
                ctx.stroke();

                // 恐怖嘴巴
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.3, e.y + size * 0.6);
                ctx.lineTo(sx + size * 0.5, e.y + size * 0.75);
                ctx.lineTo(sx + size * 0.7, e.y + size * 0.6);
                ctx.closePath();
                ctx.fill();

                // 尖牙
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(sx + size * 0.35 + i * size * 0.12, e.y + size * 0.6);
                    ctx.lineTo(sx + size * 0.4 + i * size * 0.12, e.y + size * 0.72);
                    ctx.lineTo(sx + size * 0.45 + i * size * 0.12, e.y + size * 0.6);
                    ctx.fill();
                }

                // 名字
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#000';
                ctx.fillText(e.type, sx + size/2, e.y - 15);

                // 血条
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#333';
                ctx.fillRect(sx, e.y - 30, size, 8);
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(sx, e.y - 30, size * (e.hp / e.maxHp), 8);

                ctx.restore();
            });

            // 绘制Boss
            if (boss) {
                const sx = boss.x - cameraX;
                const size = boss.size;

                ctx.save();

                // Boss光晕 - 更恐怖
                ctx.shadowBlur = boss.rageMode ? 80 : 50;
                ctx.shadowColor = boss.rageMode ? '#ff0000' : '#8b0000';

                // Boss身体 - 极其恐怖的形状
                const bossGrad = ctx.createRadialGradient(sx + size/2, boss.y + size/2, 0, sx + size/2, boss.y + size/2, size);
                bossGrad.addColorStop(0, boss.rageMode ? '#ff0000' : boss.color);
                bossGrad.addColorStop(0.5, boss.rageMode ? '#8b0000' : '#4a0000');
                bossGrad.addColorStop(1, '#000');
                ctx.fillStyle = bossGrad;

                // 恐怖扭曲形状
                ctx.beginPath();
                ctx.moveTo(sx + size/2, boss.y);
                ctx.lineTo(sx + size * 0.85, boss.y + size * 0.15);
                ctx.lineTo(sx + size, boss.y + size * 0.4);
                ctx.lineTo(sx + size * 0.95, boss.y + size * 0.7);
                ctx.lineTo(sx + size * 0.8, boss.y + size);
                ctx.lineTo(sx + size * 0.2, boss.y + size);
                ctx.lineTo(sx + size * 0.05, boss.y + size * 0.7);
                ctx.lineTo(sx, boss.y + size * 0.4);
                ctx.lineTo(sx + size * 0.15, boss.y + size * 0.15);
                ctx.closePath();
                ctx.fill();

                // 额外尖角 - 更多更锋利
                ctx.fillStyle = boss.rageMode ? '#ff0000' : '#4a0000';
                for (let i = 0; i < 6; i++) {
                    const angle = Math.PI * 0.8 + (i / 5) * Math.PI * 0.4;
                    ctx.beginPath();
                    ctx.moveTo(sx + size/2 + Math.cos(angle) * size * 0.35, boss.y + size * 0.5 + Math.sin(angle) * size * 0.25);
                    ctx.lineTo(sx + size/2 + Math.cos(angle) * size * 0.8, boss.y + size * 0.5 + Math.sin(angle) * size * 0.55);
                    ctx.lineTo(sx + size/2 + Math.cos(angle + 0.4) * size * 0.35, boss.y + size * 0.5 + Math.sin(angle + 0.4) * size * 0.25);
                    ctx.fill();
                }

                // 恐怖疤痕/纹身
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.3, boss.y + size * 0.4);
                ctx.lineTo(sx + size * 0.5, boss.y + size * 0.6);
                ctx.lineTo(sx + size * 0.4, boss.y + size * 0.8);
                ctx.stroke();

                // 恐怖眼睛 - 巨大发光
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = boss.rageMode ? 40 : 30;
                ctx.beginPath();
                ctx.arc(sx + size * 0.32, boss.y + size * 0.35, size * 0.16, 0, Math.PI * 2);
                ctx.arc(sx + size * 0.68, boss.y + size * 0.35, size * 0.16, 0, Math.PI * 2);
                ctx.fill();

                // 眼睛瞳孔 - 竖瞳更恐怖
                ctx.fillStyle = '#000';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.ellipse(sx + size * 0.32 + boss.facing * 4, boss.y + size * 0.35, size * 0.04, size * 0.12, 0, 0, Math.PI * 2);
                ctx.ellipse(sx + size * 0.68 + boss.facing * 4, boss.y + size * 0.35, size * 0.04, size * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();

                // 愤怒眉毛
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.15, boss.y + size * 0.18);
                ctx.lineTo(sx + size * 0.45, boss.y + size * 0.28);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.55, boss.y + size * 0.28);
                ctx.lineTo(sx + size * 0.85, boss.y + size * 0.18);
                ctx.stroke();

                // 恐怖嘴巴 - 张开更大
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.25, boss.y + size * 0.55);
                ctx.quadraticCurveTo(sx + size/2, boss.y + size * 0.8, sx + size * 0.75, boss.y + size * 0.55);
                ctx.quadraticCurveTo(sx + size/2, boss.y + size * 0.65, sx + size * 0.25, boss.y + size * 0.55);
                ctx.fill();

                // 尖牙 - 更长更锋利
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(sx + size * 0.28 + i * size * 0.11, boss.y + size * 0.55);
                    ctx.lineTo(sx + size * 0.33 + i * size * 0.11, boss.y + size * 0.75);
                    ctx.lineTo(sx + size * 0.38 + i * size * 0.11, boss.y + size * 0.55);
                    ctx.fill();
                }

                // 流血效果
                ctx.fillStyle = '#8b0000';
                ctx.beginPath();
                ctx.arc(sx + size * 0.15, boss.y + size * 0.5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(sx + size * 0.15, boss.y + size * 0.5);
                ctx.lineTo(sx + size * 0.12, boss.y + size * 0.7);
                ctx.lineTo(sx + size * 0.18, boss.y + size * 0.7);
                ctx.fill();

                // Boss名字和血条
                ctx.fillStyle = boss.rageMode ? '#ff0000' : '#fff';
                ctx.font = 'bold 22px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#000';
                ctx.fillText(boss.type, sx + size/2, boss.y - 25);

                // Boss血条
                const hpPercent = boss.hp / boss.maxHp;
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#222';
                ctx.fillRect(sx - 5, boss.y - 45, size + 10, 18);
                const hpColor = hpPercent > 0.5 ? '#8b0000' : hpPercent > 0.25 ? '#b22222' : '#ff0000';
                ctx.fillStyle = hpColor;
                ctx.fillRect(sx - 5, boss.y - 45, (size + 10) * hpPercent, 18);

                // 狂暴模式指示
                if (boss.rageMode) {
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff0000';
                    ctx.fillText('⚠ 狂暴模式 ⚠', sx + size/2, boss.y - 55);
                }

                ctx.restore();
            }
        }

        // 绘制子弹 - 炫酷特效
        function drawBullets() {
            bullets.forEach(b => {
                const sx = b.x - cameraX;

                ctx.save();

                if (b.name === '火焰') {
                    // 火焰子弹 - 炽热球体带尾焰
                    // 外焰
                    const fireGrad = ctx.createRadialGradient(sx, b.y, 0, sx, b.y, b.size * 2);
                    fireGrad.addColorStop(0, '#fff');
                    fireGrad.addColorStop(0.2, '#ffff00');
                    fireGrad.addColorStop(0.5, '#ff6600');
                    fireGrad.addColorStop(1, 'rgba(255,50,0,0)');
                    ctx.fillStyle = fireGrad;
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ff4500';
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 2, 0, Math.PI * 2);
                    ctx.fill();

                    // 核心
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    // 火焰尾迹
                    for (let i = 0; i < 5; i++) {
                        const trailX = sx - b.vx * i * 2;
                        const trailSize = b.size * (1 - i * 0.2);
                        const alpha = 1 - i * 0.2;
                        ctx.fillStyle = `rgba(255, ${150 - i * 30}, 0, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(trailX, b.y, trailSize, 0, Math.PI * 2);
                        ctx.fill();
                    }

                } else if (b.name === '风暴') {
                    // 风暴 - 龙卷风螺旋
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#00bfff';

                    // 多层螺旋
                    for (let layer = 0; layer < 3; layer++) {
                        ctx.strokeStyle = b.bulletColor;
                        ctx.lineWidth = 4 - layer;
                        ctx.globalAlpha = 1 - layer * 0.3;
                        ctx.beginPath();
                        for (let i = 0; i < 30; i++) {
                            const angle = i * 0.4 + Date.now() * 0.02 + layer;
                            const r = b.size * (1 - i / 40) + layer * 3;
                            const px = sx + Math.cos(angle) * r;
                            const py = b.y + Math.sin(angle) * r;
                            if (i === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        }
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;

                    // 中心光点
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 0.3, 0, Math.PI * 2);
                    ctx.fill();

                } else if (b.name === '雷电') {
                    // 雷电 - 闪电链
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ffff00';

                    // 主体闪电
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(sx - 25, b.y - 15);
                    for (let i = 0; i < 6; i++) {
                        const px = sx - 25 + i * 10 + (Math.random() - 0.5) * 10;
                        const py = b.y - 15 + i * 6 + (Math.random() - 0.5) * 5;
                        ctx.lineTo(px, py);
                    }
                    ctx.stroke();

                    // 分支闪电
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#87ceeb';
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        const startX = sx - 10 + i * 15;
                        ctx.moveTo(startX, b.y - 5 + i * 3);
                        ctx.lineTo(startX + (Math.random() - 0.5) * 20, b.y + 10 + i * 5);
                        ctx.stroke();
                    }

                    // 电弧光环
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size + 5 + Math.sin(Date.now() * 0.02) * 3, 0, Math.PI * 2);
                    ctx.stroke();

                } else if (b.name === '光剑') {
                    // 光剑 - 剑气
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = '#da70d6';

                    // 剑身
                    const swordGrad = ctx.createLinearGradient(sx, b.y - b.range, sx, b.y + 20);
                    swordGrad.addColorStop(0, 'rgba(255,255,255,0)');
                    swordGrad.addColorStop(0.3, b.bulletColor);
                    swordGrad.addColorStop(0.5, '#fff');
                    swordGrad.addColorStop(0.7, b.bulletColor);
                    swordGrad.addColorStop(1, 'rgba(255,255,255,0)');

                    ctx.fillStyle = swordGrad;
                    ctx.beginPath();
                    ctx.moveTo(sx, b.y - b.range);
                    ctx.lineTo(sx - 12, b.y);
                    ctx.lineTo(sx, b.y + 20);
                    ctx.lineTo(sx + 12, b.y);
                    ctx.closePath();
                    ctx.fill();

                    // 剑柄
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(sx - 3, b.y + 15, 6, 15);

                    // 剑气波纹
                    ctx.strokeStyle = b.bulletColor;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
                    ctx.beginPath();
                    ctx.ellipse(sx, b.y, b.size * 3, b.size, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                } else if (b.name === '冰霜') {
                    // 冰霜 - 六角雪花
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00ffff';

                    // 旋转的雪花
                    const rotation = Date.now() * 0.005;
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3 + rotation;
                        ctx.strokeStyle = b.bulletColor;
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(sx, b.y);
                        const px = sx + Math.cos(angle) * b.size;
                        const py = b.y + Math.sin(angle) * b.size;
                        ctx.lineTo(px, py);

                        // 分支
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + Math.cos(angle + 0.5) * 5, py + Math.sin(angle + 0.5) * 5);
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + Math.cos(angle - 0.5) * 5, py + Math.sin(angle - 0.5) * 5);
                        ctx.stroke();
                    }

                    // 中心
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 0.3, 0, Math.PI * 2);
                    ctx.fill();

                    // 冰晶尾迹
                    for (let i = 0; i < 4; i++) {
                        const trailX = sx - b.vx * i * 3;
                        ctx.strokeStyle = `rgba(0, 255, 255, ${0.5 - i * 0.1})`;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(trailX, b.y, b.size * 0.5 * (1 - i * 0.2), 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                ctx.restore();
            });

            // 敌弹 - Boss子弹更炫酷
            enemyBullets.forEach(b => {
                const sx = b.x - cameraX;

                if (b.isBossBullet) {
                    // Boss子弹 - 更大更恐怖
                    ctx.save();
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = b.color;

                    // 外圈光环
                    const outerGrad = ctx.createRadialGradient(sx, b.y, 0, sx, b.y, b.size * 3);
                    outerGrad.addColorStop(0, b.color + '88');
                    outerGrad.addColorStop(0.5, b.color + '44');
                    outerGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = outerGrad;
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 3, 0, Math.PI * 2);
                    ctx.fill();

                    // 核心
                    const innerGrad = ctx.createRadialGradient(sx, b.y, 0, sx, b.y, b.size);
                    innerGrad.addColorStop(0, '#fff');
                    innerGrad.addColorStop(0.3, b.color);
                    innerGrad.addColorStop(1, b.color + 'aa');
                    ctx.fillStyle = innerGrad;
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size, 0, Math.PI * 2);
                    ctx.fill();

                    // 尖刺效果
                    ctx.strokeStyle = b.color;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 + Date.now() * 0.01;
                        ctx.beginPath();
                        ctx.moveTo(sx + Math.cos(angle) * b.size, b.y + Math.sin(angle) * b.size);
                        ctx.lineTo(sx + Math.cos(angle) * b.size * 1.8, b.y + Math.sin(angle) * b.size * 1.8);
                        ctx.stroke();
                    }

                    ctx.restore();
                } else {
                    // 普通敌弹
                    const enemyGrad = ctx.createRadialGradient(sx, b.y, 0, sx, b.y, b.size * 1.5);
                    enemyGrad.addColorStop(0, '#fff');
                    enemyGrad.addColorStop(0.5, b.color);
                    enemyGrad.addColorStop(1, 'rgba(255,0,0,0)');
                    ctx.fillStyle = enemyGrad;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = b.color;
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });
        }

        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / 40;
                ctx.save();

                // 发光效果
                const grad = ctx.createRadialGradient(p.x - cameraX, p.y, 0, p.x - cameraX, p.y, p.size * 2);
                grad.addColorStop(0, p.color);
                grad.addColorStop(0.5, p.color + '88');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;

                ctx.beginPath();
                ctx.arc(p.x - cameraX, p.y, p.size * 2, 0, Math.PI * 2);
                ctx.fill();

                // 中心亮点
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = alpha * 0.8;
                ctx.beginPath();
                ctx.arc(p.x - cameraX, p.y, p.size * 0.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        // 绘制掉落
        function drawDrops() {
            drops.forEach(d => {
                const sx = d.x - cameraX;
                const bob = Math.sin(Date.now() * 0.01 + d.x) * 3;

                ctx.save();
                ctx.shadowBlur = 10;

                if (d.type === 'gold') {
                    ctx.fillStyle = '#f1c40f';
                    ctx.shadowColor = '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(sx, d.y + bob, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#f39c12';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('$', sx, d.y + bob + 4);
                } else if (d.type === 'speed') {
                    // 攻速加成 - 闪电符号
                    ctx.fillStyle = '#00d9ff';
                    ctx.shadowColor = '#00d9ff';
                    ctx.beginPath();
                    ctx.arc(sx, d.y + bob, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚡', sx, d.y + bob + 4);
                } else if (d.type === 'damage') {
                    // 伤害加成 - 剑符号
                    ctx.fillStyle = '#ff4757';
                    ctx.shadowColor = '#ff4757';
                    ctx.beginPath();
                    ctx.arc(sx, d.y + bob, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚔', sx, d.y + bob + 4);
                } else if (d.type === 'hp') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.shadowColor = '#e74c3c';
                    ctx.fillRect(sx - 8, d.y + bob - 12, 16, 24);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('+', sx, d.y + bob + 4);
                }

                ctx.restore();
            });
        }

        // UI更新
        function updateUI() {
            document.getElementById('hp').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('gold').textContent = gold;
            document.getElementById('kills').textContent = levelKills;

            // 更新进度和距离
            const remainingDist = Math.max(0, Math.floor(goalX - player.x));
            document.getElementById('distance').textContent = remainingDist;

            const progress = Math.min(100, Math.max(0, (player.x / goalX) * 100));
            const progressBar = document.getElementById('progressBar');
            if (progressBar) {
                // Boss状态影响进度条颜色
                const config = LEVELS[currentLevel - 1];
                if (config.boss && !bossDefeated && bossSpawned) {
                    progressBar.style.background = 'linear-gradient(90deg,#c0392b,#e74c3c)'; // 红色-有Boss
                } else {
                    progressBar.style.background = 'linear-gradient(90deg,#27ae60,#2ecc71)'; // 绿色-安全
                }
                progressBar.style.width = progress + '%';
            }
        }

        // 主循环
        let lastTime = 0;

        function gameLoop(timestamp) {
            if (gameState !== 'playing') {
                requestAnimationFrame(gameLoop);
                return;
            }

            const dt = timestamp - lastTime;
            lastTime = timestamp;
            gameTime += dt; // 更新时间用于翅膀动画

            // 更新增益效果
            if (player.boostTimer > 0) {
                player.boostTimer--;
            }

            // 更新
            updatePlayer();
            updateEnemies();
            updateBullets();
            updateDrops();
            updateParticles();
            updateCamera();
            spawnEnemy();
            updateUI();

            // 关卡完成检测 - 需要击败Boss才能过关
            const config = LEVELS[currentLevel - 1];
            if (config.boss) {
                // 有Boss的关卡：必须击败Boss
                if (bossDefeated || !bossSpawned) {
                    if (player.x >= goalX) {
                        completeLevel();
                    }
                }
            } else {
                // 无Boss的关卡
                if (player.x >= goalX) {
                    completeLevel();
                }
            }

            // 死亡检测
            if (player.hp <= 0) {
                gameOver();
            }

            // 绘制
            ctx.clearRect(0, 0, W, H);
            drawBackground();
            drawGround();
            drawGoal(); // 绘制终点
            drawPlatforms();
            drawDrops();
            drawBullets();
            drawEnemies();
            drawPlayer();
            drawParticles();
            drawBoostUI(); // 绘制增益状态

            requestAnimationFrame(gameLoop);
        }

        function completeLevel() {
            gameState = 'levelComplete';
            document.getElementById('levelGold').textContent = gold;

            // 奇数关卡显示奖励图片
            if (currentLevel % 2 === 1) {
                document.getElementById('levelComplete').style.display = 'none';
                const hasReward = showRewardModal(currentLevel);
                if (!hasReward) {
                    document.getElementById('levelComplete').style.display = 'flex';
                }
            } else {
                document.getElementById('levelComplete').style.display = 'flex';
            }
        }

        function nextLevel() {
            // 关闭奖励弹窗（如果打开着）
            document.getElementById('rewardModal').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'none';
            currentLevel++;
            levelKills = 0;

            if (currentLevel > 20) {
                // 通关！显示全家福
                document.getElementById('levelComplete').style.display = 'none';
                document.getElementById('rewardModal').style.display = 'none';
                setTimeout(() => {
                    showGallery();
                }, 500);
                gameState = 'complete';
                return;
            }

            initLevel(currentLevel);
            player.hp = Math.min(player.maxHp, player.hp + 20);
            gameState = 'playing';
        }

        function gameOver() {
            gameState = 'gameOver';
            document.getElementById('finalLevel').textContent = currentLevel;
            document.getElementById('gameOver').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'none';
            document.getElementById('rewardModal').style.display = 'none';
            document.getElementById('galleryModal').style.display = 'none';
            currentLevel = 1;
            gold = 0;
            levelKills = 0;
            player.hp = player.maxHp;
            player.unlockedSkills = [true, true, true, true, true]; // 全部解锁
            player.currentSkill = 0;
            player.attackSpeedBoost = 0;
            player.damageBoost = 0;
            player.boostTimer = 0;
            player.rolling = false;
            player.rollCooldown = 0;
            player.trailParticles = [];
            updateSkillUI();
            initLevel(1);
            gameState = 'playing';
        }

        // 启动
        initLevel(1);
        gameLoop(0);
    </script>
</body>
</html>
