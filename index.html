<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a1a" />
    <title>翠翠飞仙</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      body {
        background: #0a0a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      canvas {
        display: block;
        touch-action: none;
      }

      .hint {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        text-align: center;
        pointer-events: none;
        animation: fadeHint 3s ease-out forwards;
      }

      @keyframes fadeHint {
        0%, 70% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="hint">触摸屏幕引导仙子飞行</div>
    <script>
      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')

      let width, height
      const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      const dpr = Math.min(window.devicePixelRatio || 1, 2) // 限制最大2倍像素比

      function resize() {
        width = canvas.width = window.innerWidth * dpr
        height = canvas.height = window.innerHeight * dpr
        canvas.style.width = window.innerWidth + 'px'
        canvas.style.height = window.innerHeight + 'px'
        ctx.scale(dpr, dpr)
        width = window.innerWidth
        height = window.innerHeight
      }
      resize()
      window.addEventListener('resize', () => {
        ctx.setTransform(1, 0, 0, 1, 0, 0)
        resize()
      })

      // 粒子系统
      class Particle {
        constructor(x, y, color, size, speedX, speedY, life) {
          this.x = x
          this.y = y
          this.color = color
          this.size = size
          this.speedX = speedX
          this.speedY = speedY
          this.life = life
          this.maxLife = life
        }

        update() {
          this.x += this.speedX
          this.y += this.speedY
          this.life--
          this.size *= 0.98
        }

        draw() {
          const alpha = this.life / this.maxLife
          ctx.save()
          ctx.globalAlpha = alpha
          ctx.fillStyle = this.color
          ctx.shadowBlur = 15
          ctx.shadowColor = this.color
          ctx.beginPath()
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()
        }

        isDead() {
          return this.life <= 0 || this.size < 0.5
        }
      }

      // 翅膀羽毛
      class WingFeather {
        constructor(x, y, angle, length, color, isLeft) {
          this.baseX = x
          this.baseY = y
          this.angle = angle
          this.length = length
          this.color = color
          this.isLeft = isLeft
          this.phase = Math.random() * Math.PI * 2
          this.waveAmplitude = 0.1 + Math.random() * 0.1
        }

        update(time, breathOffset) {
          this.currentAngle =
            this.angle +
            Math.sin(time * 0.003 + this.phase) * this.waveAmplitude +
            breathOffset * 0.5
        }

        draw(ctx) {
          ctx.save()
          ctx.translate(this.baseX, this.baseY)
          ctx.rotate(this.currentAngle)

          // 羽毛渐变
          const gradient = ctx.createLinearGradient(0, 0, this.length, 0)
          gradient.addColorStop(0, this.color)
          gradient.addColorStop(0.5, this.lightenColor(this.color, 30))
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)')

          ctx.fillStyle = gradient
          ctx.shadowBlur = 20
          ctx.shadowColor = this.color

          ctx.beginPath()
          ctx.moveTo(0, 0)
          ctx.quadraticCurveTo(
            this.length * 0.5,
            -this.length * 0.15,
            this.length,
            0,
          )
          ctx.quadraticCurveTo(this.length * 0.5, this.length * 0.15, 0, 0)
          ctx.fill()

          ctx.restore()
        }

        lightenColor(color, amount) {
          const hex = color.replace('#', '')
          const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + amount)
          const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + amount)
          const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + amount)
          return `rgb(${r}, ${g}, ${b})`
        }
      }

      // 云朵
      class Cloud {
        constructor() {
          this.reset()
        }

        reset() {
          this.x = Math.random() * width
          this.y = Math.random() * height
          this.speed = 0.2 + Math.random() * 0.3
          this.size = 30 + Math.random() * 60
          this.opacity = 0.1 + Math.random() * 0.2
        }

        update() {
          this.x += this.speed
          if (this.x > width + 100) {
            this.x = -100
            this.y = Math.random() * height
          }
        }

        draw() {
          ctx.save()
          ctx.globalAlpha = this.opacity
          ctx.fillStyle = '#fff'

          for (let i = 0; i < 5; i++) {
            ctx.beginPath()
            ctx.arc(
              this.x + i * this.size * 0.3,
              this.y + Math.sin(i) * this.size * 0.2,
              this.size * (0.5 + Math.sin(i * 0.5) * 0.2),
              0,
              Math.PI * 2,
            )
            ctx.fill()
          }
          ctx.restore()
        }
      }

      // 古风人物类
      class GuFengCharacter {
        constructor() {
          this.x = width / 2
          this.y = height / 2
          this.time = 0
          this.particles = []
          this.clouds = []

          // 翅膀设置
          this.wingColors = [
            { primary: '#6366f1', secondary: '#8b5cf6', glow: '#a855f7' },
            { primary: '#06b6d4', secondary: '#3b82f6', glow: '#60a5fa' },
            { primary: '#ec4899', secondary: '#f472b6', glow: '#fb7185' },
          ]
          this.currentWingColor = 0
          this.leftWings = []
          this.rightWings = []
          this.initWings()

          // 初始化云朵
          const cloudCount = isMobile ? 8 : 15
          for (let i = 0; i < cloudCount; i++) {
            this.clouds.push(new Cloud())
          }

          // 飘带
          this.ribbons = []
          for (let i = 0; i < 4; i++) {
            this.ribbons.push({
              phase: i * Math.PI * 0.5,
              amplitude: 30 + i * 10,
              frequency: 0.02 + i * 0.005,
              length: 80 + i * 30,
              color: this.wingColors[this.currentWingColor].primary,
            })
          }
        }

        initWings() {
          this.leftWings = []
          this.rightWings = []

          // 左翅膀
          for (let i = 0; i < 8; i++) {
            const angle = -Math.PI * 0.8 - i * 0.15
            const length = 80 + Math.sin(i * 0.5) * 30
            const color = this.wingColors[this.currentWingColor].primary
            this.leftWings.push(
              new WingFeather(this.x - 30, this.y, angle, length, color, true),
            )
          }

          // 右翅膀
          for (let i = 0; i < 8; i++) {
            const angle = -Math.PI * 0.2 + i * 0.15
            const length = 80 + Math.sin(i * 0.5) * 30
            const color = this.wingColors[this.currentWingColor].primary
            this.rightWings.push(
              new WingFeather(this.x + 30, this.y, angle, length, color, false),
            )
          }
        }

        update(deltaTime) {
          this.time += deltaTime

          // 触控引导飞行
          let targetX = width / 2
          let targetY = height / 2

          if (isTouching) {
            targetX = touchTarget.x
            targetY = touchTarget.y
          } else {
            // 自由飞行轨迹
            targetX = width / 2 + Math.sin(this.time * 0.001) * 100
            targetY = height / 2 + Math.cos(this.time * 0.0015) * 50 + Math.sin(this.time * 0.002) * 20
          }

          // 平滑跟随
          this.x += (targetX - this.x) * 0.03
          this.y += (targetY - this.y) * 0.03

          // 呼吸效果
          const breathOffset = Math.sin(this.time * 0.003) * 5

          // 更新翅膀
          this.leftWings.forEach((wing, i) => {
            wing.baseX = this.x - 30 + breathOffset
            wing.baseY = this.y + breathOffset
            wing.update(this.time, breathOffset)
            wing.angle =
              -Math.PI * 0.7 -
              i * 0.12 -
              Math.sin(this.time * 0.005 + i * 0.3) * 0.2
          })

          this.rightWings.forEach((wing, i) => {
            wing.baseX = this.x + 30 + breathOffset
            wing.baseY = this.y + breathOffset
            wing.update(this.time, breathOffset)
            wing.angle =
              -Math.PI * 0.3 +
              i * 0.12 +
              Math.sin(this.time * 0.005 + i * 0.3) * 0.2
          })

          // 更新云朵
          this.clouds.forEach((cloud) => cloud.update())

          // 生成翅膀粒子
          if (Math.random() < 0.3) {
            const wing =
              this.leftWings[Math.floor(Math.random() * this.leftWings.length)]
            this.particles.push(
              new Particle(
                wing.baseX + Math.random() * 50,
                wing.baseY + Math.random() * 20 - 10,
                this.wingColors[this.currentWingColor].glow,
                2 + Math.random() * 3,
                -1 - Math.random(),
                (Math.random() - 0.5) * 2,
                60 + Math.random() * 40,
              ),
            )
          }

          if (Math.random() < 0.3) {
            const wing =
              this.rightWings[
                Math.floor(Math.random() * this.rightWings.length)
              ]
            this.particles.push(
              new Particle(
                wing.baseX - Math.random() * 50,
                wing.baseY + Math.random() * 20 - 10,
                this.wingColors[this.currentWingColor].glow,
                2 + Math.random() * 3,
                1 + Math.random(),
                (Math.random() - 0.5) * 2,
                60 + Math.random() * 40,
              ),
            )
          }

          // 更新粒子
          this.particles.forEach((p) => p.update())
          this.particles = this.particles.filter((p) => !p.isDead())

          // 限制粒子数量以优化移动端性能
          const maxParticles = isMobile ? 80 : 200
          if (this.particles.length > maxParticles) {
            this.particles = this.particles.slice(-maxParticles)
          }

          // 定期改变翅膀颜色
          if (
            Math.floor(this.time / 5000) !==
            Math.floor((this.time - deltaTime) / 5000)
          ) {
            this.currentWingColor =
              (this.currentWingColor + 1) % this.wingColors.length
            this.initWings()
          }
        }

        drawBackground() {
          // 渐变背景
          const gradient = ctx.createRadialGradient(
            width / 2,
            height / 2,
            0,
            width / 2,
            height / 2,
            Math.max(width, height),
          )
          gradient.addColorStop(0, '#1a1a3e')
          gradient.addColorStop(0.5, '#0f0f2a')
          gradient.addColorStop(1, '#050510')
          ctx.fillStyle = gradient
          ctx.fillRect(0, 0, width, height)

          // 星星 - 移动端减少数量
          const starCount = isMobile ? 50 : 100
          for (let i = 0; i < starCount; i++) {
            const x = (i * 137.5) % width
            const y = (i * 73.7) % height
            const size = 0.5 + Math.sin(this.time * 0.001 + i) * 0.5
            const twinkle = Math.sin(this.time * 0.005 + i * 0.5) * 0.5 + 0.5

            ctx.save()
            ctx.globalAlpha = twinkle * 0.8
            ctx.fillStyle = '#fff'
            ctx.shadowBlur = 10
            ctx.shadowColor = '#fff'
            ctx.beginPath()
            ctx.arc(x, y, size, 0, Math.PI * 2)
            ctx.fill()
            ctx.restore()
          }

          // 云朵
          this.clouds.forEach((cloud) => cloud.draw())
        }

        drawRibbon(x, y, ribbon) {
          ctx.save()
          ctx.strokeStyle = this.wingColors[this.currentWingColor].primary
          ctx.lineWidth = 3
          ctx.shadowBlur = 15
          ctx.shadowColor = this.wingColors[this.currentWingColor].glow
          ctx.lineCap = 'round'

          ctx.beginPath()
          for (let i = 0; i <= ribbon.length; i++) {
            const px = x - 20 - i * 0.5
            const py =
              y +
              50 +
              i * 0.3 +
              Math.sin(this.time * ribbon.frequency + ribbon.phase + i * 0.1) *
                ribbon.amplitude
            if (i === 0) ctx.moveTo(px, py)
            else ctx.lineTo(px, py)
          }
          ctx.stroke()
          ctx.restore()
        }

        drawCharacter() {
          const breathOffset = Math.sin(this.time * 0.003) * 3

          // 绘制飘带
          for (let i = 0; i < 2; i++) {
            this.drawRibbon(this.x, this.y, this.ribbons[i])
            this.drawRibbon(this.x, this.y, this.ribbons[i + 2])
          }

          // 发光效果
          ctx.save()
          const glowGradient = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            150,
          )
          glowGradient.addColorStop(
            0,
            `${this.wingColors[this.currentWingColor].glow}33`,
          )
          glowGradient.addColorStop(1, 'transparent')
          ctx.fillStyle = glowGradient
          ctx.beginPath()
          ctx.arc(this.x, this.y, 150, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()

          // 身体（古风长裙）
          ctx.save()
          ctx.translate(this.x, this.y)

          // 长裙
          const dressGradient = ctx.createLinearGradient(0, -20, 0, 100)
          dressGradient.addColorStop(0, '#e8d5f0')
          dressGradient.addColorStop(0.5, '#d4a5e8')
          dressGradient.addColorStop(1, '#9b59b6')

          ctx.fillStyle = dressGradient
          ctx.shadowBlur = 20
          ctx.shadowColor = '#9b59b6'

          ctx.beginPath()
          ctx.moveTo(-25, 0)
          ctx.quadraticCurveTo(-35, 50, -40 + breathOffset, 100)
          ctx.lineTo(40 - breathOffset, 100)
          ctx.quadraticCurveTo(35, 50, 25, 0)
          ctx.closePath()
          ctx.fill()

          // 裙子装饰
          ctx.strokeStyle = '#f1c40f'
          ctx.lineWidth = 2
          ctx.shadowColor = '#f1c40f'
          for (let i = 0; i < 3; i++) {
            ctx.beginPath()
            ctx.moveTo(-20 + i * 5, 20 + i * 25)
            ctx.quadraticCurveTo(0, 30 + i * 25, 20 - i * 5, 20 + i * 25)
            ctx.stroke()
          }

          // 上衣
          ctx.fillStyle = '#faf0fa'
          ctx.shadowBlur = 10
          ctx.beginPath()
          ctx.moveTo(-20, -40)
          ctx.lineTo(-25, 10)
          ctx.lineTo(25, 10)
          ctx.lineTo(20, -40)
          ctx.closePath()
          ctx.fill()

          // 衣领装饰
          ctx.strokeStyle = '#9b59b6'
          ctx.lineWidth = 2
          ctx.beginPath()
          ctx.moveTo(-15, -35)
          ctx.quadraticCurveTo(0, -25, 15, -35)
          ctx.stroke()

          // 袖子
          ctx.fillStyle = '#f5e6f5'
          ctx.shadowColor = '#9b59b6'

          // 左袖
          ctx.beginPath()
          ctx.moveTo(-20, -30)
          ctx.quadraticCurveTo(-60, -20, -70 + breathOffset, 20)
          ctx.quadraticCurveTo(-50, 30, -20, 10)
          ctx.closePath()
          ctx.fill()

          // 右袖
          ctx.beginPath()
          ctx.moveTo(20, -30)
          ctx.quadraticCurveTo(60, -20, 70 - breathOffset, 20)
          ctx.quadraticCurveTo(50, 30, 20, 10)
          ctx.closePath()
          ctx.fill()

          ctx.restore()

          // 头部
          ctx.save()
          ctx.translate(this.x, this.y - 55 + breathOffset)

          // 脸
          ctx.fillStyle = '#fce4d6'
          ctx.shadowBlur = 15
          ctx.shadowColor = '#fce4d6'
          ctx.beginPath()
          ctx.arc(0, 0, 18, 0, Math.PI * 2)
          ctx.fill()

          // 眼睛
          ctx.fillStyle = '#2c1810'
          ctx.beginPath()
          ctx.ellipse(-7, -2, 3, 4, 0, 0, Math.PI * 2)
          ctx.ellipse(7, -2, 3, 4, 0, 0, Math.PI * 2)
          ctx.fill()

          // 眼睛高光
          ctx.fillStyle = '#fff'
          ctx.beginPath()
          ctx.arc(-6, -3, 1.5, 0, Math.PI * 2)
          ctx.arc(8, -3, 1.5, 0, Math.PI * 2)
          ctx.fill()

          // 眉毛
          ctx.strokeStyle = '#2c1810'
          ctx.lineWidth = 1.5
          ctx.beginPath()
          ctx.moveTo(-12, -8)
          ctx.quadraticCurveTo(-7, -12, -2, -8)
          ctx.moveTo(12, -8)
          ctx.quadraticCurveTo(7, -12, 2, -8)
          ctx.stroke()

          // 嘴唇
          ctx.fillStyle = '#e74c3c'
          ctx.beginPath()
          ctx.arc(0, 5, 4, 0, Math.PI)
          ctx.fill()

          // 腮红
          ctx.fillStyle = 'rgba(255, 150, 150, 0.3)'
          ctx.beginPath()
          ctx.ellipse(-12, 2, 4, 2, 0, 0, Math.PI * 2)
          ctx.ellipse(12, 2, 4, 2, 0, 0, Math.PI * 2)
          ctx.fill()

          ctx.restore()

          // 发型
          ctx.save()
          ctx.translate(this.x, this.y - 55 + breathOffset)

          // 发髻基础
          const hairGradient = ctx.createRadialGradient(0, -5, 0, 0, -5, 30)
          hairGradient.addColorStop(0, '#1a1a2e')
          hairGradient.addColorStop(1, '#0f0f1a')
          ctx.fillStyle = hairGradient

          // 后发
          ctx.beginPath()
          ctx.arc(0, 5, 20, 0, Math.PI * 2)
          ctx.fill()

          // 发髻
          ctx.beginPath()
          ctx.arc(0, -15, 15, 0, Math.PI * 2)
          ctx.fill()

          // 发髻装饰 - 簪子
          ctx.strokeStyle = '#f1c40f'
          ctx.lineWidth = 2
          ctx.shadowBlur = 10
          ctx.shadowColor = '#f1c40f'
          ctx.beginPath()
          ctx.moveTo(0, -25)
          ctx.lineTo(15, -40)
          ctx.stroke()

          // 簪子头
          ctx.fillStyle = '#f1c40f'
          ctx.beginPath()
          ctx.arc(15, -40, 4, 0, Math.PI * 2)
          ctx.fill()

          // 发丝飘动
          ctx.strokeStyle = '#2c2c4a'
          ctx.lineWidth = 1
          for (let i = 0; i < 5; i++) {
            const offset = Math.sin(this.time * 0.003 + i) * 5
            ctx.beginPath()
            ctx.moveTo(-15 + i * 3, 10)
            ctx.quadraticCurveTo(
              -20 + i * 4 + offset,
              30,
              -25 + i * 5,
              50 + Math.sin(this.time * 0.002 + i) * 10,
            )
            ctx.stroke()
          }

          ctx.restore()

          // 绘制翅膀
          ctx.save()
          ctx.translate(this.x, this.y)

          // 翅膀光晕
          const wingGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 120)
          wingGlow.addColorStop(
            0,
            `${this.wingColors[this.currentWingColor].glow}44`,
          )
          wingGlow.addColorStop(
            0.5,
            `${this.wingColors[this.currentWingColor].primary}22`,
          )
          wingGlow.addColorStop(1, 'transparent')
          ctx.fillStyle = wingGlow
          ctx.beginPath()
          ctx.arc(0, 0, 120, 0, Math.PI * 2)
          ctx.fill()

          ctx.restore()

          // 绘制左右翅膀
          this.leftWings.forEach((wing) => wing.draw(ctx))
          this.rightWings.forEach((wing) => wing.draw(ctx))

          // 翅膀外发光
          this.leftWings.forEach((wing) => {
            ctx.save()
            ctx.globalAlpha = 0.3
            ctx.translate(wing.baseX, wing.baseY)
            ctx.rotate(wing.currentAngle)
            ctx.fillStyle = this.wingColors[this.currentWingColor].glow
            ctx.shadowBlur = 30
            ctx.shadowColor = this.wingColors[this.currentWingColor].glow
            ctx.beginPath()
            ctx.ellipse(
              wing.length * 0.5,
              0,
              wing.length * 0.3,
              wing.length * 0.08,
              0,
              0,
              Math.PI * 2,
            )
            ctx.fill()
            ctx.restore()
          })

          this.rightWings.forEach((wing) => {
            ctx.save()
            ctx.globalAlpha = 0.3
            ctx.translate(wing.baseX, wing.baseY)
            ctx.rotate(wing.currentAngle)
            ctx.fillStyle = this.wingColors[this.currentWingColor].glow
            ctx.shadowBlur = 30
            ctx.shadowColor = this.wingColors[this.currentWingColor].glow
            ctx.beginPath()
            ctx.ellipse(
              wing.length * 0.5,
              0,
              wing.length * 0.3,
              wing.length * 0.08,
              0,
              0,
              Math.PI * 2,
            )
            ctx.fill()
            ctx.restore()
          })
        }

        drawParticles() {
          this.particles.forEach((p) => p.draw())
        }
      }

      // 创建角色
      const character = new GuFengCharacter()

      // 触控交互
      let touchTarget = { x: width / 2, y: height / 2 }
      let isTouching = false

      function getTouchPos(e) {
        const rect = canvas.getBoundingClientRect()
        if (e.touches && e.touches.length > 0) {
          return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top,
          }
        }
        return { x: e.clientX - rect.left, y: e.clientY - rect.top }
      }

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault()
        isTouching = true
        touchTarget = getTouchPos(e)
        // 触发震动反馈
        if (navigator.vibrate) navigator.vibrate(10)
        // 触摸时增加粒子
        for (let i = 0; i < 15; i++) {
          character.particles.push(
            new Particle(
              touchTarget.x + (Math.random() - 0.5) * 40,
              touchTarget.y + (Math.random() - 0.5) * 40,
              character.wingColors[character.currentWingColor].glow,
              3 + Math.random() * 5,
              (Math.random() - 0.5) * 4,
              (Math.random() - 0.5) * 4,
              80 + Math.random() * 40,
            ),
          )
        }
      }, { passive: false })

      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault()
        touchTarget = getTouchPos(e)
      }, { passive: false })

      canvas.addEventListener('touchend', () => {
        isTouching = false
      })

      canvas.addEventListener('mousedown', (e) => {
        isTouching = true
        touchTarget = getTouchPos(e)
        for (let i = 0; i < 15; i++) {
          character.particles.push(
            new Particle(
              touchTarget.x + (Math.random() - 0.5) * 40,
              touchTarget.y + (Math.random() - 0.5) * 40,
              character.wingColors[character.currentWingColor].glow,
              3 + Math.random() * 5,
              (Math.random() - 0.5) * 4,
              (Math.random() - 0.5) * 4,
              80 + Math.random() * 40,
            ),
          )
        }
      })

      canvas.addEventListener('mousemove', (e) => {
        if (isTouching) {
          touchTarget = getTouchPos(e)
        }
      })

      canvas.addEventListener('mouseup', () => {
        isTouching = false
      })

      // 动画循环
      let lastTime = 0
      function animate(currentTime) {
        const deltaTime = currentTime - lastTime
        lastTime = currentTime

        // 清空画布
        ctx.clearRect(0, 0, width, height)

        // 绘制背景
        character.drawBackground()

        // 更新和绘制
        character.update(deltaTime)
        character.drawParticles()
        character.drawCharacter()

        requestAnimationFrame(animate)
      }

      animate(0)
    </script>
  </body>
</html>
