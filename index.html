<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>翠在江湖5.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            background: #1a1a2e;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .ui-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .stats {
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 10px;
            color: #fff;
            font-family: 'SimHei', sans-serif;
            font-size: 16px;
            border: 2px solid #f1c40f;
        }
        .stats div {
            margin: 5px 0;
        }
        .level-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'SimHei', sans-serif;
            font-size: 48px;
            color: #f1c40f;
            text-shadow: 0 0 20px #f39c12, 0 0 40px #e74c3c;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 20;
        }
        .controls-hint {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-family: sans-serif;
            pointer-events: none;
            text-align: center;
        }
        .game-over, .level-complete {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .game-over h1 {
            font-size: 60px;
            color: #e74c3c;
            text-shadow: 0 0 30px #c0392b;
            margin-bottom: 30px;
        }
        .level-complete h1 {
            font-size: 48px;
            color: #f1c40f;
            text-shadow: 0 0 30px #f39c12;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            font-family: 'SimHei', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #9b59b6;
        }
        .skill-bar {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .skill-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .skill-btn.active {
            border-color: #f1c40f;
            box-shadow: 0 0 15px #f1c40f;
        }
        .skill-btn.locked {
            opacity: 0.4;
            border-color: #666;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div class="ui-overlay">
        <div class="stats">
            <div style="font-size:20px;font-weight:bold;color:#f1c40f;">👑 翠翠</div>
            <div>关卡: <span id="level">1</span>/20</div>
            <div>生命: <span id="hp">100</span></div>
            <div>金币: <span id="gold">0</span></div>
            <div>技能: <span id="currentSkill">火焰</span></div>
            <div>击杀: <span id="kills">0</span></div>
        </div>
        <!-- 进度条 - 移到顶部右侧 -->
        <div style="background:rgba(0,0,0,0.7);padding:10px 15px;border-radius:10px;border:2px solid #f1c40f;min-width:180px;">
            <div style="color:#f1c40f;font-size:12px;text-align:center;margin-bottom:5px;">🏁 距终点: <span id="distance">2800</span>m</div>
            <div style="background:#333;height:10px;border-radius:5px;overflow:hidden;">
                <div id="progressBar" style="background:linear-gradient(90deg,#27ae60,#2ecc71);height:100%;width:0%;transition:width 0.3s;border-radius:5px;"></div>
            </div>
        </div>
    </div>

    <div class="level-title" id="levelTitle"></div>
    <div class="controls-hint">方向键/WASD移动 | 空格跳跃 | S下蹲 | J攻击 | K技能 | L翻跟头 | 1-5切换技能</div>

    <div class="skill-bar" id="skillBar"></div>

    <div class="game-over" id="gameOver">
        <h1>游戏结束</h1>
        <p style="color:#fff;font-size:20px;margin-bottom:20px;">坚持到第 <span id="finalLevel">1</span> 关</p>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <div class="level-complete" id="levelComplete">
        <h1>关卡完成!</h1>
        <p style="color:#fff;font-size:16px;margin-bottom:15px;">获得金币: <span id="levelGold">0</span></p>
        <button class="btn" onclick="nextLevel()" style="padding:12px 30px;font-size:18px;">下一关 ▶</button>
    </div>

    <!-- 奖励图片弹窗 -->
    <div id="rewardModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;flex-direction:column;justify-content:center;align-items:center;">
        <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:15px;border-radius:15px;border:2px solid #f1c40f;text-align:center;width:85%;max-width:350px;">
            <h2 style="color:#f1c40f;margin-bottom:10px;font-size:20px;">🎉 通关奖励 🎉</h2>
            <p style="color:#fff;margin-bottom:10px;font-size:14px;">第 <span id="rewardLevel">1</span> 关奖励</p>
            <div style="max-width:100%;max-height:50vh;overflow:hidden;border-radius:8px;border:2px solid #fff;box-shadow:0 0 20px rgba(241,196,15,0.5);">
                <img id="rewardImage" src="" style="max-width:100%;max-height:50vh;display:block;" />
            </div>
            <p style="color:#aaa;margin:10px 0;font-size:11px;">长按或右键保存图片</p>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;">
                <button class="btn" onclick="saveRewardImage()" style="background:linear-gradient(135deg,#27ae60,#2ecc71);padding:10px 20px;font-size:14px;">💾 保存</button>
                <button class="btn" onclick="closeRewardModal()" style="padding:10px 20px;font-size:14px;">继续 ▶</button>
            </div>
        </div>
    </div>

    <!-- 全家福弹窗 - 通关后展示所有图片 -->
    <div id="galleryModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:2000;flex-direction:column;justify-content:center;align-items:center;overflow-y:auto;">
        <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;border-radius:20px;border:3px solid #f1c40f;max-width:95%;max-height:95%;text-align:center;">
            <h2 style="color:#f1c40f;margin-bottom:10px;font-size:28px;">🎊 通关全家福 🎊</h2>
            <p style="color:#fff;margin-bottom:15px;font-size:16px;">恭喜你完成了全部20关！</p>
            <p style="color:#f1c40f;margin-bottom:20px;font-size:14px;">以下是您收集的所有奖励照片</p>
            <div id="galleryContainer" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;max-width:100%;overflow-y:auto;max-height:60vh;padding:10px;">
                <!-- 图片将由JS生成 -->
            </div>
            <div style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-top:20px;">
                <button class="btn" onclick="saveAllImages()" style="background:linear-gradient(135deg,#27ae60,#2ecc71);padding:12px 30px;font-size:16px;">💾 保存全部图片</button>
                <button class="btn" onclick="closeGalleryModal()" style="padding:12px 30px;font-size:16px;">🏠 返回主页</button>
            </div>
        </div>
    </div>

    <script>
        // 奖励图片URL数组
        const REWARD_IMAGES = [
            'https://img0.baidu.com/it/u=2010058606,1710590098&fm=253&app=138&f=JPEG?w=800&h=1166',
            'https://img1.baidu.com/it/u=2322024496,3666164677&fm=253&app=138&f=JPEG?w=800&h=1200',
            'https://img0.baidu.com/it/u=2372888365,2126232960&fm=253&app=138&f=JPEG?w=800&h=1245',
            'https://img0.baidu.com/it/u=1104031880,577806673&fm=253&app=138&f=JPEG?w=800&h=1237',
            'https://b0.bdstatic.com/2aab2640d5d9ea583a246a82096337bd.jpg',
            'https://img0.baidu.com/it/u=1309354228,3158981804&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1067',
            'https://img0.baidu.com/it/u=1309354228,3158981804&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1067',
            'https://img2.baidu.com/it/u=3939069523,2537578307&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1200',
            'https://img1.baidu.com/it/u=3665855494,904858679&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=667',
            'https://b0.bdstatic.com/ugc/AXD_x9BPT4A8hWkkHj_V_Ae04b2c5ffc7267b8e14a898ecfacc1ac.jpg',
            'https://b0.bdstatic.com/ugc/MemEBaFp6a1fYepR8cB05w2ed622ec3c3a081321bf15063bc8fc4d.jpg@h_1280'
        ];
        let currentRewardIndex = 0;
        let currentRewardLevel = 0;

        function showRewardModal(level) {
            // 奇数关卡显示奖励
            if (level % 2 === 1) {
                currentRewardIndex = (Math.floor(level / 2)) % REWARD_IMAGES.length;
                currentRewardLevel = level;
                document.getElementById('rewardLevel').textContent = level;
                document.getElementById('rewardImage').src = REWARD_IMAGES[currentRewardIndex];
                document.getElementById('rewardModal').style.display = 'flex';
                return true;
            }
            return false;
        }

        function closeRewardModal() {
            document.getElementById('rewardModal').style.display = 'none';
            if (gameState === 'levelComplete') {
                // 自动进入下一关
                setTimeout(() => {
                    document.getElementById('levelComplete').style.display = 'flex';
                }, 100);
            }
        }

        function saveRewardImage() {
            const img = document.getElementById('rewardImage');
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `reward_level_${currentRewardLevel}.jpg`;
            link.target = '_blank';

            // 使用fetch获取图片后保存
            fetch(img.src)
                .then(response => response.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                })
                .catch(err => {
                    // 如果fetch失败，尝试直接打开新窗口
                    window.open(img.src, '_blank');
                });

            // 提示保存成功
            alert('图片已开始下载！如果下载未开始，请右键点击图片选择"另存为"');
        }

        // 显示全家福画廊
        function showGallery() {
            const gallery = document.getElementById('galleryContainer');
            gallery.innerHTML = '';

            // 生成所有图片卡片
            REWARD_IMAGES.forEach((imgUrl, index) => {
                const card = document.createElement('div');
                card.style.cssText = 'background:#2a2a4a;border-radius:10px;padding:10px;border:2px solid #f1c40f;';
                card.innerHTML = `
                    <div style="position:relative;overflow:hidden;border-radius:8px;margin-bottom:8px;">
                        <img src="${imgUrl}" style="width:100%;height:auto;display:block;transition:transform 0.3s;"
                             onmouseover="this.style.transform='scale(1.05)'"
                             onmouseout="this.style.transform='scale(1)'"/>
                    </div>
                    <p style="color:#f1c40f;font-size:12px;margin:0;">第 ${index * 2 + 1} 关奖励</p>
                    <button onclick="saveSingleImage('${imgUrl}', ${index})" style="margin-top:8px;padding:6px 15px;background:#27ae60;border:none;border-radius:5px;color:#fff;cursor:pointer;font-size:12px;">💾 保存</button>
                `;
                gallery.appendChild(card);
            });

            document.getElementById('galleryModal').style.display = 'flex';
        }

        // 保存单张图片
        function saveSingleImage(url, index) {
            const link = document.createElement('a');
            link.href = url;
            link.download = `reward_${index + 1}.jpg`;

            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const urlObj = URL.createObjectURL(blob);
                    link.href = urlObj;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(urlObj);
                })
                .catch(() => {
                    window.open(url, '_blank');
                });
        }

        // 保存全部图片
        function saveAllImages() {
            let savedCount = 0;
            REWARD_IMAGES.forEach((url, index) => {
                setTimeout(() => {
                    saveSingleImage(url, index);
                    savedCount++;
                    if (savedCount === REWARD_IMAGES.length) {
                        alert('所有图片下载已开始！如果未开始下载，请滚动页面后手动保存。');
                    }
                }, index * 500); // 每500ms保存一张，避免浏览器阻止
            });
        }

        // 关闭全家福弹窗
        function closeGalleryModal() {
            document.getElementById('galleryModal').style.display = 'none';
        }

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let W, H;
        const TILE = 40;
        const GRAVITY = 0.6;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
            W = Math.min(window.innerWidth, 1200);
            H = Math.min(window.innerHeight, 600);
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        resize();
        window.addEventListener('resize', resize);

        // 加载头像
        const playerImg = new Image();
        playerImg.src = './cuicui.jpg';
        let playerImgLoaded = false;
        playerImg.onload = () => playerImgLoaded = true;

        // 翅膀颜色配置
        const WING_COLORS = [
            { primary: '#6366f1', secondary: '#8b5cf6', glow: '#a855f7' },
            { primary: '#06b6d4', secondary: '#3b82f6', glow: '#60a5fa' },
            { primary: '#ec4899', secondary: '#f472b6', glow: '#fb7185' }
        ];
        let currentWingColor = 0;

        // 翅膀羽毛类
        class WingFeather {
            constructor(x, y, angle, length, color, isLeft) {
                this.baseX = x;
                this.baseY = y;
                this.angle = angle;
                this.length = length;
                this.color = color;
                this.isLeft = isLeft;
                this.phase = Math.random() * Math.PI * 2;
                this.waveAmplitude = 0.15 + Math.random() * 0.1;
            }

            update(time, breathOffset) {
                this.currentAngle = this.angle + Math.sin(time * 0.005 + this.phase) * this.waveAmplitude + breathOffset * 0.3;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.baseX, this.baseY);
                ctx.rotate(this.currentAngle);

                // 羽毛渐变
                const gradient = ctx.createLinearGradient(0, 0, this.length, 0);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.lightenColor(this.color, 40));
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.5)');

                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(this.length * 0.5, -this.length * 0.2, this.length, 0);
                ctx.quadraticCurveTo(this.length * 0.5, this.length * 0.2, 0, 0);
                ctx.fill();

                ctx.restore();
            }

            lightenColor(color, amount) {
                const hex = color.replace('#', '');
                const r = Math.min(255, parseInt(hex.substr(0, 2), 16) + amount);
                const g = Math.min(255, parseInt(hex.substr(2, 2), 16) + amount);
                const b = Math.min(255, parseInt(hex.substr(4, 2), 16) + amount);
                return `rgb(${r}, ${g}, ${b})`;
            }
        }

        // 初始化翅膀
        const leftWings = [];
        const rightWings = [];

        function initWings() {
            leftWings.length = 0;
            rightWings.length = 0;

            const color = WING_COLORS[currentWingColor].primary;

            // 左翅膀 - 6片羽毛，前后扇动
            for (let i = 0; i < 6; i++) {
                const angle = -Math.PI * 0.7 - (i * 0.15);
                const length = 50 + Math.sin(i * 0.5) * 15;
                leftWings.push(new WingFeather(0, 0, angle, length, color, true));
            }

            // 右翅膀 - 6片羽毛，前后扇动
            for (let i = 0; i < 6; i++) {
                const angle = -Math.PI * 0.3 + (i * 0.15);
                const length = 50 + Math.sin(i * 0.5) * 15;
                rightWings.push(new WingFeather(0, 0, angle, length, color, false));
            }
        }
        initWings();

        // 游戏时间
        let gameTime = 0;

        // 技能配置
        const SKILLS = [
            { name: '火焰', icon: '🔥', color: '#e74c3c', bulletColor: '#f39c12', speed: 12, damage: 20, size: 15 },
            { name: '风暴', icon: '🌀', color: '#3498db', bulletColor: '#85c1e9', speed: 15, damage: 15, size: 20, pierce: true },
            { name: '雷电', icon: '⚡', color: '#f1c40f', bulletColor: '#fff', speed: 20, damage: 35, size: 12, chain: true },
            { name: '光剑', icon: '⚔️', color: '#9b59b6', bulletColor: '#e8daef', speed: 18, damage: 50, size: 10, range: 100 },
            { name: '冰霜', icon: '❄️', color: '#00cec9', bulletColor: '#81ecec', speed: 10, damage: 12, size: 18, freeze: true }
        ];

        // 恐怖Boss配置 - 超大型Boss
        const BOSSES = {
            '疯狂的嘉姐': {
                hp: 800, speed: 3, damage: 30, color: '#ff0066', size: 150,
                pattern: 'berserker', gold: 500,
                canShoot: true, shootRate: 40, bulletSpeed: 8, bulletDamage: 20,
                special: 'rage' // 低血量时狂暴
            },
            '超变态的许嘉': {
                hp: 1500, speed: 4, damage: 40, color: '#cc00ff', size: 180,
                pattern: 'teleport', gold: 800,
                canShoot: true, shootRate: 30, bulletSpeed: 10, bulletDamage: 25,
                special: 'summon' // 召唤小怪
            },
            '吸血恶魔万总': {
                hp: 2500, speed: 3, damage: 50, color: '#8b0000', size: 200,
                pattern: 'vampire', gold: 1200,
                canShoot: true, shootRate: 25, bulletSpeed: 12, bulletDamage: 35,
                special: 'drain', drainAmount: 10 // 吸血
            },
            '终极二婶': {
                hp: 5000, speed: 5, damage: 60, color: '#4a0080', size: 250,
                pattern: 'ultimate', gold: 2000,
                canShoot: true, shootRate: 20, bulletSpeed: 14, bulletDamage: 45,
                special: 'multishot', bulletCount: 5 // 多重射击
            }
        };

        // 普通敌人配置 - 增强难度
        const ENEMIES = {
            '嘉姐': { hp: 120, speed: 3, damage: 20, color: '#e91e63', size: 70, pattern: 'chase', gold: 50 },
            '万总': { hp: 250, speed: 2.5, damage: 30, color: '#673ab7', size: 85, pattern: 'patrol', gold: 100 },
            '二叔': { hp: 350, speed: 2, damage: 35, color: '#ff5722', size: 95, pattern: 'shoot', gold: 150, canShoot: true },
            '二婶': { hp: 500, speed: 1.5, damage: 45, color: '#795548', size: 110, pattern: 'boss', gold: 300, canShoot: true }
        };

        // Boss出现规则
        function getBossForLevel(level) {
            if (level >= 18) return '终极二婶';
            if (level >= 14) return '吸血恶魔万总';
            if (level >= 10) return '超变态的许嘉';
            if (level >= 6) return '疯狂的嘉姐';
            return null;
        }

        // 关卡配置 - 增强难度
        const LEVELS = [];
        for (let i = 1; i <= 20; i++) {
            const difficultyMultiplier = i > 10 ? 2 : 0.6; // 前10关降低难度，后10关适度增加
            LEVELS.push({
                name: `第${i}关`,
                platforms: generatePlatforms(i),
                enemies: generateEnemies(i),
                bgColor: `hsl(${(i * 18) % 360}, 30%, ${25 - Math.min(i, 10)}%)`,
                groundColor: `hsl(${(i * 18 + 60) % 360}, 50%, ${35 - Math.min(i, 15)}%)`,
                enemyCount: Math.min(5 + Math.floor(i * 1.5), 15) * Math.max(difficultyMultiplier, 1),

        // 技能UI

        // 初始化关卡
        function initLevel(level) {
            const config = LEVELS[level - 1];
            platforms = config.platforms.map(p => ({...p, ox: p.x}));
            enemies = config.enemies.map(e => ({...e, maxHp: e.hp}));
