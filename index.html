            t.y + player.h / 2,
            player.w / 2,
            (player.h / 2) * 0.8,
            0,
            0,
            Math.PI * 2,
          )
          ctx.fill()
          ctx.restore()
        })

        ctx.save()

        // 翻跟头时特殊效果
        if (player.rolling) {
          ctx.shadowBlur = 30
          ctx.shadowColor = '#f1c40f'
        }

        // 无敌闪烁
        if (
          player.invincible > 0 &&
          Math.floor(player.invincible / 5) % 2 === 0
        ) {
          ctx.globalAlpha = 0.5
        }

        // 身体
        const h = player.crouching ? player.h * 0.6 : player.h
        const yOffset = player.crouching ? player.h * 0.4 : 0

        // 翅膀参数 - Z轴煽动效果（面向玩家视角）
        const wingLevel = Math.min(Math.floor(player.damageBoost * 5) + 1, 6)
        const wingColor = WING_COLORS[currentWingColor].primary
        const wingGlow = WING_COLORS[currentWingColor].glow
        const flapSpeed = 0.01 + wingLevel * 0.003
        const flapAmplitude = 10 + wingLevel * 3 // 翅膀上下煽动幅度
        const wingScale = 1 + wingLevel * 0.15

        // Z轴煽动：翅膀垂直上下煽动（面向玩家的视角）
        const flapPhase = Math.sin(gameTime * flapSpeed)
        const wingTipY = flapPhase * flapAmplitude // 翅膀尖端Y偏移

        // 绘制翅膀 - 在角色两侧，垂直上下煽动
        ctx.save()

        // 左翅膀 - 左侧
        for (let i = 0; i < 4; i++) {
          const featherLength = (50 + i * 8) * wingScale
          const featherYOffset = i * 8 * wingScale // 每片羽毛稍微靠下
          const tipY = wingTipY * (1 - i * 0.15) // 根部偏移小，尖端偏移大

          const gradient = ctx.createLinearGradient(
            centerX - 20,
            centerY - featherYOffset,
            centerX - 20 - featherLength,
            centerY - featherYOffset + tipY,
          )
          gradient.addColorStop(0, wingColor)
          gradient.addColorStop(0.6, wingColor)
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)')

          ctx.fillStyle = gradient
          ctx.shadowBlur = 10 * wingScale
          ctx.shadowColor = wingGlow

          ctx.beginPath()
          // 羽毛形状 - 从身体向外延伸
          ctx.moveTo(centerX - 10, centerY - 10 - featherYOffset)
          ctx.quadraticCurveTo(
            centerX - 20 - featherLength * 0.5,
            centerY - 15 - featherYOffset + tipY * 0.5,
            centerX - 20 - featherLength,
            centerY - 10 - featherYOffset + tipY,
          )
          ctx.quadraticCurveTo(
            centerX - 20 - featherLength * 0.5,
            centerY - 5 - featherYOffset + tipY * 0.5,
            centerX - 10,
            centerY - 5 - featherYOffset,
          )
          ctx.closePath()
          ctx.fill()
        }

        // 右翅膀 - 右侧（镜像）
        for (let i = 0; i < 4; i++) {
          const featherLength = (50 + i * 8) * wingScale
          const featherYOffset = i * 8 * wingScale
          const tipY = wingTipY * (1 - i * 0.15)

          const gradient = ctx.createLinearGradient(
            centerX + 20,
            centerY - featherYOffset,
            centerX + 20 + featherLength,
            centerY - featherYOffset + tipY,
          )
          gradient.addColorStop(0, wingColor)
          gradient.addColorStop(0.6, wingColor)
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)')

          ctx.fillStyle = gradient
          ctx.shadowBlur = 10 * wingScale
          ctx.shadowColor = wingGlow

          ctx.beginPath()
          ctx.moveTo(centerX + 10, centerY - 10 - featherYOffset)
          ctx.quadraticCurveTo(
            centerX + 20 + featherLength * 0.5,
            centerY - 15 - featherYOffset + tipY * 0.5,
            centerX + 20 + featherLength,
            centerY - 10 - featherYOffset + tipY,
          )
          ctx.quadraticCurveTo(
            centerX + 20 + featherLength * 0.5,
            centerY - 5 - featherYOffset + tipY * 0.5,
            centerX + 10,
            centerY - 5 - featherYOffset,
          )
          ctx.closePath()
          ctx.fill()
        }

        // 翅膀光晕 - 在翅膀后面
        ctx.globalAlpha = 0.15 + wingLevel * 0.03
        const glowGrad = ctx.createRadialGradient(
          centerX,
          centerY,
          0,
          centerX,
          centerY,
          80 * wingScale,
        )
        glowGrad.addColorStop(0, wingGlow)
        glowGrad.addColorStop(1, 'transparent')
        ctx.fillStyle = glowGrad
        ctx.beginPath()
        ctx.ellipse(
          centerX,
          centerY,
          90 * wingScale,
          60 * wingScale,
          0,
          0,
          Math.PI * 2,
        )
        ctx.fill()
        ctx.globalAlpha = 1

        ctx.restore()

        // 翠魔变身特效
        const demonScale = player.demonForm ? 1.5 : 1
        const demonOffsetX = player.demonForm ? -player.w * 0.25 : 0
        const demonOffsetY = player.demonForm ? -player.h * 0.25 : 0

        // 变身时添加额外特效
        if (player.demonForm) {
          ctx.save()
          // 暗黑光环
          ctx.globalAlpha = 0.3 + Math.sin(gameTime * 0.02) * 0.1
          const demonGlow = ctx.createRadialGradient(
            centerX, centerY, 0,
            centerX, centerY, 100
          )
          demonGlow.addColorStop(0, '#8b0000')
          demonGlow.addColorStop(0.5, '#4a0080')
          demonGlow.addColorStop(1, 'transparent')
          ctx.fillStyle = demonGlow
          ctx.beginPath()
          ctx.arc(centerX, centerY, 100, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()

          // 恶魔角特效
          ctx.save()
          ctx.fillStyle = '#4a0000'
          ctx.shadowBlur = 15
          ctx.shadowColor = '#ff0000'
          // 左角
          ctx.beginPath()
          ctx.moveTo(centerX - 15, sy + yOffset - 10)
          ctx.lineTo(centerX - 25, sy + yOffset - 35)
          ctx.lineTo(centerX - 5, sy + yOffset - 15)
          ctx.closePath()
          ctx.fill()
          // 右角
          ctx.beginPath()
          ctx.moveTo(centerX + 15, sy + yOffset - 10)
          ctx.lineTo(centerX + 25, sy + yOffset - 35)
          ctx.lineTo(centerX + 5, sy + yOffset - 15)
          ctx.closePath()
          ctx.fill()
          ctx.restore()
        }

        // 身体阴影
        ctx.fillStyle = 'rgba(0,0,0,0.3)'
        ctx.beginPath()
        ctx.ellipse(centerX, H - 60, player.w / 2 + 5, 8, 0, 0, Math.PI * 2)
        ctx.fill()

        // 古风服装 - 正面视图（变身时变黑紫色）
        const dressColor1 = player.demonForm ? '#2a0040' : '#9b59b6'
        const dressColor2 = player.demonForm ? '#1a002a' : '#8e44ad'
        const dressGrad = ctx.createLinearGradient(sx, sy, sx, sy + h)
        dressGrad.addColorStop(0, dressColor1)
        dressGrad.addColorStop(1, dressColor2)
        ctx.fillStyle = dressGrad

        // 长裙 - 正面向（使用变身后的大小）
        ctx.beginPath()
        ctx.moveTo(sx + demonOffsetX + 5, sy + demonOffsetY + yOffset + 20)
        ctx.lineTo(sx + demonOffsetX - 5, sy + demonOffsetY + h)
        ctx.lineTo(sx + demonOffsetX + player.w + 5, sy + demonOffsetY + h)
        ctx.lineTo(sx + demonOffsetX + player.w - 5, sy + demonOffsetY + yOffset + 20)
        ctx.closePath()
        ctx.fill()

        // 裙子装饰线条（变身时变红色）
        ctx.strokeStyle = player.demonForm ? '#ff0000' : '#f1c40f'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(centerX, sy + demonOffsetY + yOffset + 25)
        ctx.lineTo(centerX, sy + demonOffsetY + h - 5)
        ctx.stroke()

        // 腰带（变身时变红色）
        ctx.fillStyle = player.demonForm ? '#ff0000' : '#f1c40f'
        ctx.fillRect(sx + demonOffsetX + 3, sy + demonOffsetY + yOffset + 20, player.w - 6, 8)

        // 上身 - 正面（变身时变暗色）
        ctx.fillStyle = player.demonForm ? '#3a0030' : '#faf0fa'
        ctx.fillRect(sx + demonOffsetX + 5, sy + demonOffsetY + yOffset, player.w - 10, 25)

        // 袖子 - 正面展开（变身时变暗色）
        const sleeveWave = Math.sin(player.animation) * 3
        ctx.fillStyle = player.demonForm ? '#2a0020' : '#f5e6f5'

        // 左袖子
        ctx.beginPath()
        ctx.moveTo(sx + demonOffsetX + 5, sy + demonOffsetY + yOffset + 5)
        ctx.lineTo(sx + demonOffsetX - 10, sy + demonOffsetY + yOffset + 15 + sleeveWave)
        ctx.lineTo(sx + demonOffsetX - 5, sy + demonOffsetY + yOffset + 35)
        ctx.lineTo(sx + demonOffsetX + 5, sy + demonOffsetY + yOffset + 25)
        ctx.closePath()
        ctx.fill()

        // 右袖子
        ctx.beginPath()
        ctx.moveTo(sx + demonOffsetX + player.w - 5, sy + demonOffsetY + yOffset + 5)
        ctx.lineTo(sx + demonOffsetX + player.w + 10, sy + demonOffsetY + yOffset + 15 + sleeveWave)
        ctx.lineTo(sx + demonOffsetX + player.w + 5, sy + demonOffsetY + yOffset + 35)
        ctx.lineTo(sx + demonOffsetX + player.w - 5, sy + demonOffsetY + yOffset + 25)
        ctx.closePath()
        ctx.fill()

        // 头部 - 正面（变身时变暗色）
        ctx.fillStyle = player.demonForm ? '#3a2040' : '#fce4d6'
        ctx.beginPath()
        ctx.arc(centerX, sy + demonOffsetY + yOffset - 5, 15, 0, Math.PI * 2)
        ctx.fill()

        // 头像
        if (playerImgLoaded) {
          ctx.save()
          ctx.beginPath()
          ctx.arc(centerX, sy + demonOffsetY + yOffset - 5, 15, 0, Math.PI * 2)
          ctx.clip()
          ctx.drawImage(playerImg, centerX - 15, sy + yOffset - 20, 30, 30)
          ctx.restore()
        }

        // 发髻 - 正面两个发髻
        ctx.fillStyle = '#2c2c4a'
        ctx.beginPath()
        ctx.ellipse(
          centerX - 12,
          sy + yOffset - 18,
          8,
          10,
          -0.3,
          0,
          Math.PI * 2,
        )
        ctx.fill()
        ctx.beginPath()
        ctx.ellipse(centerX + 12, sy + yOffset - 18, 8, 10, 0.3, 0, Math.PI * 2)
        ctx.fill()

        // 中间头发
        ctx.beginPath()
        ctx.ellipse(centerX, sy + demonOffsetY + yOffset - 18, 6, 8, 0, 0, Math.PI * 2)
        ctx.fill()

        // 变身时添加恶魔眼睛
        if (player.demonForm) {
          ctx.save()
          ctx.shadowBlur = 10
          ctx.shadowColor = '#ff0000'
          ctx.fillStyle = '#ff0000'
          // 左眼
          ctx.beginPath()
          ctx.ellipse(centerX - 6, sy + demonOffsetY + yOffset - 3, 4, 3, 0, 0, Math.PI * 2)
          ctx.fill()
          // 右眼
          ctx.beginPath()
          ctx.ellipse(centerX + 6, sy + demonOffsetY + yOffset - 3, 4, 3, 0, 0, Math.PI * 2)
          ctx.fill()
          // 眼睛高光
          ctx.fillStyle = '#ffff00'
          ctx.beginPath()
          ctx.arc(centerX - 5, sy + demonOffsetY + yOffset - 4, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.arc(centerX + 7, sy + demonOffsetY + yOffset - 4, 1.5, 0, Math.PI * 2)
          ctx.fill()
          ctx.restore()
        }

        // 装饰发簪（变身时变红色）
        ctx.fillStyle = player.demonForm ? '#ff0000' : '#f1c40f'
        ctx.beginPath()
        ctx.arc(centerX, sy + demonOffsetY + yOffset - 25, 3, 0, Math.PI * 2)
        ctx.fill()

        // 移动动画
        if (Math.abs(player.vx) > 0 && player.grounded) {
          const bobY = Math.sin(player.animation * 2) * 2
          ctx.translate(0, bobY)
        }

        // 翠翠/翠魔名字标签
        ctx.fillStyle = player.demonForm ? '#ff0000' : '#f1c40f'
        ctx.font = 'bold 14px sans-serif'
        ctx.textAlign = 'center'
        ctx.shadowBlur = 5
        ctx.shadowColor = '#000'
        ctx.fillText(player.demonForm ? '翠魔' : '翠翠', centerX, sy + yOffset - 35)
        ctx.shadowBlur = 0

        ctx.restore()

        // 翅膀高级特效 - 随等级增加（简化）
        if (wingLevel >= 4) {
          ctx.save()
          ctx.globalAlpha = 0.2
          ctx.strokeStyle = wingColor
          ctx.lineWidth = 1.5
          ctx.shadowBlur = 10
          ctx.shadowColor = wingGlow
          // 左翅膀光环
          ctx.beginPath()
          ctx.ellipse(
            centerX - 50 * wingScale,
            centerY,
            25 + wingLevel * 3,
            15,
            0,
            0,
            Math.PI * 2,
          )
          ctx.stroke()
          // 右翅膀光环
          ctx.beginPath()
          ctx.ellipse(
            centerX + 50 * wingScale,
            centerY,
            25 + wingLevel * 3,
            15,
            0,
            0,
            Math.PI * 2,
          )
          ctx.stroke()
          ctx.restore()
        }

        // 终极特效 - 等级5以上（简化粒子）
        if (wingLevel >= 5) {
          for (let i = 0; i < 2; i++) {
            const particleAngle =
              (gameTime * 0.008 + i * ((Math.PI * 2) / 2)) % (Math.PI * 2)
            const particleR = 60 + Math.sin(gameTime * 0.01 + i) * 10
            const px = centerX + Math.cos(particleAngle) * particleR
            const py = centerY + Math.sin(particleAngle) * particleR * 0.5
            ctx.save()
            ctx.globalAlpha = 0.4
            ctx.fillStyle = wingColor
            ctx.shadowBlur = 5
            ctx.shadowColor = wingGlow
            ctx.beginPath()
            ctx.arc(px, py, 3, 0, Math.PI * 2)
            ctx.fill()
            ctx.restore()
          }
        }
      }

      // 绘制敌人
      function drawEnemies() {
        enemies.forEach((e) => {
          const sx = e.x - cameraX
          const size = e.size || 40

          ctx.save()

          // 受伤闪烁
          if (e.hp < e.maxHp) {
            ctx.globalAlpha = 0.9
          }

          // 身体 - 恐怖风格
          ctx.fillStyle = e.color

          // 根据类型绘制不同恐怖形状
          if (e.pattern === 'boss') {
            // Boss - 更恐怖
            ctx.shadowBlur = 20
            ctx.shadowColor = '#8b0000'

            ctx.beginPath()
            ctx.moveTo(sx, e.y + size * 0.3)
            ctx.lineTo(sx - size * 0.2, e.y + size)
            ctx.lineTo(sx + size + size * 0.2, e.y + size)
            ctx.lineTo(sx + size, e.y + size * 0.3)
            ctx.closePath()
            ctx.fill()

            // 恐怖王冠
            ctx.fillStyle = '#8b0000'
            ctx.beginPath()
            ctx.moveTo(sx + size / 2, e.y - 15)
            ctx.lineTo(sx + size / 2 - 10, e.y + 5)
            ctx.lineTo(sx + size / 2, e.y)
            ctx.lineTo(sx + size / 2 + 10, e.y + 5)
            ctx.closePath()
            ctx.fill()
          } else {
            // 普通敌人 - 恐怖化
            ctx.shadowBlur = 15
            ctx.shadowColor = e.color

            // 扭曲的身体形状
            ctx.beginPath()
            ctx.moveTo(sx + size / 2, e.y)
            ctx.lineTo(sx + size, e.y + size * 0.2)
            ctx.lineTo(sx + size * 0.9, e.y + size * 0.5)
            ctx.lineTo(sx + size, e.y + size * 0.8)
            ctx.lineTo(sx + size * 0.7, e.y + size)
            ctx.lineTo(sx + size * 0.3, e.y + size)
            ctx.lineTo(sx, e.y + size * 0.8)
            ctx.lineTo(sx + size * 0.1, e.y + size * 0.5)
            ctx.lineTo(sx, e.y + size * 0.2)
            ctx.closePath()
            ctx.fill()

            // 尖角装饰
            ctx.fillStyle = '#000'
            for (let i = 0; i < 3; i++) {
              ctx.beginPath()
              ctx.moveTo(sx + size * 0.2 + i * size * 0.3, e.y)
              ctx.lineTo(sx + size * 0.3 + i * size * 0.3, e.y - 12)
              ctx.lineTo(sx + size * 0.4 + i * size * 0.3, e.y)
              ctx.fill()
            }
          }

          // 恐怖眼睛 - 红色发光
          ctx.shadowBlur = 25
          ctx.shadowColor = '#ff0000'
          ctx.fillStyle = '#ff0000'
          ctx.beginPath()
          ctx.arc(
            sx + size * 0.3,
            e.y + size * 0.35,
            size * 0.15,
            0,
            Math.PI * 2,
          )
          ctx.arc(
            sx + size * 0.7,
            e.y + size * 0.35,
            size * 0.15,
            0,
            Math.PI * 2,
          )
          ctx.fill()

          // 瞳孔 - 竖瞳
          ctx.shadowBlur = 0
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.ellipse(
            sx + size * 0.3 + e.facing * 3,
            e.y + size * 0.35,
            size * 0.05,
            size * 0.1,
            0,
            0,
            Math.PI * 2,
          )
          ctx.ellipse(
            sx + size * 0.7 + e.facing * 3,
            e.y + size * 0.35,
            size * 0.05,
            size * 0.1,
            0,
            0,
            Math.PI * 2,
          )
          ctx.fill()

          // 恐怖眉毛 - 愤怒
          ctx.strokeStyle = '#000'
          ctx.lineWidth = 3
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.15, e.y + size * 0.2)
          ctx.lineTo(sx + size * 0.4, e.y + size * 0.28)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.6, e.y + size * 0.28)
          ctx.lineTo(sx + size * 0.85, e.y + size * 0.2)
          ctx.stroke()

          // 恐怖嘴巴
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.3, e.y + size * 0.6)
          ctx.lineTo(sx + size * 0.5, e.y + size * 0.75)
          ctx.lineTo(sx + size * 0.7, e.y + size * 0.6)
          ctx.closePath()
          ctx.fill()

          // 尖牙
          ctx.fillStyle = '#fff'
          for (let i = 0; i < 3; i++) {
            ctx.beginPath()
            ctx.moveTo(sx + size * 0.35 + i * size * 0.12, e.y + size * 0.6)
            ctx.lineTo(sx + size * 0.4 + i * size * 0.12, e.y + size * 0.72)
            ctx.lineTo(sx + size * 0.45 + i * size * 0.12, e.y + size * 0.6)
            ctx.fill()
          }

          // 名字
          ctx.fillStyle = '#ff0000'
          ctx.font = 'bold 14px sans-serif'
          ctx.textAlign = 'center'
          ctx.shadowBlur = 5
          ctx.shadowColor = '#000'
          ctx.fillText(e.type, sx + size / 2, e.y - 15)

          // 血条
          ctx.shadowBlur = 0
          ctx.fillStyle = '#333'
          ctx.fillRect(sx, e.y - 30, size, 8)
          ctx.fillStyle = '#8b0000'
          ctx.fillRect(sx, e.y - 30, size * (e.hp / e.maxHp), 8)

          ctx.restore()
        })

        // 绘制Boss
        if (boss) {
          const sx = boss.x - cameraX
          const size = boss.size

          ctx.save()

          // Boss光晕 - 更恐怖
          ctx.shadowBlur = boss.rageMode ? 80 : 50
          ctx.shadowColor = boss.rageMode ? '#ff0000' : '#8b0000'

          // Boss身体 - 极其恐怖的形状
          const bossGrad = ctx.createRadialGradient(
            sx + size / 2,
            boss.y + size / 2,
            0,
            sx + size / 2,
            boss.y + size / 2,
            size,
          )
          bossGrad.addColorStop(0, boss.rageMode ? '#ff0000' : boss.color)
          bossGrad.addColorStop(0.5, boss.rageMode ? '#8b0000' : '#4a0000')
          bossGrad.addColorStop(1, '#000')
          ctx.fillStyle = bossGrad

          // 恐怖扭曲形状
          ctx.beginPath()
          ctx.moveTo(sx + size / 2, boss.y)
          ctx.lineTo(sx + size * 0.85, boss.y + size * 0.15)
          ctx.lineTo(sx + size, boss.y + size * 0.4)
          ctx.lineTo(sx + size * 0.95, boss.y + size * 0.7)
          ctx.lineTo(sx + size * 0.8, boss.y + size)
          ctx.lineTo(sx + size * 0.2, boss.y + size)
          ctx.lineTo(sx + size * 0.05, boss.y + size * 0.7)
          ctx.lineTo(sx, boss.y + size * 0.4)
          ctx.lineTo(sx + size * 0.15, boss.y + size * 0.15)
          ctx.closePath()
          ctx.fill()

          // 额外尖角 - 更多更锋利
          ctx.fillStyle = boss.rageMode ? '#ff0000' : '#4a0000'
          for (let i = 0; i < 6; i++) {
            const angle = Math.PI * 0.8 + (i / 5) * Math.PI * 0.4
            ctx.beginPath()
            ctx.moveTo(
              sx + size / 2 + Math.cos(angle) * size * 0.35,
              boss.y + size * 0.5 + Math.sin(angle) * size * 0.25,
            )
            ctx.lineTo(
              sx + size / 2 + Math.cos(angle) * size * 0.8,
              boss.y + size * 0.5 + Math.sin(angle) * size * 0.55,
            )
            ctx.lineTo(
              sx + size / 2 + Math.cos(angle + 0.4) * size * 0.35,
              boss.y + size * 0.5 + Math.sin(angle + 0.4) * size * 0.25,
            )
            ctx.fill()
          }

          // 恐怖疤痕/纹身
          ctx.strokeStyle = '#000'
          ctx.lineWidth = 3
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.3, boss.y + size * 0.4)
          ctx.lineTo(sx + size * 0.5, boss.y + size * 0.6)
          ctx.lineTo(sx + size * 0.4, boss.y + size * 0.8)
          ctx.stroke()

          // 恐怖眼睛 - 巨大发光
          ctx.fillStyle = '#ff0000'
          ctx.shadowColor = '#ff0000'
          ctx.shadowBlur = boss.rageMode ? 40 : 30
          ctx.beginPath()
          ctx.arc(
            sx + size * 0.32,
            boss.y + size * 0.35,
            size * 0.16,
            0,
            Math.PI * 2,
          )
          ctx.arc(
            sx + size * 0.68,
            boss.y + size * 0.35,
            size * 0.16,
            0,
            Math.PI * 2,
          )
          ctx.fill()

          // 眼睛瞳孔 - 竖瞳更恐怖
          ctx.fillStyle = '#000'
          ctx.shadowBlur = 0
          ctx.beginPath()
          ctx.ellipse(
            sx + size * 0.32 + boss.facing * 4,
            boss.y + size * 0.35,
            size * 0.04,
            size * 0.12,
            0,
            0,
            Math.PI * 2,
          )
          ctx.ellipse(
            sx + size * 0.68 + boss.facing * 4,
            boss.y + size * 0.35,
            size * 0.04,
            size * 0.12,
            0,
            0,
            Math.PI * 2,
          )
          ctx.fill()

          // 愤怒眉毛
          ctx.strokeStyle = '#000'
          ctx.lineWidth = 5
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.15, boss.y + size * 0.18)
          ctx.lineTo(sx + size * 0.45, boss.y + size * 0.28)
          ctx.stroke()
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.55, boss.y + size * 0.28)
          ctx.lineTo(sx + size * 0.85, boss.y + size * 0.18)
          ctx.stroke()

          // 恐怖嘴巴 - 张开更大
          ctx.fillStyle = '#000'
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.25, boss.y + size * 0.55)
          ctx.quadraticCurveTo(
            sx + size / 2,
            boss.y + size * 0.8,
            sx + size * 0.75,
            boss.y + size * 0.55,
          )
          ctx.quadraticCurveTo(
            sx + size / 2,
            boss.y + size * 0.65,
            sx + size * 0.25,
            boss.y + size * 0.55,
          )
          ctx.fill()

          // 尖牙 - 更长更锋利
          ctx.fillStyle = '#fff'
          for (let i = 0; i < 5; i++) {
            ctx.beginPath()
            ctx.moveTo(sx + size * 0.28 + i * size * 0.11, boss.y + size * 0.55)
            ctx.lineTo(sx + size * 0.33 + i * size * 0.11, boss.y + size * 0.75)
            ctx.lineTo(sx + size * 0.38 + i * size * 0.11, boss.y + size * 0.55)
            ctx.fill()
          }

          // 流血效果
          ctx.fillStyle = '#8b0000'
          ctx.beginPath()
          ctx.arc(sx + size * 0.15, boss.y + size * 0.5, 4, 0, Math.PI * 2)
          ctx.fill()
          ctx.beginPath()
          ctx.moveTo(sx + size * 0.15, boss.y + size * 0.5)
          ctx.lineTo(sx + size * 0.12, boss.y + size * 0.7)
          ctx.lineTo(sx + size * 0.18, boss.y + size * 0.7)
          ctx.fill()

          // Boss名字和血条
          ctx.fillStyle = boss.rageMode ? '#ff0000' : '#fff'
          ctx.font = 'bold 22px sans-serif'
          ctx.textAlign = 'center'
          ctx.shadowBlur = 8
          ctx.shadowColor = '#000'
          ctx.fillText(boss.type, sx + size / 2, boss.y - 25)

          // Boss血条
          const hpPercent = boss.hp / boss.maxHp
          ctx.shadowBlur = 0
          ctx.fillStyle = '#222'
          ctx.fillRect(sx - 5, boss.y - 45, size + 10, 18)
          const hpColor =
            hpPercent > 0.5
              ? '#8b0000'
              : hpPercent > 0.25
                ? '#b22222'
                : '#ff0000'
          ctx.fillStyle = hpColor
          ctx.fillRect(sx - 5, boss.y - 45, (size + 10) * hpPercent, 18)

          // 狂暴模式指示
          if (boss.rageMode) {
            ctx.fillStyle = '#ff0000'
            ctx.font = 'bold 16px sans-serif'
            ctx.shadowBlur = 10
            ctx.shadowColor = '#ff0000'
            ctx.fillText('⚠ 狂暴模式 ⚠', sx + size / 2, boss.y - 55)
          }

          ctx.restore()
        }
      }

      // 绘制文字子弹 - 特效随增益变帅
      function drawBullets() {
        bullets.forEach((b) => {
          const sx = b.x - cameraX

          ctx.save()

          // 文字旋转效果
          b.rotation = (b.rotation || 0) + 0.05
          const wobble = Math.sin(b.rotation) * 0.1

          // 根据特效等级绘制不同效果
          const level = b.effectLevel || 0

          // 外发光效果
          if (level >= 1) {
            ctx.shadowBlur = 15 + level * 5
            ctx.shadowColor = b.color
          }

          // 文字背景特效
          if (level >= 2) {
            // 描边效果
            ctx.font = `bold ${20 + level * 2}px 'SimHei', sans-serif`
            ctx.strokeStyle = b.color
            ctx.lineWidth = 2 + level
            ctx.strokeText(
              b.text,
              sx - ctx.measureText(b.text).width / 2,
              b.y + 7,
            )
          }

          if (level >= 3) {
            // 外发光圆环
            ctx.beginPath()
            ctx.arc(sx, b.y, 25 + level * 3, 0, Math.PI * 2)
            ctx.strokeStyle = b.color
            ctx.globalAlpha = 0.5
            ctx.lineWidth = 2
            ctx.stroke()
            ctx.globalAlpha = 1
          }

          if (level >= 4) {
            // 旋转光环
            ctx.save()
            ctx.translate(sx, b.y)
            ctx.rotate(b.rotation)
            for (let i = 0; i < 4; i++) {
              const angle = (i * Math.PI) / 2
              ctx.beginPath()
              ctx.arc(
                Math.cos(angle) * 30,
                Math.sin(angle) * 30,
                5,
                0,
                Math.PI * 2,
              )
              ctx.fillStyle = b.color
              ctx.globalAlpha = 0.7
              ctx.fill()
            }
            ctx.restore()
            ctx.globalAlpha = 1
          }

          if (level >= 5) {
            // 终极特效 - 火焰翅膀
            for (let i = 0; i < 3; i++) {
              const wingX = sx - b.vx * (i + 1) * 3
              const wingY = b.y + Math.sin(b.rotation + i) * 10
              ctx.beginPath()
              ctx.arc(wingX, wingY, 8 - i * 2, 0, Math.PI * 2)
              ctx.fillStyle = b.color
              ctx.globalAlpha = 0.6 - i * 0.15
              ctx.fill()
            }
            ctx.globalAlpha = 1

            // 雷电效果
            ctx.strokeStyle = '#ffffff'
            ctx.lineWidth = 1
            ctx.beginPath()
            ctx.moveTo(sx - 20, b.y - 20)
            ctx.lineTo(sx, b.y)
            ctx.lineTo(sx + 20, b.y - 10)
            ctx.stroke()
          }

          // 绘制主文字
          ctx.font = `bold ${20 + level * 2}px 'SimHei', sans-serif`
          ctx.fillStyle = b.color
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'

          // 文字阴影
          ctx.shadowBlur = 10 + level * 5
          ctx.shadowColor = b.color
          ctx.fillText(b.text, sx, b.y + wobble * 5)

          // 文字高光
          ctx.shadowBlur = 0
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'
          ctx.fillText(b.text, sx, b.y + wobble * 5)

          ctx.restore()
        })

        // 敌弹 - Boss子弹更炫酷
        enemyBullets.forEach((b) => {
          const sx = b.x - cameraX

          if (b.isBossBullet) {
            // Boss子弹 - 更大更恐怖
            ctx.save()
            ctx.shadowBlur = 30
            ctx.shadowColor = b.color

            // 外圈光环
            const outerGrad = ctx.createRadialGradient(
              sx,
              b.y,
              0,
              sx,
              b.y,
              b.size * 3,
            )
            outerGrad.addColorStop(0, b.color + '88')
            outerGrad.addColorStop(0.5, b.color + '44')
            outerGrad.addColorStop(1, 'transparent')
            ctx.fillStyle = outerGrad
            ctx.beginPath()
            ctx.arc(sx, b.y, b.size * 3, 0, Math.PI * 2)
            ctx.fill()

            // 核心
            const innerGrad = ctx.createRadialGradient(
              sx,
              b.y,
              0,
              sx,
              b.y,
              b.size,
            )
            innerGrad.addColorStop(0, '#fff')
            innerGrad.addColorStop(0.3, b.color)
            innerGrad.addColorStop(1, b.color + 'aa')
            ctx.fillStyle = innerGrad
            ctx.beginPath()
            ctx.arc(sx, b.y, b.size, 0, Math.PI * 2)
            ctx.fill()

            // 尖刺效果
            ctx.strokeStyle = b.color
            ctx.lineWidth = 2
            for (let i = 0; i < 6; i++) {
              const angle = (i / 6) * Math.PI * 2 + Date.now() * 0.01
              ctx.beginPath()
              ctx.moveTo(
                sx + Math.cos(angle) * b.size,
                b.y + Math.sin(angle) * b.size,
              )
              ctx.lineTo(
                sx + Math.cos(angle) * b.size * 1.8,
                b.y + Math.sin(angle) * b.size * 1.8,
              )
              ctx.stroke()
            }

            ctx.restore()
          } else {
            // 普通敌弹
            const enemyGrad = ctx.createRadialGradient(
              sx,
              b.y,
              0,
              sx,
              b.y,
              b.size * 1.5,
            )
            enemyGrad.addColorStop(0, '#fff')
            enemyGrad.addColorStop(0.5, b.color)
            enemyGrad.addColorStop(1, 'rgba(255,0,0,0)')
            ctx.fillStyle = enemyGrad
            ctx.shadowBlur = 15
            ctx.shadowColor = b.color
            ctx.beginPath()
            ctx.arc(sx, b.y, b.size * 1.5, 0, Math.PI * 2)
            ctx.fill()
            ctx.shadowBlur = 0
          }
        })
      }

      // 绘制粒子
      function drawParticles() {
        particles.forEach((p) => {
          const alpha = p.life / 40
          ctx.save()

          // 发光效果
          const grad = ctx.createRadialGradient(
            p.x - cameraX,
            p.y,
            0,
            p.x - cameraX,
            p.y,
            p.size * 2,
          )
          grad.addColorStop(0, p.color)
          grad.addColorStop(0.5, p.color + '88')
          grad.addColorStop(1, 'transparent')
          ctx.fillStyle = grad
          ctx.globalAlpha = alpha
          ctx.shadowBlur = 10
          ctx.shadowColor = p.color

          ctx.beginPath()
          ctx.arc(p.x - cameraX, p.y, p.size * 2, 0, Math.PI * 2)
          ctx.fill()

          // 中心亮点
          ctx.fillStyle = '#fff'
          ctx.globalAlpha = alpha * 0.8
          ctx.beginPath()
          ctx.arc(p.x - cameraX, p.y, p.size * 0.5, 0, Math.PI * 2)
          ctx.fill()

          ctx.restore()
        })
      }

      // 绘制掉落
      function drawDrops() {
        drops.forEach((d) => {
          const sx = d.x - cameraX
          const bob = Math.sin(Date.now() * 0.01 + d.x) * 3

          ctx.save()
          ctx.shadowBlur = 10

          if (d.type === 'gold') {
            ctx.fillStyle = '#f1c40f'
            ctx.shadowColor = '#f1c40f'
            ctx.beginPath()
            ctx.arc(sx, d.y + bob, 8, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#f39c12'
            ctx.font = 'bold 10px sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('$', sx, d.y + bob + 4)
          } else if (d.type === 'speed') {
            // 攻速加成 - 闪电符号
            ctx.fillStyle = '#00d9ff'
            ctx.shadowColor = '#00d9ff'
            ctx.beginPath()
            ctx.arc(sx, d.y + bob, 10, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#fff'
            ctx.font = 'bold 12px sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('⚡', sx, d.y + bob + 4)
          } else if (d.type === 'damage') {
            // 伤害加成 - 剑符号
            ctx.fillStyle = '#ff4757'
            ctx.shadowColor = '#ff4757'
            ctx.beginPath()
            ctx.arc(sx, d.y + bob, 10, 0, Math.PI * 2)
            ctx.fill()
            ctx.fillStyle = '#fff'
            ctx.font = 'bold 12px sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('⚔', sx, d.y + bob + 4)
          } else if (d.type === 'hp') {
            ctx.fillStyle = '#e74c3c'
            ctx.shadowColor = '#e74c3c'
            ctx.fillRect(sx - 8, d.y + bob - 12, 16, 24)
            ctx.fillStyle = '#fff'
            ctx.font = 'bold 12px sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('+', sx, d.y + bob + 4)
          }

          ctx.restore()
        })
      }

      // UI更新
      function updateUI() {
        document.getElementById('hp').textContent = Math.max(
          0,
          Math.floor(player.hp),
        )
        document.getElementById('gold').textContent = gold
        document.getElementById('kills').textContent = levelKills

        // 更新进度和距离
        const remainingDist = Math.max(0, Math.floor(goalX - player.x))
        document.getElementById('distance').textContent = remainingDist

        const progress = Math.min(100, Math.max(0, (player.x / goalX) * 100))
        const progressBar = document.getElementById('progressBar')
        if (progressBar) {
          // Boss状态影响进度条颜色
          const config = LEVELS[currentLevel - 1]
          if (config.boss && !bossDefeated && bossSpawned) {
            progressBar.style.background =
              'linear-gradient(90deg,#c0392b,#e74c3c)' // 红色-有Boss
          } else {
            progressBar.style.background =
              'linear-gradient(90deg,#27ae60,#2ecc71)' // 绿色-安全
          }
          progressBar.style.width = progress + '%'
        }
      }

      // 主循环
      let lastTime = 0

      function gameLoop(timestamp) {
        if (gameState !== 'playing') {
          requestAnimationFrame(gameLoop)
          return
        }

        const dt = timestamp - lastTime
        lastTime = timestamp
        gameTime += dt // 更新时间用于翅膀动画

        // 更新增益效果
        if (player.boostTimer > 0) {
          player.boostTimer--
        }

        // 更新
        updatePlayer()
        updateEnemies()
        updateBullets()
        updateDrops()
        updateParticles()
        updateCamera()
        spawnEnemy()
        updateUI()

        // 关卡完成检测 - 需要击败Boss才能过关
        const config = LEVELS[currentLevel - 1]
        if (config.boss) {
          // 有Boss的关卡：必须击败Boss
          if (bossDefeated || !bossSpawned) {
            if (player.x >= goalX) {
              completeLevel()
            }
          }
        } else {
          // 无Boss的关卡
          if (player.x >= goalX) {
            completeLevel()
          }
        }

        // 死亡检测
        if (player.hp <= 0) {
          gameOver()
        }

        // 绘制
        ctx.clearRect(0, 0, W, H)
        drawBackground()
        drawGround()
        drawGoal() // 绘制终点
        drawPlatforms()
        drawDrops()
        drawBullets()
        drawEnemies()
        drawPlayer()
        drawParticles()
        drawSkills() // 绘制必杀技特效
        drawBoostUI() // 绘制增益状态

        requestAnimationFrame(gameLoop)
      }

      function completeLevel() {
        gameState = 'levelComplete'
        document.getElementById('levelGold').textContent = gold

        // 奇数关卡显示奖励图片
        if (currentLevel % 2 === 1) {
          document.getElementById('levelComplete').style.display = 'none'
          const hasReward = showRewardModal(currentLevel)
          if (!hasReward) {
            document.getElementById('levelComplete').style.display = 'flex'
          }
        } else {
          document.getElementById('levelComplete').style.display = 'flex'
        }
      }

      function nextLevel() {
        // 关闭奖励弹窗（如果打开着）
        document.getElementById('rewardModal').style.display = 'none'
        document.getElementById('levelComplete').style.display = 'none'
        currentLevel++
        levelKills = 0

        if (currentLevel > 20) {
          // 通关！显示全家福
          document.getElementById('levelComplete').style.display = 'none'
          document.getElementById('rewardModal').style.display = 'none'
          setTimeout(() => {
            showGallery()
          }, 500)
          gameState = 'complete'
          return
        }

        initLevel(currentLevel)
        player.hp = Math.min(player.maxHp, player.hp + 20)
        gameState = 'playing'
      }

      function gameOver() {
        gameState = 'gameOver'
        document.getElementById('finalLevel').textContent = currentLevel
        document.getElementById('gameOver').style.display = 'flex'
      }

      function restartGame() {
        document.getElementById('gameOver').style.display = 'none'
        document.getElementById('levelComplete').style.display = 'none'
        document.getElementById('rewardModal').style.display = 'none'
        document.getElementById('galleryModal').style.display = 'none'
        currentLevel = 1
        gold = 0
        levelKills = 0
        player.hp = player.maxHp
        player.attackSpeedBoost = 0
        player.damageBoost = 0
        player.boostTimer = 0
        player.rolling = false
        player.rollCooldown = 0
        player.trailParticles = []
        bulletTextIndex = 0
        bulletTextTimer = 0
        initLevel(1)
        gameState = 'playing'
      }

      // 启动
      initLevel(1)
      // 确保canvas尺寸正确
      resize()
      // 立即绘制第一帧
      ctx.clearRect(0, 0, W, H)
      drawBackground()
      drawGround()
      drawPlatforms()
      drawPlayer()
      gameLoop(0)
    </script>
  </body>
</html>
