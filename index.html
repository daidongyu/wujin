<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>老七大冒险 - 老七的西游记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameCanvas {
            display: block;
        }

        /* HUD 界面 */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 顶部状态栏 */
        #statusBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 25px;
            border: 2px solid #ffd700;
        }

        .status-item {
            text-align: center;
            color: #fff;
        }

        .status-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 18px;
            font-weight: bold;
        }

        .exp-bar {
            width: 150px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }

        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            transition: width 0.3s;
        }

        /* 武器信息 */
        #weaponInfo {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff6600;
            color: #fff;
            min-width: 200px;
        }

        #weaponInfo h3 {
            color: #ff6600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #weaponLevel {
            font-size: 24px;
            color: #ffd700;
        }

        /* 金币显示 */
        #goldDisplay {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 控制提示 */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: #aaa;
            font-size: 12px;
        }

        #controls h4 {
            color: #fff;
            margin-bottom: 8px;
        }

        /* 开始界面 */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #startScreen h1 {
            font-size: 72px;
            color: #ffd700;
            text-shadow: 0 0 20px #ff6600, 0 0 40px #ff0000;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #ff6600, 0 0 40px #ff0000; }
            to { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff6600; }
        }

        #startScreen h2 {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 50px;
        }

        .menu-btn {
            padding: 15px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #ff6600, #ff3300);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            margin: 10px;
            transition: all 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 5px 20px rgba(255, 102, 0, 0.5);
        }

        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 30px rgba(255, 102, 0, 0.8);
        }

        /* 商店界面 */
        #shopScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 90;
            overflow-y: auto;
        }

        .shop-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 30px;
        }

        .shop-title {
            text-align: center;
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .shop-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .shop-section h3 {
            color: #ff6600;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff6600;
            padding-bottom: 10px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 2px solid #444;
            transition: all 0.3s;
            cursor: pointer;
            pointer-events: auto;
        }

        .shop-item:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
        }

        .shop-item.owned {
            border-color: #00ff00;
        }

        .shop-item.equipped {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.2);
        }

        .shop-item-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .shop-item-name {
            color: #fff;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .shop-item-price {
            color: #ffd700;
            font-size: 14px;
        }

        .shop-item-level {
            color: #00ff00;
            font-size: 12px;
            margin-top: 5px;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff3300;
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
        }

        /* 武器升级界面 */
        #upgradeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 90;
            overflow-y: auto;
        }

        /* 怪物信息 */
        #monsterInfo {
            position: absolute;
            top: 200px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid #ff0000;
            color: #fff;
            font-size: 12px;
        }

        /* 消息提示 */
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            color: #fff;
            font-size: 24px;
            display: none;
            z-index: 80;
            text-align: center;
        }

        .level-up {
            color: #00ff00 !important;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* 小地图 */
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            border: 3px solid #ffd700;
            overflow: hidden;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
        }

        /* 快捷键提示 */
        .key-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            color: #aaa;
            font-size: 12px;
        }

        .key-hint span {
            color: #ffd700;
            margin: 0 5px;
        }

        /* 伤害数字 */
        .damage-number {
            position: absolute;
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }

        .gold-number {
            color: #ffd700 !important;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        /* 技能栏 */
        #skillBar {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid #444;
        }

        .skill-slot {
            width: 50px;
            height: 50px;
            background: rgba(50, 50, 50, 0.8);
            border-radius: 10px;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .skill-slot.ready {
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .skill-cd {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 10px;
            text-align: center;
        }

        /* ==================== 移动端控制 ==================== */
        .mobile-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffd700;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        /* 虚拟摇杆 */
        #joystickContainer {
            position: absolute;
            bottom: 100px;
            left: 30px;
            width: 120px;
            height: 120px;
            display: none;
            z-index: 50;
        }

        #joystickBase {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 215, 0, 0.6);
            position: relative;
        }

        #joystickThumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.8);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 攻击按钮 */
        #attackBtn {
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.7);
            border: 3px solid #ff6600;
            color: #fff;
            font-size: 36px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
        }

        #attackBtn:active {
            background: rgba(255, 0, 0, 1);
            transform: scale(0.9);
        }

        /* 闪避按钮 */
        #dodgeBtn {
            position: absolute;
            bottom: 200px;
            right: 40px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.7);
            border: 3px solid #00aaff;
            color: #fff;
            font-size: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.5);
        }

        #dodgeBtn:active {
            background: rgba(0, 150, 255, 1);
            transform: scale(0.9);
        }

        /* 移动端菜单 */
        #mobileMenu {
            position: absolute;
            top: 80px;
            right: 10px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }

        /* 移动端隐藏PC控制提示 */
        @media (max-width: 768px) {
            #statusBar {
                gap: 15px;
                padding: 10px 15px;
                font-size: 12px;
            }

            .status-item {
                min-width: 60px;
            }

            .status-label {
                font-size: 10px;
            }

            .status-value {
                font-size: 14px;
            }

            .exp-bar {
                width: 80px;
            }

            #weaponInfo {
                top: 150px;
                left: 10px;
                padding: 10px;
                min-width: 150px;
            }

            #weaponInfo h3 {
                font-size: 12px;
            }

            #weaponIcon {
                font-size: 32px;
            }

            #goldDisplay {
                top: 150px;
                right: 10px;
                padding: 10px 15px;
                font-size: 16px;
            }

            #monsterInfo {
                top: 250px;
                right: 10px;
                font-size: 10px;
            }

            #controls {
                display: none;
            }

            .key-hint {
                display: none;
            }

            #minimap {
                width: 100px;
                height: 100px;
                bottom: 10px;
                right: 10px;
            }

            #skillBar {
                bottom: 100px;
                padding: 5px 10px;
            }

            .skill-slot {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            /* 显示移动端控件 */
            #joystickContainer,
            #attackBtn,
            #dodgeBtn,
            #mobileMenu {
                display: block;
            }

            .menu-btn {
                padding: 12px 40px;
                font-size: 18px;
            }

            #startScreen h1 {
                font-size: 42px;
            }

            #startScreen h2 {
                font-size: 18px;
            }

            /* 商店移动端适配 */
            .shop-container {
                padding: 15px;
                margin-top: 80px;
            }

            .shop-title {
                font-size: 32px;
            }

            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }

            .shop-item {
                padding: 10px;
            }

            .shop-item-icon {
                font-size: 32px;
            }

            .close-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
        }

        /* 超小屏幕适配 */
        @media (max-width: 480px) {
            #statusBar {
                gap: 8px;
                padding: 8px 10px;
            }

            .status-label {
                font-size: 9px;
            }

            .status-value {
                font-size: 12px;
            }

            .exp-bar {
                width: 60px;
            }

            #weaponInfo {
                display: none;
            }

            #joystickContainer {
                bottom: 80px;
                left: 20px;
            }

            #joystickBase {
                width: 100px;
                height: 100px;
            }

            #joystickThumb {
                width: 40px;
                height: 40px;
            }

            #attackBtn {
                width: 70px;
                height: 70px;
                font-size: 30px;
                bottom: 80px;
                right: 20px;
            }

            #dodgeBtn {
                width: 50px;
                height: 50px;
                font-size: 22px;
                bottom: 160px;
                right: 30px;
            }

            #mobileMenu {
                top: 60px;
            }

            #mobileMenu .mobile-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }

        /* 横屏适配 */
        @media (max-height: 500px) and (orientation: landscape) {
            #statusBar {
                top: 5px;
                padding: 5px 15px;
            }

            #weaponInfo {
                top: 50px;
            }

            #goldDisplay {
                top: 50px;
            }

            #monsterInfo {
                top: 100px;
            }

            #joystickContainer {
                bottom: 30px;
                left: 20px;
            }

            #attackBtn {
                bottom: 30px;
                right: 20px;
                width: 60px;
                height: 60px;
            }

            #dodgeBtn {
                bottom: 100px;
                right: 30px;
                width: 45px;
                height: 45px;
            }

            #mobileMenu {
                top: 50px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud" style="display: none;">
            <!-- 状态栏 -->
            <div id="statusBar">
                <div class="status-item">
                    <div class="status-label">等级 Lv.<span id="levelDisplay">1</span></div>
                    <div class="status-value">老七</div>
                    <div class="exp-bar">
                        <div class="exp-fill" id="expFill" style="width: 0%"></div>
                    </div>
                    <div class="status-label" style="margin-top: 5px;">
                        <span id="currentExp">0</span>/<span id="maxExp">100</span> 经验
                    </div>
                </div>
                <div class="status-item">
                    <div class="status-label">武器</div>
                    <div class="status-value" id="weaponName">如意金箍棒</div>
                    <div id="weaponLevel">Lv.1/10</div>
                </div>
                <div class="status-item">
                    <div class="status-label">生命值</div>
                    <div class="status-value" id="hpDisplay" style="color: #ff0000;">100/100</div>
                </div>
            </div>

            <!-- 武器信息 -->
            <div id="weaponInfo">
                <h3>当前武器</h3>
                <div id="weaponIcon" style="font-size: 48px; margin: 10px 0;">⚔️</div>
                <div id="weaponFullName">如意金箍棒 Lv.1</div>
                <div style="color: #888; font-size: 12px; margin-top: 5px;">
                    伤害: <span id="weaponDamage">10</span>
                </div>
            </div>

            <!-- 金币显示 -->
            <div id="goldDisplay">
                <span>💰</span>
                <span id="goldAmount">0</span>
            </div>

            <!-- 怪物信息 -->
            <div id="monsterInfo">
                <div>怪物数量: <span id="monsterCount">0</span></div>
                <div>波次: <span id="waveCount">1</span></div>
            </div>

            <!-- 控制提示 -->
            <div id="controls">
                <h4>操作说明</h4>
                <div>移动: WASD / 方向键</div>
                <div>攻击: 鼠标左键 / 空格</div>
                <div>闪避: Shift</div>
                <div>商店: E</div>
                <div>武器: Q</div>
            </div>

            <!-- 小地图 -->
            <div id="minimap">
                <canvas id="minimapCanvas" width="150" height="150"></canvas>
            </div>

            <!-- 快捷键提示 -->
            <div class="key-hint">
                <span>[E]</span> 商店 | <span>[Q]</span> 武器升级 | <span>[空格]</span> 攻击 | <span>[ESC]</span> 暂停
            </div>

            <!-- 消息提示 -->
            <div id="message"></div>
        </div>

        <!-- 移动端虚拟摇杆 -->
        <div id="joystickContainer">
            <div id="joystickBase">
                <div id="joystickThumb"></div>
            </div>
        </div>

        <!-- 移动端攻击按钮 -->
        <div id="attackBtn">⚔️</div>

        <!-- 移动端闪避按钮 -->
        <div id="dodgeBtn">💨</div>

        <!-- 移动端菜单按钮 -->
        <div id="mobileMenu">
            <button id="shopBtn" class="mobile-btn">🛒</button>
            <button id="upgradeBtn" class="mobile-btn">⚔️</button>
        </div>
    </div>

    <!-- 开始界面 -->
    <div id="startScreen">
            <h1>老七大冒险</h1>
            <h2>老七的西游记</h2>
            <button class="menu-btn" onclick="startGame()">开始游戏</button>
            <button class="menu-btn" onclick="showControls()">游戏说明</button>
        </div>

        <!-- 商店界面 -->
        <div id="shopScreen">
            <button class="close-btn" onclick="closeShop()">关闭 [E]</button>
            <div class="shop-container">
                <h2 class="shop-title">🏪 商店</h2>

                <div class="shop-section">
                    <h3>🪶 翅膀商店</h3>
                    <div class="shop-grid" id="wingShopGrid"></div>
                </div>

                <div class="shop-section">
                    <h3>🗡️ 武器商店</h3>
                    <div class="shop-grid" id="weaponShopGrid"></div>
                </div>
            </div>
        </div>

        <!-- 武器升级界面 -->
        <div id="upgradeScreen">
            <button class="close-btn" onclick="closeUpgrade()">关闭 [Q]</button>
            <div class="shop-container">
                <h2 class="shop-title">⚔️ 武器图鉴</h2>
                <div class="shop-grid" id="weaponGrid"></div>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            WORLD_SIZE: 200,
            PLAYER_SPEED: 0.3,
            MONSTER_SPEED: 0.08,
            ATTACK_RANGE: 8,
            ATTACK_COOLDOWN: 500,
            SPAWN_INTERVAL: 3000,
            MAX_MONSTERS: 15
        };

        // 武器数据 - 20种武器，每种10级
        const WEAPONS = [
            { id: 1, name: '如意金箍棒', icon: '🔧', baseDamage: 10, color: 0xffd700 },

        // ==================== 移动端控制 ====================
        let joystickActive = false;
        let joystickTouch = null;
        let joystickStartX = 0;
        let joystickStartY = 0;
        let joystickX = 0; // 摇杆X偏移 (-1 ~ 1)
        let joystickY = 0; // 摇杆Y偏移 (-1 ~ 1)
        let attackTouch = null;
        let dodgeTouch = null;

        function initMobileControls() {
            const joystickContainer = document.getElementById('joystickContainer');
            const joystickBase = document.getElementById('joystickBase');
            const joystickThumb = document.getElementById('joystickThumb');
            const attackBtn = document.getElementById('attackBtn');
            const dodgeBtn = document.getElementById('dodgeBtn');
            const shopBtn = document.getElementById('shopBtn');
            const upgradeBtn = document.getElementById('upgradeBtn');

            // 摇杆事件
            joystickContainer.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                joystickTouch = touch.identifier;
                joystickActive = true;

                const rect = joystickBase.getBoundingClientRect();
                joystickStartX = rect.left + rect.width / 2;
                joystickStartY = rect.top + rect.height / 2;
            });

            joystickContainer.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!joystickActive) return;

                for (let touch of e.touches) {
                    if (touch.identifier === joystickTouch) {
                        const dx = touch.clientX - joystickStartX;
                        const dy = touch.clientY - joystickStartY;

                        const maxDistance = 35;
                        const distance = Math.min(Math.sqrt(dx * dx + dy * dy), maxDistance);
                        const angle = Math.atan2(dy, dx);

                        const thumbX = Math.cos(angle) * distance;
                        const thumbY = Math.sin(angle) * distance;

                        joystickThumb.style.transform = `translate(calc(-50% + ${thumbX}px), calc(-50% + ${thumbY}px))`;

                        // 标准化摇杆偏移 (-1 ~ 1)
                        joystickX = dx / maxDistance;
                        joystickY = dy / maxDistance;

                        // 限制范围
                        joystickX = Math.max(-1, Math.min(1, joystickX));
                        joystickY = Math.max(-1, Math.min(1, joystickY));

                        // 如果距离太小，清除移动
                        if (distance < maxDistance * 0.2) {
                            joystickX = 0;
                            joystickY = 0;
                        }

                        break;
                    }
                }
            });

            joystickContainer.addEventListener('touchend', (e) => {
                e.preventDefault();
                let found = false;
                for (let touch of e.touches) {
                    if (touch.identifier === joystickTouch) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    joystickActive = false;
                    joystickTouch = null;
                    joystickX = 0;
                    joystickY = 0;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                }
            });

            // 攻击按钮
            attackBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.attack = true;
            });

            attackBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.attack = false;
            });

            // 闪避按钮
            dodgeBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.dodge = true;
                setTimeout(() => keys.dodge = false, 200);
            });

            dodgeBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.dodge = false;
            });

            // 菜单按钮
            shopBtn.addEventListener('click', toggleShop);
            upgradeBtn.addEventListener('click', toggleUpgrade);

            // 屏幕点击（用于攻击和移动方向）
            document.getElementById('gameCanvas').addEventListener('touchstart', (e) => {
                if (!gameState.playing || gameState.paused) return;

                // 如果点击的是控件区域，不处理
                if (e.target !== document.getElementById('gameCanvas')) return;

                const touch = e.touches[0];
                const x = touch.clientX;
                const y = touch.clientY;

                // 右侧区域点击触发攻击
                if (x > window.innerWidth * 0.6 && y < window.innerHeight * 0.6) {
                    keys.attack = true;
                    setTimeout(() => keys.attack = false, 100);
                }

                // 左侧区域点击设置移动方向
                if (x < window.innerWidth * 0.4) {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight;

                    const dx = x - centerX;
                    const dy = y - centerY;
                    const angle = Math.atan2(dx, -dy);

                    player.rotation.y = angle + Math.PI;
                }
            });

            // 防止默认触摸行为
            document.body.addEventListener('touchmove', (e) => {
                if (gameState.playing && !gameState.paused) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        // 创建世界
        function createWorld() {
            // 地面
            const groundGeometry = new THREE.PlaneGeometry(CONFIG.WORLD_SIZE, CONFIG.WORLD_SIZE, 50, 50);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x3a5f0b,
                roughness: 0.8
            });

            // 添加地形起伏
            const vertices = groundGeometry.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                vertices[i + 2] = Math.random() * 0.5;
            }
            groundGeometry.computeVertexNormals();

            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 添加装饰物
            for (let i = 0; i < 50; i++) {
                const tree = createTree(
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8,
                    0,
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8
                );
                scene.add(tree);
                worldObjects.push(tree);
            }

            // 石头
            for (let i = 0; i < 30; i++) {
                const rock = createRock(
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8,
                    0,
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8
                );
                scene.add(rock);
                worldObjects.push(rock);
            }

            // 边界墙
            const wallHeight = 5;
            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });

            const walls = [
                { pos: [CONFIG.WORLD_SIZE/2, wallHeight/2, 0], rot: [0, Math.PI/2, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] },
                { pos: [-CONFIG.WORLD_SIZE/2, wallHeight/2, 0], rot: [0, Math.PI/2, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] },
                { pos: [0, wallHeight/2, CONFIG.WORLD_SIZE/2], rot: [0, 0, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] },
                { pos: [0, wallHeight/2, -CONFIG.WORLD_SIZE/2], rot: [0, 0, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] }
            ];

            walls.forEach(w => {
                const geo = new THREE.BoxGeometry(...w.size);
                const mesh = new THREE.Mesh(geo, wallMaterial);
                mesh.position.set(...w.pos);
                mesh.rotation.set(...w.rot);
                mesh.castShadow = true;
                scene.add(mesh);
            });
        }

            group.position.set(x, y, z);

            rock.userData.type = 'rock';

                group.add(leftWing2);

                const rightWing2Geo = new THREE.PlaneGeometry(1.5, 1);
                const rightWing2 = new THREE.Mesh(rightWing2Geo, wingMat.clone());
                rightWing2.position.set(1.2, 0.3, 0.1);
                rightWing2.rotation.y = -Math.PI / 4;
                group.add(rightWing2);
            }

            // 最高级翅膀添加特效
            if (wingIndex >= 15) {
                const particleGeo = new THREE.BufferGeometry();
                const particleCount = 50;
                const positions = new Float32Array(particleCount * 3);

                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 4;
                    positions[i * 3 + 1] = Math.random() * 2;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 2;
                }

                particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const particleMat = new THREE.PointsMaterial({
                    color: 0xffd700,
                    size: 0.1,
                    transparent: true,
                    opacity: 0.8
                });

                const particles = new THREE.Points(particleGeo, particleMat);
                group.add(particles);
            }

            group.userData.baseY = 1.8;
            group.position.y = 1.8;

            return group;
        }

        // 创建怪物
        function createMonster(type, level) {
            const monsterData = MONSTER_TYPES[type];
            const scale = 1 + level * 0.2;

            const group = new THREE.Group();

            // 身体
            const bodyColor = type === 'boss' ? 0x8b0000 : (type === 'daKai' ? 0x4a0080 : 0x4a4a4a);
            const bodyGeo = new THREE.SphereGeometry(0.6 * scale, 12, 12);
            const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = scale;
            body.castShadow = true;
            group.add(body);

            // 眼睛
            const eyeColor = type === 'boss' ? 0xff0000 : 0xffff00;
            const eyeGeo = new THREE.SphereGeometry(0.15 * scale, 8, 8);
            const eyeMat = new THREE.MeshStandardMaterial({
                color: eyeColor,
                emissive: eyeColor,
                emissiveIntensity: 0.5
            });

            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.25 * scale, scale + 0.2, 0.4 * scale);
            group.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.25 * scale, scale + 0.2, 0.4 * scale);
            group.add(rightEye);

            // 角（对于高级怪物）
            if (type !== 'wild' || level > 1) {
                const hornGeo = new THREE.ConeGeometry(0.1 * scale, 0.3 * scale, 8);
                const hornMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

                const leftHorn = new THREE.Mesh(hornGeo, hornMat);
                leftHorn.position.set(-0.3 * scale, scale + 0.5, 0);
                leftHorn.rotation.z = Math.PI / 6;
                group.add(leftHorn);

                const rightHorn = new THREE.Mesh(hornGeo, hornMat);
                rightHorn.position.set(0.3 * scale, scale + 0.5, 0);
                rightHorn.rotation.z = -Math.PI / 6;
                group.add(rightHorn);
            }

            // 武器（大开和Boss）
            if (type === 'daKai' || type === 'boss') {
                const weaponGeo = new THREE.BoxGeometry(0.1, 1 * scale, 0.05);
                const weaponMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const weapon = new THREE.Mesh(weaponGeo, weaponMat);
                weapon.position.set(0.7 * scale, scale, 0.2);
                weapon.rotation.z = -Math.PI / 4;
                group.add(weapon);
            }

            // 随机位置
            const angle = Math.random() * Math.PI * 2;
            const distance = 30 + Math.random() * 20;
            group.position.x = Math.cos(angle) * distance;
            group.position.z = Math.sin(angle) * distance;

            // 设置怪物数据
            group.userData = {
                type: type,
                level: level,
                hp: monsterData.baseHP * scale,
                maxHp: monsterData.baseHP * scale,
                damage: monsterData.baseDamage * scale,
                exp: monsterData.exp * level,
                gold: monsterData.gold * level,
                speed: CONFIG.MONSTER_SPEED,
                lastAttack: 0
            };

            scene.add(group);
            return group;
        }

        // ==================== 游戏逻辑 ====================

        // 键盘状态
        const keys = {
            forward: false,
            backward: false,
            left: false,
            right: false,
            attack: false,
            dodge: false
        };

        let lastAttackTime = 0;
        let isAttacking = false;
        let attackAngle = 0;
        let mouseX = 0;

        // 键盘事件
        function onKeyDown(e) {
            if (!gameState.playing) return;

            switch(e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    keys.forward = true;
                    break;
                case 's':
                case 'arrowdown':
                    keys.backward = true;
                    break;
                case 'a':
                case 'arrowleft':
                    keys.left = true;
                    break;
                case 'd':
                case 'arrowright':
                    keys.right = true;
                    break;
                case ' ':
                    keys.attack = true;
                    e.preventDefault();
                    break;
                case 'shift':
                    keys.dodge = true;
                    break;
                case 'e':
                    toggleShop();
                    break;
                case 'q':
                    toggleUpgrade();
                    break;
                case 'escape':
                    if (document.getElementById('shopScreen').style.display === 'flex' ||
                        document.getElementById('upgradeScreen').style.display === 'flex') {
                        closeShop();
                        closeUpgrade();
                    }
                    break;
            }
        }

        function onKeyUp(e) {
            switch(e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    keys.forward = false;
                    break;
                case 's':
                case 'arrowdown':
                    keys.backward = false;
                    break;
                case 'a':
                case 'arrowleft':
                    keys.left = false;
                    break;
                case 'd':
                case 'arrowright':
                    keys.right = false;
                    break;
                case ' ':
                    keys.attack = false;
                    break;
                case 'shift':
                    keys.dodge = false;
                    break;
            }
        }

        // 鼠标事件
        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        }

        function onMouseClick(e) {
            if (!gameState.playing) return;
            if (document.getElementById('shopScreen').style.display === 'flex' ||
                document.getElementById('upgradeScreen').style.display === 'flex') return;

            keys.attack = true;
            setTimeout(() => keys.attack = false, 100);
        }

        // 攻击
        function performAttack() {
            const now = Date.now();
            if (now - lastAttackTime < CONFIG.ATTACK_COOLDOWN) return;

            lastAttackTime = now;
            isAttacking = true;

            const weapon = WEAPONS[gameState.player.weaponIndex];
            const damage = weapon.baseDamage + (gameState.player.weaponLevel - 1) * 5;
            const range = CONFIG.ATTACK_RANGE + gameState.player.weaponLevel * 0.5;

            // 检查击中
            monsters.forEach((monster, index) => {
                if (!monster) return;

                const dx = monster.position.x - player.position.x;
                const dz = monster.position.z - player.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                // 计算角度
                const angleToMonster = Math.atan2(dx, dz);
                const playerAngle = player.rotation.y;

                let angleDiff = Math.abs(angleToMonster - playerAngle);
                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

                if (distance < range && angleDiff < Math.PI * 0.85) {
                    // 命中
                    monster.userData.hp -= damage;
                    showDamageNumber(monster.position, damage);

                    // 击退
                    const knockback = 1 + gameState.player.weaponLevel * 0.1;
                    monster.position.x += (dx / distance) * knockback;
                    monster.position.z += (dz / distance) * knockback;

                    // 受伤变色
                    monster.children[0].material.emissive = new THREE.Color(0xff0000);
                    setTimeout(() => {
                        if (monster.children[0]) {
                            monster.children[0].material.emissive = new THREE.Color(0x000000);
                        }
                    }, 100);

                    if (monster.userData.hp <= 0) {
                        // 击杀
                        killMonster(monster, index);
                    }
                }
            });

            // 攻击动画
            if (playerSword) {
                const originalRot = playerSword.rotation.x;
                playerSword.rotation.x = -Math.PI / 3;

                setTimeout(() => {
                    playerSword.rotation.x = originalRot;
                    isAttacking = false;
                }, 150);
            }

            // 攻击特效
            createAttackEffect();
        }

        // 创建攻击特效
        function createAttackEffect() {
            const weapon = WEAPONS[gameState.player.weaponIndex];
            const effectRange = CONFIG.ATTACK_RANGE + gameState.player.weaponLevel * 0.5;
            const effectGeo = new THREE.RingGeometry(effectRange * 0.3, effectRange, 32);
            const effectMat = new THREE.MeshBasicMaterial({
                color: weapon.color,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const effect = new THREE.Mesh(effectGeo, effectMat);
            effect.position.copy(player.position);
            effect.position.y = 1.5;
            effect.rotation.x = -Math.PI / 2;
            effect.userData.life = 1;
            scene.add(effect);
            particles.push(effect);
        }

        // 击杀怪物
        function killMonster(monster, index) {
            // 获得经验和金币
            const exp = monster.userData.exp;
            const gold = monster.userData.gold;

            gameState.player.exp += exp;
            gameState.player.gold += gold;
            gameState.killCount++;

            showGoldNumber(monster.position, gold);

            // 检查升级
            while (gameState.player.exp >= gameState.player.expToLevel) {
                gameState.player.exp -= gameState.player.expToLevel;
                gameState.player.level++;
                gameState.player.expToLevel = Math.floor(gameState.player.expToLevel * 1.5);
                gameState.player.maxHp += 10;
                gameState.player.hp = gameState.player.maxHp;
                showLevelUp();
            }

            // 死亡特效
            createDeathEffect(monster.position);

            // 移除怪物
            scene.remove(monster);
            monsters.splice(index, 1);

            updateHUD();
        }

        // 创建死亡特效
        function createDeathEffect(position) {
            for (let i = 0; i < 10; i++) {
                const geo = new THREE.SphereGeometry(0.1);
                const mat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 1, 0.5),
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(position);
                particle.position.y += 1;
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    Math.random() * 0.3,
                    (Math.random() - 0.5) * 0.3
                );
                particle.userData.life = 1;
                scene.add(particle);
                particles.push(particle);
            }
        }

        // 生成怪物
        function spawnMonster() {
            if (monsters.length >= CONFIG.MAX_MONSTERS) return;

            const rand = Math.random();
            let type, level;

            if (rand < 0.6) {
                type = 'wild';
                level = Math.min(3, Math.floor(gameState.wave / 3) + 1);
            } else if (rand < 0.9) {
                type = 'daKai';
                level = Math.min(3, Math.floor(gameState.wave / 5) + 1);
            } else {
                type = 'boss';
                level = Math.min(3, Math.floor(gameState.wave / 10) + 1);
            }

            const monster = createMonster(type, level);
            monsters.push(monster);
        }

        // 更新HUD
        function updateHUD() {
            document.getElementById('levelDisplay').textContent = gameState.player.level;
            document.getElementById('currentExp').textContent = gameState.player.exp;
            document.getElementById('maxExp').textContent = gameState.player.expToLevel;
            document.getElementById('expFill').style.width = (gameState.player.exp / gameState.player.expToLevel * 100) + '%';

            document.getElementById('weaponName').textContent = WEAPONS[gameState.player.weaponIndex].name;
            document.getElementById('weaponLevel').textContent = `Lv.${gameState.player.weaponLevel}/10`;
            document.getElementById('weaponIcon').textContent = WEAPONS[gameState.player.weaponIndex].icon;

            const weapon = WEAPONS[gameState.player.weaponIndex];
            const damage = weapon.baseDamage + (gameState.player.weaponLevel - 1) * 5;
            document.getElementById('weaponDamage').textContent = damage;
            document.getElementById('weaponFullName').textContent = `${weapon.name} Lv.${gameState.player.weaponLevel}`;

            document.getElementById('hpDisplay').textContent = `${Math.floor(gameState.player.hp)}/${gameState.player.maxHp}`;
            document.getElementById('goldAmount').textContent = gameState.player.gold;
            document.getElementById('monsterCount').textContent = monsters.length;
            document.getElementById('waveCount').textContent = gameState.wave;
        }

        // 显示伤害数字
        function showDamageNumber(position, damage) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            div.textContent = `-${damage}`;

            const vector = position.clone();
            vector.project(camera);

            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

            div.style.left = x + 'px';
            div.style.top = y + 'px';

            document.getElementById('gameContainer').appendChild(div);

            setTimeout(() => div.remove(), 1000);
        }

        // 显示金币数字
        function showGoldNumber(position, gold) {
            const div = document.createElement('div');
            div.className = 'damage-number gold-number';
            div.textContent = `+${gold}💰`;

            const vector = position.clone();
            vector.project(camera);

            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

            div.style.left = x + 'px';
            div.style.top = (y - 30) + 'px';

            document.getElementById('gameContainer').appendChild(div);

            setTimeout(() => div.remove(), 1000);
        }

        // 显示升级
        function showLevelUp() {
            const msg = document.getElementById('message');
            msg.textContent = `🎉 升级! Lv.${gameState.player.level}`;
            msg.className = 'level-up';
            msg.style.display = 'block';

            setTimeout(() => msg.style.display = 'none', 2000);
        }

        // ==================== 商店系统 ====================

        // 更新商店
        function updateShop() {
            // 翅膀商店
            const wingGrid = document.getElementById('wingShopGrid');
            wingGrid.innerHTML = '';

            WINGS.forEach((wing, index) => {
                const owned = gameState.ownedWings.includes(index);
                const equipped = gameState.equippedWing === index;

                const item = document.createElement('div');
                item.className = `shop-item ${owned ? 'owned' : ''} ${equipped ? 'equipped' : ''}`;
                item.innerHTML = `
                    <div class="shop-item-icon">${wing.icon}</div>
                    <div class="shop-item-name">${wing.name}</div>
                    <div class="shop-item-price">${owned ? (equipped ? '已装备' : '已拥有') : `💰 ${wing.price}`}</div>
                    <div class="shop-item-level">速度+${Math.round(wing.speedBonus * 100)}%</div>
                `;

                item.onclick = () => buyWing(index);
                wingGrid.appendChild(item);
            });

            // 武器商店
            const weaponGrid = document.getElementById('weaponShopGrid');
            weaponGrid.innerHTML = '';

            WEAPONS.forEach((weapon, index) => {
                const owned = gameState.unlockedWeapons.includes(index);
                const current = gameState.player.weaponIndex === index;
                const canUpgrade = current && gameState.player.weaponLevel < 10;
                const upgradeCost = current ? gameState.player.weaponLevel * 100 : 0;

                const item = document.createElement('div');
                item.className = `shop-item ${current ? 'equipped' : ''}`;
                item.innerHTML = `
                    <div class="shop-item-icon">${weapon.icon}</div>
                    <div class="shop-item-name">${weapon.name}</div>
                    <div class="shop-item-price">
                        ${current ?
                            (canUpgrade ? `💰 升级: ${upgradeCost}` : '已满级') :
                            (owned ? '已解锁' : '未解锁')
                        }
                    </div>
                    ${current ? `<div class="shop-item-level">等级: ${gameState.player.weaponLevel}/10</div>` : ''}
                `;

                item.onclick = () => selectWeapon(index);
                weaponGrid.appendChild(item);
            });
        }

        // 购买翅膀
        function buyWing(index) {
            const wing = WINGS[index];

            if (gameState.ownedWings.includes(index)) {
                // 装备翅膀
                gameState.equippedWing = index;
                if (playerWing) {
                    scene.remove(playerWing);
                }
                playerWing = createWing(index);
                player.add(playerWing);
                updateShop();
                return;
            }

            if (gameState.player.gold >= wing.price) {
                gameState.player.gold -= wing.price;
                gameState.ownedWings.push(index);
                gameState.equippedWing = index;

                if (playerWing) {
                    scene.remove(playerWing);
                }
                playerWing = createWing(index);
                player.add(playerWing);

                updateShop();
                updateHUD();
                showMessage(`获得 ${wing.name}!`);
            } else {
                showMessage('金币不足!');
            }
        }

        // 选择武器
        function selectWeapon(index) {
            if (gameState.unlockedWeapons.includes(index)) {
                gameState.player.weaponIndex = index;

                if (playerSword) {
                    player.remove(playerSword);
                }
                playerSword = createSword(index, gameState.player.weaponLevel);
                playerSword.position.set(0.8, 1.2, 0.3);
                playerSword.rotation.x = Math.PI / 6;
                player.add(playerSword);

                updateShop();
                updateHUD();
            } else {
                // 计算解锁价格
                const unlockCost = (index + 1) * 500;
                if (gameState.player.gold >= unlockCost) {
                    gameState.player.gold -= unlockCost;
                    gameState.unlockedWeapons.push(index);
                    gameState.player.weaponIndex = index;

                    if (playerSword) {
                        player.remove(playerSword);
                    }
                    playerSword = createSword(index, gameState.player.weaponLevel);
                    playerSword.position.set(0.8, 1.2, 0.3);
                    playerSword.rotation.x = Math.PI / 6;
                    player.add(playerSword);

                    updateShop();
                    updateHUD();
                    showMessage(`解锁 ${WEAPONS[index].name}!`);
                } else {
                    showMessage('金币不足! 需要 ' + unlockCost);
                }
            }
        }

        // 升级武器
        function upgradeWeapon() {
            if (gameState.player.weaponLevel >= 10) {
                showMessage('武器已满级!');
                return;
            }

            const upgradeCost = gameState.player.weaponLevel * 100;

            if (gameState.player.gold >= upgradeCost) {
                gameState.player.gold -= upgradeCost;
                gameState.player.weaponLevel++;

                // 更新剑的外观
                if (playerSword) {
                    player.remove(playerSword);
                }
                playerSword = createSword(gameState.player.weaponIndex, gameState.player.weaponLevel);
                playerSword.position.set(0.8, 1.2, 0.3);
                playerSword.rotation.x = Math.PI / 6;
                player.add(playerSword);

                updateHUD();
                showMessage(`武器升级! Lv.${gameState.player.weaponLevel}`);
            } else {
                showMessage('金币不足!');
            }
        }

        // 显示消息
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = '';
            msg.style.display = 'block';

            setTimeout(() => msg.style.display = 'none', 1500);
        }

        // 切换商店
        function toggleShop() {
            const shop = document.getElementById('shopScreen');
            if (shop.style.display === 'flex') {
                closeShop();
            } else {
                closeUpgrade();
                updateShop();
                shop.style.display = 'flex';
                gameState.paused = true;
            }
        }

        function closeShop() {
            document.getElementById('shopScreen').style.display = 'none';
            gameState.paused = false;
        }

        // 切换武器升级界面
        function toggleUpgrade() {
            const upgrade = document.getElementById('upgradeScreen');
            if (upgrade.style.display === 'block') {
                closeUpgrade();
            } else {
                closeShop();
                updateWeaponGrid();
                upgrade.style.display = 'block';
                gameState.paused = true;
            }
        }

        function closeUpgrade() {
            document.getElementById('upgradeScreen').style.display = 'none';
            gameState.paused = false;
        }

        // 更新武器图鉴
        function updateWeaponGrid() {
            const grid = document.getElementById('weaponGrid');
            grid.innerHTML = '';

            WEAPONS.forEach((weapon, index) => {
                const owned = gameState.unlockedWeapons.includes(index);
                const isCurrent = gameState.player.weaponIndex === index;
                const level = isCurrent ? gameState.player.weaponLevel : 1;
                const damage = weapon.baseDamage + (level - 1) * 5;

                const item = document.createElement('div');
                item.className = `shop-item ${isCurrent ? 'equipped' : ''}`;
                item.innerHTML = `
                    <div class="shop-item-icon" style="font-size: 36px;">${weapon.icon}</div>
                    <div class="shop-item-name">${weapon.name}</div>
                    <div style="color: #888; font-size: 12px;">
                        ${owned ? `伤害: ${damage}` : '未解锁'}
                    </div>
                    ${isCurrent ? `<div class="shop-item-level">等级: ${level}/10</div>` : ''}
                    ${isCurrent && level < 10 ? `<div class="shop-item-price">升级: 💰 ${level * 100}</div>` : ''}
                `;

                item.onclick = () => {
                    if (owned && isCurrent) {
                        upgradeWeapon();
                        updateWeaponGrid();
                    } else if (owned) {
                        selectWeapon(index);
                        updateWeaponGrid();
                    }
                };

                grid.appendChild(item);
            });
        }

        // ==================== 游戏主循环 ====================

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';

            // 显示移动端控件
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
            if (isMobile) {
                document.getElementById('joystickContainer').style.display = 'block';
                document.getElementById('attackBtn').style.display = 'flex';
                document.getElementById('dodgeBtn').style.display = 'flex';
                document.getElementById('mobileMenu').style.display = 'flex';
            }

            // 重置游戏状态
            gameState = {
                playing: true,
                paused: false,
                player: {
                    level: 1,
                    exp: 0,
                    expToLevel: 100,
                    hp: 100,
                    maxHp: 100,
                    gold: 0,
                    weaponIndex: 0,
                    weaponLevel: 1,
                    attackPower: 10
                },
                ownedWings: [0],
                equippedWing: 0,
                unlockedWeapons: [0],
                wave: 1,
                killCount: 0
            };

            // 创建玩家
            player = createPlayer();
            player.position.set(0, 0, 0);

            // 创建剑
            playerSword = createSword(0, 1);
            playerSword.position.set(0.8, 1.2, 0.3);
            playerSword.rotation.x = Math.PI / 6;
            player.add(playerSword);

            // 创建翅膀
            playerWing = createWing(0);
            player.add(playerWing);

            // 开始生成怪物
            spawnMonster();
            setInterval(() => {
                if (gameState.playing && !gameState.paused) {
                    spawnMonster();
                }
            }, CONFIG.SPAWN_INTERVAL);

            // 波次系统
            setInterval(() => {
                if (gameState.playing && !gameState.paused) {
                    if (gameState.killCount >= 10 * gameState.wave) {
                        gameState.wave++;
                        showMessage(`第 ${gameState.wave} 波来袭!`);
                        updateHUD();
                    }
                }
            }, 1000);

            updateHUD();
        }

        // 游戏循环
        function animate() {
            requestAnimationFrame(animate);

            if (!gameState.playing || gameState.paused) {
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // 玩家移动
            const speed = CONFIG.PLAYER_SPEED * (1 + WINGS[gameState.equippedWing].speedBonus);

            // 检测是否为移动端
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;

            if (isMobile) {
                // 移动端：使用摇杆直接控制移动方向
                if (joystickActive && (Math.abs(joystickX) > 0.1 || Math.abs(joystickY) > 0.1)) {
                    // joystickY < 0 表示向上推摇杆，应该向前移动（-Z方向）
                    // joystickX > 0 表示向右推摇杆，应该向右移动（+X方向）
                    const moveX = joystickX * speed;
                    const moveZ = joystickY * speed; // 向上推(-Y) = 向前(+Z暂时理解，实际是-Z)

                    // 转换为世界坐标（向上推=向-Z移动）
                    player.position.x += moveX;
                    player.position.z -= moveZ;

                    // 更新角色朝向（面向摇杆方向的反方向，即摇杆推的方向）
                    if (Math.abs(joystickX) > 0.1 || Math.abs(joystickY) > 0.1) {
                        player.rotation.y = Math.atan2(joystickX, -joystickY);
                    }
                }
            } else {
                // PC端：使用按键控制
                if (keys.forward) {
                    player.position.x -= Math.sin(player.rotation.y) * speed;
                    player.position.z -= Math.cos(player.rotation.y) * speed;
                }
                if (keys.backward) {
                    player.position.x += Math.sin(player.rotation.y) * speed;
                    player.position.z += Math.cos(player.rotation.y) * speed;
                }

                // 旋转
                if (keys.left) {
                    player.rotation.y += 0.05;
                }
                if (keys.right) {
                    player.rotation.y -= 0.05;
                }
            }

            // 边界限制
            const limit = CONFIG.WORLD_SIZE / 2 - 2;
            player.position.x = Math.max(-limit, Math.min(limit, player.position.x));
            player.position.z = Math.max(-limit, Math.min(limit, player.position.z));

            // 攻击
            if (keys.attack) {
                performAttack();
            }

            // 闪避
            if (keys.dodge) {
                player.position.x -= Math.sin(player.rotation.y) * speed * 2;
                player.position.z -= Math.cos(player.rotation.y) * speed * 2;
            }

            // 相机跟随
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 20;
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);

            // 怪物AI
            monsters.forEach(monster => {
                if (!monster) return;

                // 向玩家移动
                const dx = player.position.x - monster.position.x;
                const dz = player.position.z - monster.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                if (distance > 2) {
                    monster.position.x += (dx / distance) * monster.userData.speed;
                    monster.position.z += (dz / distance) * monster.userData.speed;

                    // 面向玩家
                    monster.rotation.y = Math.atan2(dx, dz);
                } else {
                    // 攻击玩家
                    const now = Date.now();
                    if (now - monster.userData.lastAttack > 1000) {
                        monster.userData.lastAttack = now;
                        gameState.player.hp -= monster.userData.damage;

                        // 玩家受伤效果
                        if (player.children[1]) { // 头部
                            player.children[1].material.emissive = new THREE.Color(0xff0000);
                            setTimeout(() => {
                                player.children[1].material.emissive = new THREE.Color(0x000000);
                            }, 100);
                        }

                        if (gameState.player.hp <= 0) {
                            gameOver();
                        }

                        updateHUD();
                    }
                }
            });

            // 更新粒子
            particles.forEach((particle, index) => {
                if (particle.userData.velocity) {
                    particle.position.add(particle.userData.velocity);
                    particle.userData.velocity.y -= 0.01;
                }
                particle.userData.life -= 0.02;
                particle.material.opacity = particle.userData.life;

                if (particle.userData.life <= 0) {
                    scene.remove(particle);
                    particles.splice(index, 1);
                }
            });

            // 剑动画
            if (playerSword && !isAttacking) {
                playerSword.rotation.z = Math.sin(Date.now() * 0.003) * 0.1;
            }

            // 翅膀动画
            if (playerWing) {
                playerWing.children.forEach((wing, i) => {
                    wing.rotation.y = (i === 0 ? 1 : -1) * Math.PI / 6 + Math.sin(Date.now() * 0.005 + i) * 0.2;
                });
            }

            // 更新小地图
            updateMinimap();

            renderer.render(scene, camera);
        }

        // 更新小地图
        function updateMinimap() {
            const canvas = document.getElementById('minimapCanvas');
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, 150, 150);

            // 背景
            ctx.fillStyle = 'rgba(50, 100, 50, 0.5)';
            ctx.fillRect(0, 0, 150, 150);

            const scale = 150 / CONFIG.WORLD_SIZE;
            const offsetX = 75;
            const offsetZ = 75;

            // 玩家
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(
                offsetX + player.position.x * scale,
                offsetZ + player.position.z * scale,
                5, 0, Math.PI * 2
            );
            ctx.fill();

            // 玩家方向
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(
                offsetX + player.position.x * scale,
                offsetZ + player.position.z * scale
            );
            ctx.lineTo(
                offsetX + player.position.x * scale - Math.sin(player.rotation.y) * 10,
                offsetZ + player.position.z * scale - Math.cos(player.rotation.y) * 10
            );
            ctx.stroke();

            // 怪物
            monsters.forEach(monster => {
                const color = monster.userData.type === 'boss' ? '#ff0000' :
                              monster.userData.type === 'daKai' ? '#ff00ff' : '#ff6600';

                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(
                    offsetX + monster.position.x * scale,
                    offsetZ + monster.position.z * scale,
                    monster.userData.type === 'boss' ? 5 : 3, 0, Math.PI * 2
                );
                ctx.fill();
            });
        }

        // 游戏结束
        function gameOver() {
            gameState.playing = false;

            // 隐藏移动端控件
            document.getElementById('joystickContainer').style.display = 'none';
            document.getElementById('attackBtn').style.display = 'none';
            document.getElementById('dodgeBtn').style.display = 'none';
            document.getElementById('mobileMenu').style.display = 'none';

            const msg = document.getElementById('message');
            msg.innerHTML = `💀 游戏结束!<br>到达波次: ${gameState.wave}<br>击杀: ${gameState.killCount}<br><br>
                <button class="menu-btn" onclick="location.reload()" style="padding: 10px 30px; font-size: 18px;">重新开始</button>`;
            msg.className = '';
            msg.style.display = 'flex';
            msg.style.flexDirection = 'column';
            msg.style.alignItems = 'center';
        }

        // 窗口调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
