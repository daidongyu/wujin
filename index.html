<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>天外飞翠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            background: #1a1a2e;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .ui-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .stats {
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 10px;
            color: #fff;
            font-family: 'SimHei', sans-serif;
            font-size: 16px;
            border: 2px solid #f1c40f;
        }
        .stats div {
            margin: 5px 0;
        }
        .level-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'SimHei', sans-serif;
            font-size: 48px;
            color: #f1c40f;
            text-shadow: 0 0 20px #f39c12, 0 0 40px #e74c3c;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 20;
        }
        .controls-hint {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-family: sans-serif;
            pointer-events: none;
            text-align: center;
        }
        .game-over, .level-complete {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .game-over h1 {
            font-size: 60px;
            color: #e74c3c;
            text-shadow: 0 0 30px #c0392b;
            margin-bottom: 30px;
        }
        .level-complete h1 {
            font-size: 48px;
            color: #f1c40f;
            text-shadow: 0 0 30px #f39c12;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            font-family: 'SimHei', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #9b59b6;
        }
        .skill-bar {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .skill-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .skill-btn.active {
            border-color: #f1c40f;
            box-shadow: 0 0 15px #f1c40f;
        }
        .skill-btn.locked {
            opacity: 0.4;
            border-color: #666;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div class="ui-overlay">
        <div class="stats">
            <div style="font-size:20px;font-weight:bold;color:#f1c40f;">👑 翠翠</div>
            <div>关卡: <span id="level">1</span>/20</div>
            <div>生命: <span id="hp">100</span></div>
            <div>金币: <span id="gold">0</span></div>
            <div>技能: <span id="currentSkill">火焰</span></div>
        </div>
    </div>

    <div class="level-title" id="levelTitle"></div>
    <div class="controls-hint">方向键/WASD移动 | 空格/上跳跃 | S/下下蹲 | J攻击 | K技能 | 1-5切换技能</div>

    <div class="skill-bar" id="skillBar"></div>

    <div class="game-over" id="gameOver">
        <h1>游戏结束</h1>
        <p style="color:#fff;font-size:20px;margin-bottom:20px;">坚持到第 <span id="finalLevel">1</span> 关</p>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <div class="level-complete" id="levelComplete">
        <h1>关卡完成!</h1>
        <p style="color:#fff;font-size:18px;margin-bottom:20px;">获得金币: <span id="levelGold">0</span></p>
        <button class="btn" onclick="nextLevel()">下一关</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let W, H;
        const TILE = 40;
        const GRAVITY = 0.6;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
            W = Math.min(window.innerWidth, 1200);
            H = Math.min(window.innerHeight, 600);
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        resize();
        window.addEventListener('resize', resize);

        // 加载头像
        const playerImg = new Image();
        playerImg.src = './cuicui.jpg';
        let playerImgLoaded = false;
        playerImg.onload = () => playerImgLoaded = true;

        // 技能配置
        const SKILLS = [
            { name: '火焰', icon: '🔥', color: '#e74c3c', bulletColor: '#f39c12', speed: 12, damage: 20, size: 8 },
            { name: '风暴', icon: '🌀', color: '#3498db', bulletColor: '#85c1e9', speed: 15, damage: 15, size: 12, pierce: true },
            { name: '雷电', icon: '⚡', color: '#f1c40f', bulletColor: '#fff', speed: 20, damage: 35, size: 6, chain: true },
            { name: '光剑', icon: '⚔️', color: '#9b59b6', bulletColor: '#e8daef', speed: 18, damage: 50, size: 5, range: 100 },
            { name: '冰霜', icon: '❄️', color: '#00cec9', bulletColor: '#81ecec', speed: 10, damage: 12, size: 10, freeze: true }
        ];

        // 敌人配置
        const ENEMIES = {
            '嘉姐': { hp: 80, speed: 2, damage: 15, color: '#e91e63', size: 35, pattern: 'chase', gold: 50 },
            '万总': { hp: 150, speed: 1.5, damage: 25, color: '#673ab7', size: 45, pattern: 'patrol', gold: 100 },
            '二叔': { hp: 200, speed: 1, damage: 30, color: '#ff5722', size: 50, pattern: 'shoot', gold: 150 },
            '二婶': { hp: 300, speed: 0.8, damage: 40, color: '#795548', size: 55, pattern: 'boss', gold: 300 }
        };

        // 关卡配置
        const LEVELS = [];
        for (let i = 1; i <= 20; i++) {
            const difficulty = i;
            LEVELS.push({
                name: `第${i}关`,
                platforms: generatePlatforms(i),
                enemies: generateEnemies(i),
                bgColor: `hsl(${(i * 18) % 360}, 30%, ${25 - Math.min(i, 10)}%)`,
                groundColor: `hsl(${(i * 18 + 60) % 360}, 50%, ${35 - Math.min(i, 15)}%)`,
                enemyCount: Math.min(3 + Math.floor(i * 1.5), 15),
                enemyTypes: i < 5 ? ['嘉姐'] : i < 10 ? ['嘉姐', '万总'] : i < 15 ? ['嘉姐', '万总', '二叔'] : ['嘉姐', '万总', '二叔', '二婶'],
                spawnRate: Math.max(3000 - i * 150, 1000)
            });
        }

        function generatePlatforms(level) {
            const platforms = [];
            const platformCount = 5 + Math.min(level, 10);

            for (let i = 0; i < platformCount; i++) {
                platforms.push({
                    x: 100 + (i * (W - 200) / platformCount) + Math.random() * 50,
                    y: H - 150 - Math.random() * 200,
                    w: 80 + Math.random() * 60,
                    h: 20,
                    type: level > 10 && Math.random() > 0.7 ? 'moving' : 'static',
                    moveSpeed: 1 + Math.random()
                });
            }
            return platforms;
        }

        function generateEnemies(level) {
            const enemies = [];
            const types = level < 5 ? ['嘉姐'] : level < 10 ? ['嘉姐', '万总'] : level < 15 ? ['嘉姐', '万总', '二叔'] : ['嘉姐', '万总', '二叔', '二婶'];

            for (let i = 0; i < Math.min(3 + level, 10); i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                enemies.push({
                    type,
                    x: W + Math.random() * W,
                    y: H - 100,
                    ...ENEMIES[type]
                });
            }
            return enemies;
        }

        // 游戏状态
        let gameState = 'playing';
        let currentLevel = 1;
        let gold = 0;
        let cameraX = 0;
        let levelWidth = 3000;

        // 玩家
        const player = {
            x: 100,
            y: H - 150,
            w: 40,
            h: 60,
            vx: 0,
            vy: 0,
            hp: 100,
            maxHp: 100,
            speed: 5,
            jumpForce: -14,
            facing: 1,
            grounded: false,
            crouching: false,
            invincible: 0,
            attackCooldown: 0,
            skillCooldown: 0,
            currentSkill: 0,
            unlockedSkills: [true, false, false, false, false],
            animation: 0
        };

        // 游戏对象
        let platforms = [];
        let enemies = [];
        let bullets = [];
        let particles = [];
        let drops = [];
        let enemyBullets = [];

        // 输入
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key >= '1' && e.key <= '5' && player.unlockedSkills[parseInt(e.key) - 1]) {
                player.currentSkill = parseInt(e.key) - 1;
                updateSkillUI();
            }
        });
        document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 触控按钮
        function createTouchControls() {
            const controls = document.createElement('div');
            controls.style.cssText = 'position:fixed;bottom:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;';
            controls.innerHTML = `
                <div style="display:flex;gap:10px;pointer-events:auto;">
                    <button id="btnLeft" style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.3);border:2px solid #fff;color:#fff;font-size:20px;">◀</button>
                    <button id="btnRight" style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.3);border:2px solid #fff;color:#fff;font-size:20px;">▶</button>
                </div>
                <div style="display:flex;gap:10px;pointer-events:auto;">
                    <button id="btnJump" style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.3);border:2px solid #fff;color:#fff;font-size:20px;">▲</button>
                    <button id="btnCrouch" style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.3);border:2px solid #fff;color:#fff;font-size:20px;">▼</button>
                    <button id="btnAttack" style="width:50px;height:50px;border-radius:50%;background:rgba(255,100,100,0.5);border:2px solid #e74c3c;color:#fff;font-size:16px;">攻击</button>
                </div>
            `;
            document.body.appendChild(controls);

            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');
            const btnCrouch = document.getElementById('btnCrouch');
            const btnAttack = document.getElementById('btnAttack');

            btnLeft.addEventListener('touchstart', e => { e.preventDefault(); keys['a'] = true; });
            btnLeft.addEventListener('touchend', e => { e.preventDefault(); keys['a'] = false; });
            btnRight.addEventListener('touchstart', e => { e.preventDefault(); keys['d'] = true; });
            btnRight.addEventListener('touchend', e => { e.preventDefault(); keys['d'] = false; });
            btnJump.addEventListener('touchstart', e => { e.preventDefault(); keys[' '] = true; });
            btnJump.addEventListener('touchend', e => { e.preventDefault(); keys[' '] = false; });
            btnCrouch.addEventListener('touchstart', e => { e.preventDefault(); keys['s'] = true; });
            btnCrouch.addEventListener('touchend', e => { e.preventDefault(); keys['s'] = false; });
            btnAttack.addEventListener('touchstart', e => { e.preventDefault(); keys['j'] = true; });
            btnAttack.addEventListener('touchend', e => { e.preventDefault(); keys['j'] = false; });
        }
        createTouchControls();

        // 技能UI
        function createSkillUI() {
            const bar = document.getElementById('skillBar');
            SKILLS.forEach((skill, i) => {
                const btn = document.createElement('div');
                btn.className = 'skill-btn' + (player.unlockedSkills[i] ? '' : ' locked');
                btn.innerHTML = skill.icon;
                btn.title = skill.name;
                btn.onclick = () => {
                    if (player.unlockedSkills[i]) {
                        player.currentSkill = i;
                        updateSkillUI();
                    }
                };
                bar.appendChild(btn);
            });
        }
        createSkillUI();

        function updateSkillUI() {
            const btns = document.querySelectorAll('.skill-btn');
            btns.forEach((btn, i) => {
                btn.classList.toggle('active', i === player.currentSkill);
            });
            document.getElementById('currentSkill').textContent = SKILLS[player.currentSkill].name;
        }
        updateSkillUI();

        // 初始化关卡
        function initLevel(level) {
            const config = LEVELS[level - 1];
            platforms = config.platforms.map(p => ({...p, ox: p.x}));
            enemies = config.enemies.map(e => ({...e, maxHp: e.hp}));
            bullets = [];
            particles = [];
            drops = [];
            enemyBullets = [];
            cameraX = 0;
            player.x = 100;
            player.y = H - 150;
            player.vx = 0;
            player.vy = 0;

            // 显示关卡标题
            const title = document.getElementById('levelTitle');
            title.textContent = config.name;
            title.style.opacity = 1;
            setTimeout(() => title.style.opacity = 0, 2000);

            document.getElementById('level').textContent = level;
        }

        // 生成敌人
        let lastSpawn = 0;
        function spawnEnemy() {
            const config = LEVELS[currentLevel - 1];
            if (enemies.length < config.enemyCount && Date.now() - lastSpawn > config.spawnRate) {
                const type = config.enemyTypes[Math.floor(Math.random() * config.enemyTypes.length)];
                const template = ENEMIES[type];
                enemies.push({
                    type,
                    x: cameraX + W + 50,
                    y: H - 100 - Math.random() * 200,
                    ...template,
                    maxHp: template.hp * (1 + currentLevel * 0.1),
                    hp: template.hp * (1 + currentLevel * 0.1),
                    vx: 0,
                    vy: 0,
                    attackTimer: 0,
                    facing: -1
                });
                lastSpawn = Date.now();
            }
        }

        // 创建子弹
        function createBullet(x, y, dir, skill) {
            const s = SKILLS[skill];
            bullets.push({
                x, y,
                vx: dir * s.speed,
                vy: 0,
                ...s,
                life: 100,
                fromPlayer: true
            });

            // 发射粒子
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: dir * (Math.random() * 5 + 2),
                    vy: (Math.random() - 0.5) * 4,
                    color: s.bulletColor,
                    size: Math.random() * 4 + 2,
                    life: 20
                });
            }
        }

        // 创建敌人子弹
        function createEnemyBullet(enemy) {
            const dir = enemy.facing;
            enemyBullets.push({
                x: enemy.x,
                y: enemy.y,
                vx: dir * 6,
                vy: -2,
                color: enemy.color,
                size: 8,
                damage: enemy.damage,
                life: 150
            });
        }

        // 创建掉落物
        function createDrop(x, y, type) {
            const types = ['gold', 'skill', 'hp'];
            drops.push({
                x, y,
                vy: -5,
                type: type || types[Math.floor(Math.random() * types.length)],
                skillType: Math.floor(Math.random() * SKILLS.length),
                life: 300,
                collected: false
            });
        }

        // 碰撞检测
        function collides(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function pointInRect(px, py, r) {
            return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
        }

        // 更新玩家
        function updatePlayer() {
            // 移动
            player.vx = 0;
            if (keys['a'] || keys['arrowleft']) {
                player.vx = -player.speed;
                player.facing = -1;
            }
            if (keys['d'] || keys['arrowright']) {
                player.vx = player.speed;
                player.facing = 1;
            }

            // 下蹲
            player.crouching = (keys['s'] || keys['arrowdown']) && player.grounded;
            if (player.crouching) player.vx *= 0.3;

            // 跳跃
            if ((keys[' '] || keys['w'] || keys['arrowup']) && player.grounded && !player.crouching) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            // 攻击
            if ((keys['j']) && player.attackCooldown <= 0) {
                createBullet(
                    player.x + player.w/2 + player.facing * 30,
                    player.y + player.h/2 - 10,
                    player.facing,
                    player.currentSkill
                );
                player.attackCooldown = 15;
            }

            // 技能攻击
            if ((keys['k']) && player.skillCooldown <= 0) {
                const s = SKILLS[player.currentSkill];
                // 发射多发子弹
                for (let i = -1; i <= 1; i++) {
                    bullets.push({
                        x: player.x + player.w/2,
                        y: player.y + player.h/2 - 10,
                        vx: player.facing * s.speed * 0.8,
                        vy: i * 3,
                        ...s,
                        life: 80
                    });
                }
                player.skillCooldown = 60;
            }

            // 冷却
            if (player.attackCooldown > 0) player.attackCooldown--;
            if (player.skillCooldown > 0) player.skillCooldown--;
            if (player.invincible > 0) player.invincible--;

            // 重力
            player.vy += GRAVITY;

            // 移动
            player.x += player.vx;
            player.y += player.vy;

            // 地面碰撞
            player.grounded = false;
            const groundY = H - 60;

            if (player.y + player.h > groundY) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.grounded = true;
            }

            // 平台碰撞
            platforms.forEach(p => {
                if (p.type === 'moving') {
                    p.x = p.ox + Math.sin(Date.now() * 0.002 * p.moveSpeed) * 50;
                }

                if (player.vy >= 0 &&
                    player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
            });

            // 边界
            player.x = Math.max(cameraX, Math.min(levelWidth, player.x));

            // 动画
            if (Math.abs(player.vx) > 0) player.animation += 0.2;
        }

        // 更新敌人
        function updateEnemies() {
            enemies.forEach((e, idx) => {
                // AI行为
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                e.facing = dx > 0 ? 1 : -1;

                switch(e.pattern) {
                    case 'chase':
                        if (Math.abs(dx) > 100) e.vx = e.facing * e.speed;
                        else e.vx = 0;
                        break;
                    case 'patrol':
                        e.vx = e.facing * e.speed;
                        if (Math.random() < 0.02) e.facing *= -1;
                        break;
                    case 'shoot':
                        e.vx = Math.abs(dx) > 200 ? e.facing * e.speed : 0;
                        e.attackTimer++;
                        if (e.attackTimer > 90) {
                            createEnemyBullet(e);
                            e.attackTimer = 0;
                        }
                        break;
                    case 'boss':
                        if (Math.abs(dx) > 150) e.vx = e.facing * e.speed;
                        else e.vx = 0;
                        e.attackTimer++;
                        if (e.attackTimer > 60) {
                            createEnemyBullet(e);
                            if (currentLevel >= 18) createEnemyBullet(e);
                            e.attackTimer = 0;
                        }
                        break;
                }

                // 重力
                e.vy += GRAVITY;
                e.x += e.vx;
                e.y += e.vy;

                // 地面
                if (e.y + e.hp > H - 60) {
                    e.y = H - 60 - (e.size || 40);
                    e.vy = 0;
                }

                // 平台
                platforms.forEach(p => {
                    if (e.vy >= 0 &&
                        e.x + (e.size || 40) > p.x && e.x < p.x + p.w &&
                        e.y + (e.size || 40) > p.y && e.y + (e.size || 40) < p.y + p.h + 20) {
                        e.y = p.y - (e.size || 40);
                        e.vy = 0;
                    }
                });

                // 伤害玩家
                if (player.invincible <= 0 && collides(
                    {x: player.x, y: player.y, w: player.w, h: player.h},
                    {x: e.x, y: e.y, w: e.size || 40, h: e.size || 40}
                )) {
                    player.hp -= e.damage;
                    player.invincible = 60;
                    player.vx = -player.facing * 10;
                    player.vy = -5;
                }

                // 死亡
                if (e.hp <= 0) {
                    gold += e.gold;
                    createDrop(e.x, e.y, 'gold');
                    if (Math.random() < 0.2) createDrop(e.x, e.y, 'skill');
                    if (Math.random() < 0.3) createDrop(e.x, e.y, 'hp');

                    for (let i = 0; i < 20; i++) {
                        particles.push({
                            x: e.x + (e.size || 40)/2,
                            y: e.y + (e.size || 40)/2,
                            vx: (Math.random() - 0.5) * 10,
                            vy: (Math.random() - 0.5) * 10,
                            color: e.color,
                            size: Math.random() * 6 + 3,
                            life: 40
                        });
                    }

                    enemies.splice(idx, 1);
                }
            });
        }

        // 更新子弹
        function updateBullets() {
            bullets.forEach((b, idx) => {
                b.x += b.vx;
                b.y += b.vy;
                b.life--;

                // 特效
                if (b.name === '风暴') {
                    for (let i = 0; i < 2; i++) {
                        particles.push({
                            x: b.x, y: b.y,
                            vx: (Math.random() - 0.5) * 3,
                            vy: (Math.random() - 0.5) * 3,
                            color: b.bulletColor,
                            size: Math.random() * 4 + 1,
                            life: 15
                        });
                    }
                }

                // 击中敌人
                enemies.forEach(e => {
                    if (pointInRect(b.x, b.y, {x: e.x, y: e.y, w: e.size || 40, h: e.size || 40})) {
                        e.hp -= b.damage;
                        b.life = 0;

                        // 雷电链式效果
                        if (b.chain) {
                            enemies.forEach(e2 => {
                                if (e2 !== e && Math.abs(e2.x - e.x) < 150) {
                                    e2.hp -= b.damage * 0.5;
                                }
                            });
                        }

                        // 冰霜减速
                        if (b.freeze) {
                            e.speed *= 0.5;
                            setTimeout(() => e.speed /= 0.5, 2000);
                        }
                    }
                });

                if (b.life <= 0 || b.x < cameraX - 50 || b.x > cameraX + W + 50) {
                    bullets.splice(idx, 1);
                }
            });

            // 敌弹
            enemyBullets.forEach((b, idx) => {
                b.x += b.vx;
                b.y += b.vy;
                b.vy += 0.05;
                b.life--;

                if (player.invincible <= 0 && pointInRect(b.x, b.y, {x: player.x, y: player.y, w: player.w, h: player.h})) {
                    player.hp -= b.damage;
                    player.invincible = 60;
                    b.life = 0;
                }

                if (b.life <= 0) {
                    enemyBullets.splice(idx, 1);
                }
            });
        }

        // 更新掉落
        function updateDrops() {
            drops.forEach((d, idx) => {
                d.vy += 0.3;
                d.y += d.vy;
                d.life--;

                if (d.y > H - 60) {
                    d.y = H - 60;
                    d.vy = 0;
                }

                // 收集
                const dist = Math.hypot(player.x + player.w/2 - d.x, player.y + player.h/2 - d.y);
                if (dist < 50 && !d.collected) {
                    d.collected = true;

                    switch(d.type) {
                        case 'gold':
                            gold += 10;
                            break;
                        case 'skill':
                            const lockedIdx = player.unlockedSkills.findIndex(u => !u);
                            if (lockedIdx !== -1) {
                                player.unlockedSkills[lockedIdx] = true;
                                updateSkillUI();
                            } else {
                                gold += 50;
                            }
                            break;
                        case 'hp':
                            player.hp = Math.min(player.maxHp, player.hp + 30);
                            break;
                    }

                    drops.splice(idx, 1);
                }

                if (d.life <= 0) {
                    drops.splice(idx, 1);
                }
            });
        }

        // 更新粒子
        function updateParticles() {
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                p.size *= 0.95;

                if (p.life <= 0) {
                    particles.splice(idx, 1);
                }
            });
        }

        // 更新相机
        function updateCamera() {
            const targetX = player.x - W * 0.3;
            cameraX += (targetX - cameraX) * 0.1;
            cameraX = Math.max(0, Math.min(levelWidth - W, cameraX));
        }

        // 绘制背景
        function drawBackground() {
            const config = LEVELS[currentLevel - 1];

            // 渐变背景
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, config.bgColor);
            grad.addColorStop(1, '#0a0a15');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // 星星
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % W;
                const y = (i * 73) % (H * 0.6);
                const twinkle = Math.sin(Date.now() * 0.005 + i) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.8})`;
                ctx.beginPath();
                ctx.arc(x, y, 1 + twinkle, 0, Math.PI * 2);
                ctx.fill();
            }

            // 远山
            ctx.fillStyle = 'rgba(50,50,80,0.5)';
            ctx.beginPath();
            ctx.moveTo(0, H - 100);
            for (let x = 0; x <= W; x += 50) {
                ctx.lineTo(x, H - 100 - Math.sin((x + cameraX * 0.1) * 0.01) * 50);
            }
            ctx.lineTo(W, H);
            ctx.lineTo(0, H);
            ctx.fill();
        }

        // 绘制地面
        function drawGround() {
            const config = LEVELS[currentLevel - 1];

            // 主地面
            ctx.fillStyle = config.groundColor;
            ctx.fillRect(0, H - 60, W, 60);

            // 草地/装饰
            ctx.fillStyle = '#2d5a27';
            for (let x = 0; x < W; x += 20) {
                const worldX = x + cameraX;
                const h = 5 + Math.sin(worldX * 0.1) * 3;
                ctx.fillRect(x, H - 60 - h, 8, h);
            }

            // 地面纹理
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            for (let x = 0; x < W; x += TILE) {
                ctx.fillRect(x, H - 30, TILE - 1, 30);
            }
        }

        // 绘制平台
        function drawPlatforms() {
            platforms.forEach(p => {
                const sx = p.x - cameraX;

                // 平台主体
                ctx.fillStyle = '#5d4e37';
                ctx.fillRect(sx, p.y, p.w, p.h);

                // 平台顶
                ctx.fillStyle = '#7d6e57';
                ctx.fillRect(sx, p.y, p.w, 5);

                // 装饰
                ctx.fillStyle = '#4d3e27';
                ctx.fillRect(sx, p.y + p.h - 5, p.w, 5);
            });
        }

        // 绘制玩家
        function drawPlayer() {
            const sx = player.x - cameraX;
            const sy = player.y;

            ctx.save();

            // 无敌闪烁
            if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            // 身体
            const h = player.crouching ? player.h * 0.6 : player.h;
            const yOffset = player.crouching ? player.h * 0.4 : 0;

            // 身体阴影
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(sx + player.w/2, H - 60, player.w/2 + 5, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // 古风服装
            const dressGrad = ctx.createLinearGradient(sx, sy, sx, sy + h);
            dressGrad.addColorStop(0, '#9b59b6');
            dressGrad.addColorStop(1, '#8e44ad');
            ctx.fillStyle = dressGrad;

            // 长裙
            ctx.beginPath();
            ctx.moveTo(sx, sy + yOffset + 20);
            ctx.lineTo(sx - 5, sy + h);
            ctx.lineTo(sx + player.w + 5, sy + h);
            ctx.lineTo(sx + player.w, sy + yOffset + 20);
            ctx.closePath();
            ctx.fill();

            // 上身
            ctx.fillStyle = '#faf0fa';
            ctx.fillRect(sx + 5, sy + yOffset, player.w - 10, 25);

            // 袖子飘动
            const sleeveWave = Math.sin(player.animation) * 5;
            ctx.fillStyle = '#f5e6f5';
            ctx.beginPath();
            ctx.moveTo(sx, sy + yOffset + 10);
            ctx.quadraticCurveTo(sx - 15 + sleeveWave, sy + yOffset + 25, sx - 10, sy + yOffset + 40);
            ctx.lineTo(sx + 5, sy + yOffset + 30);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(sx + player.w, sy + yOffset + 10);
            ctx.quadraticCurveTo(sx + player.w + 15 - sleeveWave, sy + yOffset + 25, sx + player.w + 10, sy + yOffset + 40);
            ctx.lineTo(sx + player.w - 5, sy + yOffset + 30);
            ctx.closePath();
            ctx.fill();

            // 头部
            ctx.fillStyle = '#fce4d6';
            ctx.beginPath();
            ctx.arc(sx + player.w/2, sy + yOffset - 5, 15, 0, Math.PI * 2);
            ctx.fill();

            // 头像
            if (playerImgLoaded) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(sx + player.w/2, sy + yOffset - 5, 15, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerImg, sx + player.w/2 - 15, sy + yOffset - 20, 30, 30);
                ctx.restore();
            }

            // 发髻
            ctx.fillStyle = '#2c2c4a';
            ctx.beginPath();
            ctx.arc(sx + player.w/2, sy + yOffset - 15, 12, Math.PI, 0);
            ctx.fill();

            // 装饰
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(sx + player.w/2, sy + yOffset - 22, 3, 0, Math.PI * 2);
            ctx.fill();

            // 移动动画
            if (Math.abs(player.vx) > 0 && player.grounded) {
                const bobY = Math.sin(player.animation * 2) * 2;
                ctx.translate(0, bobY);
            }

                // 翠翠名字标签
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#000';
                ctx.fillText('翠翠', sx + player.w/2, sy + yOffset - 30);
                ctx.shadowBlur = 0;

                ctx.restore();
            }

            // 绘制敌人
        function drawEnemies() {
            enemies.forEach(e => {
                const sx = e.x - cameraX;
                const size = e.size || 40;

                ctx.save();

                // 受伤闪烁
                if (e.hp < e.maxHp) {
                    ctx.globalAlpha = 0.8;
                }

                // 身体
                ctx.fillStyle = e.color;

                // 根据类型绘制不同形状
                if (e.pattern === 'boss') {
                    // Boss - 更大更威武
                    ctx.beginPath();
                    ctx.moveTo(sx, e.y + size * 0.3);
                    ctx.lineTo(sx - size * 0.2, e.y + size);
                    ctx.lineTo(sx + size + size * 0.2, e.y + size);
                    ctx.lineTo(sx + size, e.y + size * 0.3);
                    ctx.closePath();
                    ctx.fill();

                    // 皇冠
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.moveTo(sx + size/2, e.y - 10);
                    ctx.lineTo(sx + size/2 - 8, e.y);
                    ctx.lineTo(sx + size/2 + 8, e.y);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // 普通敌人
                    ctx.beginPath();
                    ctx.ellipse(sx + size/2, e.y + size/2, size/2, size/2 * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(sx + size * 0.35, e.y + size * 0.35, size * 0.12, 0, Math.PI * 2);
                ctx.arc(sx + size * 0.65, e.y + size * 0.35, size * 0.12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(sx + size * 0.35 + e.facing * 2, e.y + size * 0.35, size * 0.06, 0, Math.PI * 2);
                ctx.arc(sx + size * 0.65 + e.facing * 2, e.y + size * 0.35, size * 0.06, 0, Math.PI * 2);
                ctx.fill();

                // 名字
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(e.type, sx + size/2, e.y - 10);

                // 血条
                ctx.fillStyle = '#333';
                ctx.fillRect(sx, e.y - 25, size, 6);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(sx, e.y - 25, size * (e.hp / e.maxHp), 6);

                ctx.restore();
            });
        }

        // 绘制子弹
        function drawBullets() {
            bullets.forEach(b => {
                const sx = b.x - cameraX;

                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = b.bulletColor;
                ctx.fillStyle = b.bulletColor;

                if (b.name === '火焰') {
                    // 火焰子弹
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (b.name === '风暴') {
                    // 风暴螺旋
                    ctx.strokeStyle = b.bulletColor;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for (let i = 0; i < 20; i++) {
                        const angle = i * 0.5 + Date.now() * 0.01;
                        const r = b.size * (i / 20);
                        const px = sx + Math.cos(angle) * r;
                        const py = b.y + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                } else if (b.name === '雷电') {
                    // 雷电
                    ctx.strokeStyle = b.bulletColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(sx - 15, b.y - 10);
                    ctx.lineTo(sx, b.y);
                    ctx.lineTo(sx - 5, b.y);
                    ctx.lineTo(sx + 15, b.y + 10);
                    ctx.stroke();
                } else if (b.name === '光剑') {
                    // 光剑
                    ctx.fillStyle = b.bulletColor;
                    ctx.beginPath();
                    ctx.moveTo(sx, b.y - b.range);
                    ctx.lineTo(sx - 8, b.y);
                    ctx.lineTo(sx + 8, b.y);
                    ctx.closePath();
                    ctx.fill();
                } else if (b.name === '冰霜') {
                    // 冰晶
                    for (let i = 0; i < 6; i++) {
                        const angle = i * Math.PI / 3 + Date.now() * 0.005;
                        ctx.beginPath();
                        ctx.moveTo(sx, b.y);
                        ctx.lineTo(sx + Math.cos(angle) * b.size, b.y + Math.sin(angle) * b.size);
                        ctx.strokeStyle = b.bulletColor;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                } else {
                    ctx.beginPath();
                    ctx.arc(sx, b.y, b.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });

            // 敌弹
            enemyBullets.forEach(b => {
                const sx = b.x - cameraX;
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = b.color;
                ctx.beginPath();
                ctx.arc(sx, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 40;
                ctx.beginPath();
                ctx.arc(p.x - cameraX, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        // 绘制掉落
        function drawDrops() {
            drops.forEach(d => {
                const sx = d.x - cameraX;
                const bob = Math.sin(Date.now() * 0.01 + d.x) * 3;

                ctx.save();
                ctx.shadowBlur = 10;

                if (d.type === 'gold') {
                    ctx.fillStyle = '#f1c40f';
                    ctx.shadowColor = '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(sx, d.y + bob, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#f39c12';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('$', sx, d.y + bob + 4);
                } else if (d.type === 'skill') {
                    const skill = SKILLS[d.skillType];
                    ctx.fillStyle = skill.color;
                    ctx.shadowColor = skill.color;
                    ctx.fillRect(sx - 10, d.y + bob - 10, 20, 20);
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(skill.icon, sx, d.y + bob + 5);
                } else if (d.type === 'hp') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.shadowColor = '#e74c3c';
                    ctx.fillRect(sx - 8, d.y + bob - 12, 16, 24);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('+', sx, d.y + bob + 4);
                }

                ctx.restore();
            });
        }

        // UI更新
        function updateUI() {
            document.getElementById('hp').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('gold').textContent = gold;
        }

        // 主循环
        let lastTime = 0;
        let levelKills = 0;
        let killsToComplete = 10;

        function gameLoop(timestamp) {
            if (gameState !== 'playing') {
                requestAnimationFrame(gameLoop);
                return;
            }

            const dt = timestamp - lastTime;
            lastTime = timestamp;

            // 更新
            updatePlayer();
            updateEnemies();
            updateBullets();
            updateDrops();
            updateParticles();
            updateCamera();
            spawnEnemy();
            updateUI();

            // 关卡完成检测
            killsToComplete = 5 + currentLevel * 2;
            if (enemies.length === 0 && levelKills >= killsToComplete) {
                completeLevel();
            }

            // 死亡检测
            if (player.hp <= 0) {
                gameOver();
            }

            // 绘制
            ctx.clearRect(0, 0, W, H);
            drawBackground();
            drawGround();
            drawPlatforms();
            drawDrops();
            drawBullets();
            drawEnemies();
            drawPlayer();
            drawParticles();

            requestAnimationFrame(gameLoop);
        }

        function completeLevel() {
            gameState = 'levelComplete';
            document.getElementById('levelGold').textContent = gold;
            document.getElementById('levelComplete').style.display = 'flex';
        }

        function nextLevel() {
            document.getElementById('levelComplete').style.display = 'none';
            currentLevel++;
            levelKills = 0;

            if (currentLevel > 20) {
                // 通关！
                document.getElementById('levelComplete').querySelector('h1').textContent = '恭喜通关!';
                document.getElementById('levelComplete').querySelector('p').innerHTML = '你已经完成了所有20关！';
                document.getElementById('levelComplete').querySelector('.btn').textContent = '重新开始';
                document.getElementById('levelComplete').querySelector('.btn').onclick = restartGame;
                document.getElementById('levelComplete').style.display = 'flex';
                gameState = 'complete';
                return;
            }

            initLevel(currentLevel);
            player.hp = Math.min(player.maxHp, player.hp + 20);
            gameState = 'playing';
        }

        function gameOver() {
            gameState = 'gameOver';
            document.getElementById('finalLevel').textContent = currentLevel;
            document.getElementById('gameOver').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'none';
            currentLevel = 1;
            gold = 0;
            levelKills = 0;
            player.hp = player.maxHp;
            player.unlockedSkills = [true, false, false, false, false];
            player.currentSkill = 0;
            updateSkillUI();
            initLevel(1);
            gameState = 'playing';
        }

        // 启动
        initLevel(1);
        gameLoop(0);
    </script>
</body>
</html>
