<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>老七大冒险 - 老七的西游记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameCanvas {
            display: block;
        }

        /* HUD 界面 */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 顶部状态栏 */
        #statusBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px solid #ffd700;
        }

        /* 口令按钮 */
        .cheat-btn {
            padding: 8px 16px;
            font-size: 14px;
            background: linear-gradient(135deg, #9933ff, #6600cc);
            border: 2px solid #cc66ff;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            box-shadow: 0 0 10px rgba(153, 51, 255, 0.5);
        }

        .cheat-btn:active {
            transform: scale(0.95);
        }

        .status-item {
            text-align: center;
            color: #fff;
        }

        .status-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 18px;
            font-weight: bold;
        }

        .exp-bar {
            width: 150px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }

        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            transition: width 0.3s;
        }

        /* 武器信息 */
        #weaponInfo {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff6600;
            color: #fff;
            min-width: 200px;
        }

        #weaponInfo h3 {
            color: #ff6600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #weaponLevel {
            font-size: 24px;
            color: #ffd700;
        }

        /* 金币显示 */
        #goldDisplay {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 控制提示 */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: #aaa;
            font-size: 12px;
        }

        #controls h4 {
            color: #fff;
            margin-bottom: 8px;
        }

        /* 开始界面 */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #startScreen h1 {
            font-size: 72px;
            color: #ffd700;
            text-shadow: 0 0 20px #ff6600, 0 0 40px #ff0000;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #ff6600, 0 0 40px #ff0000; }
            to { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff6600; }
        }

        #startScreen h2 {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 50px;
        }

        .menu-btn {
            padding: 15px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #ff6600, #ff3300);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            margin: 10px;
            transition: all 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 5px 20px rgba(255, 102, 0, 0.5);
        }

        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 30px rgba(255, 102, 0, 0.8);
        }

        /* 商店界面 */
        #shopScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 90;
            overflow-y: auto;
        }

        /* 商店样式 */
        .shop-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .shop-title {
            text-align: center;
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .shop-section {
            background: linear-gradient(135deg, rgba(50, 30, 60, 0.9), rgba(30, 20, 50, 0.9));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .shop-section h3 {
            color: #ff9900;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 153, 0, 0.5);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .shop-item {
            background: linear-gradient(135deg, rgba(80, 50, 100, 0.9), rgba(50, 30, 70, 0.9));
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
            cursor: pointer;
            pointer-events: auto;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .shop-item:active {
            transform: scale(0.95);
        }

        .shop-item:hover {
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .shop-item.owned {
            border-color: rgba(0, 255, 100, 0.6);
            background: linear-gradient(135deg, rgba(0, 100, 50, 0.8), rgba(0, 60, 30, 0.8));
        }

        .shop-item.equipped {
            border-color: #00ffff;
            background: linear-gradient(135deg, rgba(0, 150, 150, 0.6), rgba(0, 100, 100, 0.6));
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .shop-item.disabled {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .shop-item.disabled .shop-item-price {
            color: #ff6666;
        }

        .shop-item-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .shop-item-name {
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .shop-item-price {
            color: #ffd700;
            font-size: 12px;
        }

        .shop-item-level {
            color: #00ff00;
            font-size: 11px;
            margin-top: 5px;
        }

        .close-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(255, 50, 50, 0.4);
            z-index: 100;
        }

        .close-btn:active {
            transform: scale(0.95);
        }

        /* 口令输入界面 */
        #cheatScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            z-index: 95;
            justify-content: center;
            align-items: center;
        }

        .cheat-container {
            background: linear-gradient(135deg, rgba(60, 20, 80, 0.98), rgba(40, 10, 60, 0.98));
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            border: 3px solid #9933ff;
            box-shadow: 0 0 30px rgba(153, 51, 255, 0.5);
        }

        .cheat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .cheat-header h2 {
            color: #cc66ff;
            font-size: 24px;
            margin: 0;
        }

        .cheat-hints {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .cheat-hints p {
            color: #ddd;
            font-size: 14px;
            margin: 8px 0;
        }

        .cheat-hints strong {
            color: #ffd700;
        }

        .cheat-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .cheat-input {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #9933ff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            outline: none;
        }

        .cheat-input:focus {
            border-color: #cc66ff;
            box-shadow: 0 0 10px rgba(153, 51, 255, 0.5);
        }

        .cheat-input::placeholder {
            color: #888;
        }

        .cheat-submit {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #9933ff, #6600cc);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(153, 51, 255, 0.5);
        }

        .cheat-submit:active {
            transform: scale(0.95);
        }

        .cheat-message {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            color: #ffd700;
            min-height: 24px;
        }

        /* 商店/升级界面 */
        #shopScreen,
        #upgradeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.98), rgba(10, 5, 30, 0.98));
            display: none;
            z-index: 90;
            overflow-y: auto;
        }

        /* 怪物信息 */
        #monsterInfo {
            position: absolute;
            top: 200px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid #ff0000;
            color: #fff;
            font-size: 12px;
        }

        /* 消息提示 - 顶部中央，小尺寸不遮挡特效 */
        #message {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.6);
            color: #fff;
            font-size: 16px;
            display: none;
            z-index: 25;
            text-align: center;
            white-space: nowrap;
            max-width: 80%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .level-up {
            color: #00ff00 !important;
            animation: pulseSmall 0.3s ease-in-out;
            font-size: 18px;
        }

        @keyframes pulseSmall {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        /* 小地图 - 左上角 */
        #minimap {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.5);
            overflow: hidden;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
        }

        /* 快捷键提示 */
        .key-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            color: #aaa;
            font-size: 12px;
        }

        .key-hint span {
            color: #ffd700;
            margin: 0 5px;
        }

        /* 伤害数字 */
        .damage-number {
            position: absolute;
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }

        .gold-number {
            color: #ffd700 !important;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        /* 技能栏 - 左侧垂直排列 */
        #skillBar {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
            border-radius: 12px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            z-index: 30;
        }

        .skill-slot {
            width: 45px;
            height: 45px;
            background: rgba(50, 50, 50, 0.9);
            border-radius: 8px;
            border: 2px solid #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            cursor: pointer;
            pointer-events: auto;
        }

        .skill-slot.ready {
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .skill-slot.on-cooldown {
            border-color: #ff0000;
            opacity: 0.7;
        }

        .skill-cd {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 10px;
            text-align: center;
        }

        /* ==================== 移动端控制 ==================== */
        .mobile-btn {
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffd700;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            font-size: 14px;
            padding: 8px 16px;
        }

        /* 飞行按钮 - 更醒目 */
        .flying-btn {
            position: absolute;
            bottom: 20px;
            left: 160px;
            width: auto;
            height: 50px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, rgba(100, 100, 255, 0.8), rgba(150, 100, 255, 0.8));
            border: 3px solid #8888ff;
            box-shadow: 0 0 15px rgba(100, 100, 255, 0.5);
            z-index: 55;
        }

        .flying-btn.flying {
            background: linear-gradient(135deg, rgba(100, 255, 100, 0.8), rgba(100, 200, 100, 0.8));
            border-color: #66ff66;
            box-shadow: 0 0 20px rgba(100, 255, 100, 0.6);
        }

        /* 虚拟摇杆 */
        #joystickContainer {
            position: absolute;
            bottom: 80px;
            left: 30px;
            width: 120px;
            height: 120px;
            display: none;
            z-index: 50;
        }

        #joystickBase {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 215, 0, 0.6);
            position: relative;
        }

        #joystickThumb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.8);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 攻击按钮 - 右下角 */
        #attackBtn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 80, 80, 0.9), rgba(200, 50, 50, 0.9));
            border: 4px solid #ff4444;
            color: #fff;
            font-size: 40px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: auto;
            box-shadow: 0 0 25px rgba(255, 80, 80, 0.6);
        }

        #attackBtn:active {
            background: rgba(255, 80, 80, 1);
            transform: scale(0.9);
        }

        /* 闪避按钮 - 攻击按钮上方 */
        #dodgeBtn {
            position: absolute;
            bottom: 130px;
            right: 40px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.9), rgba(0, 100, 200, 0.9));
            border: 3px solid #00aaff;
            color: #fff;
            font-size: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.5);
        }

        #dodgeBtn:active {
            background: rgba(0, 150, 255, 1);
            transform: scale(0.9);
        }

        /* 移动端菜单 - 右上角 */
        #mobileMenu {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            flex-direction: row;
            gap: 8px;
            z-index: 50;
        }

        #mobileMenu button {
            width: 45px;
            height: 45px;
            font-size: 20px;
        }

        #mobileMenu.flying {
            flex-direction: row;
            top: auto;
            bottom: 280px;
        }

        /* 移动端隐藏PC控制提示 */
        @media (max-width: 768px) {
            #statusBar {
                gap: 15px;
                padding: 10px 15px;
                font-size: 12px;
            }

            .status-item {
                min-width: 60px;
            }

            .status-label {
                font-size: 10px;
            }

            .status-value {
                font-size: 14px;
            }

            .exp-bar {
                width: 80px;
            }

            #weaponInfo {
                top: 150px;
                left: 10px;
                padding: 10px;
                min-width: 150px;
            }

            #weaponInfo h3 {
                font-size: 12px;
            }

            #weaponIcon {
                font-size: 32px;
            }

            #goldDisplay {
                top: 150px;
                right: 10px;
                padding: 10px 15px;
                font-size: 16px;
            }

            #monsterInfo {
                top: 250px;
                right: 10px;
                font-size: 10px;
            }

            #controls {
                display: none;
            }

            .key-hint {
                display: none;
            }

            #minimap {
                width: 100px;
                height: 100px;
                bottom: 10px;
                right: 10px;
            }

            /* 技能栏 - 移动端左侧 */
            #skillBar {
                top: 50%;
                left: 10px;
                transform: translateY(-50%);
                padding: 5px;
            }

            #minimap {
                width: 80px;
                height: 80px;
                top: 60px;
                left: 10px;
            }

            .skill-slot {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            /* 飞行按钮位置调整 */
            .flying-btn {
                bottom: 30px;
                left: 150px;
            }

            /* 显示移动端控件 */
            #joystickContainer,
            #attackBtn,
            #dodgeBtn,
            #mobileMenu {
                display: block;
            }

            .menu-btn {
                padding: 12px 40px;
                font-size: 18px;
            }

            #startScreen h1 {
                font-size: 42px;
            }

            #startScreen h2 {
                font-size: 18px;
            }

            /* 商店移动端适配 */
            .shop-container {
                padding: 15px;
                padding-bottom: 80px;
            }

            .shop-title {
                font-size: 28px;
                margin-top: 60px;
            }

            .shop-section {
                padding: 15px;
                border-radius: 15px;
            }

            .shop-section h3 {
                font-size: 18px;
            }

            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 10px;
            }

            .shop-item {
                padding: 10px;
                min-height: 90px;
                border-radius: 12px;
            }

            .shop-item-icon {
                font-size: 28px;
            }

            .shop-item-name {
                font-size: 11px;
            }

            .shop-item-price {
                font-size: 10px;
            }

            .close-btn {
                top: 10px;
                right: 10px;
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        /* 超小屏幕适配 */
        @media (max-width: 480px) {
            #statusBar {
                gap: 5px;
                padding: 5px 8px;
            }

            .status-label {
                font-size: 8px;
            }

            .status-value {
                font-size: 11px;
            }

            .exp-bar {
                width: 50px;
            }

            #weaponInfo {
                display: none;
            }

            .shop-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .shop-item {

        // ==================== 移动端控制 ====================
        let joystickActive = false;
        let joystickTouch = null;
        let joystickStartX = 0;
        let joystickStartY = 0;
        let joystickX = 0; // 摇杆X偏移 (-1 ~ 1)
        let joystickY = 0; // 摇杆Y偏移 (-1 ~ 1)
        let attackTouch = null;
        let dodgeTouch = null;

        function initMobileControls() {
            const joystickContainer = document.getElementById('joystickContainer');
            const joystickBase = document.getElementById('joystickBase');
            const joystickThumb = document.getElementById('joystickThumb');
            const attackBtn = document.getElementById('attackBtn');
            const dodgeBtn = document.getElementById('dodgeBtn');
            const shopBtn = document.getElementById('shopBtn');
            const upgradeBtn = document.getElementById('upgradeBtn');

            // 摇杆事件
            joystickContainer.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                joystickTouch = touch.identifier;
                joystickActive = true;

                const rect = joystickBase.getBoundingClientRect();
                joystickStartX = rect.left + rect.width / 2;
                joystickStartY = rect.top + rect.height / 2;
            });

            joystickContainer.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!joystickActive) return;

                for (let touch of e.touches) {
                    if (touch.identifier === joystickTouch) {
                        const dx = touch.clientX - joystickStartX;
                        const dy = touch.clientY - joystickStartY;

                        const maxDistance = 35;
                        const distance = Math.min(Math.sqrt(dx * dx + dy * dy), maxDistance);
                        const angle = Math.atan2(dy, dx);

                        const thumbX = Math.cos(angle) * distance;
                        const thumbY = Math.sin(angle) * distance;

                        joystickThumb.style.transform = `translate(calc(-50% + ${thumbX}px), calc(-50% + ${thumbY}px))`;

                        // 标准化摇杆偏移 (-1 ~ 1)
                        joystickX = dx / maxDistance;
                        joystickY = dy / maxDistance;

                        // 限制范围
                        joystickX = Math.max(-1, Math.min(1, joystickX));
                        joystickY = Math.max(-1, Math.min(1, joystickY));

                        // 如果距离太小，清除移动
                        if (distance < maxDistance * 0.2) {
                            joystickX = 0;
                            joystickY = 0;
                        }

                        break;
                    }
                }
            });

            joystickContainer.addEventListener('touchend', (e) => {
                e.preventDefault();
                let found = false;
                for (let touch of e.touches) {
                    if (touch.identifier === joystickTouch) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    joystickActive = false;
                    joystickTouch = null;
                    joystickX = 0;
                    joystickY = 0;
                    joystickThumb.style.transform = 'translate(-50%, -50%)';
                }
            });

            // 攻击按钮
            attackBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.attack = true;
            });

            attackBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.attack = false;
            });

            // 闪避按钮
            dodgeBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.dodge = true;
                setTimeout(() => keys.dodge = false, 200);
            });

            dodgeBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.dodge = false;
            });

            // 菜单按钮
            shopBtn.addEventListener('click', toggleShop);
            upgradeBtn.addEventListener('click', toggleUpgrade);

            // 飞行按钮
            const flyBtn = document.getElementById('flyBtn');
            flyBtn.addEventListener('click', toggleFly);

            // 技能按钮（使用HUD中的技能栏）
            for (let i = 1; i <= 4; i++) {
                const skillSlot = document.getElementById(`skill${i}`);
                if (skillSlot) {
                    skillSlot.addEventListener('click', () => useSkill(i - 1));
                    skillSlot.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        useSkill(i - 1);
                    }, { passive: false });
                }
            }

            // 屏幕点击（用于攻击和移动方向）
            document.getElementById('gameCanvas').addEventListener('touchstart', (e) => {
                if (!gameState.playing || gameState.paused) return;

                // 如果点击的是控件区域，不处理
                if (e.target !== document.getElementById('gameCanvas')) return;

                const touch = e.touches[0];
                const x = touch.clientX;
                const y = touch.clientY;

                // 右侧区域点击触发攻击
                if (x > window.innerWidth * 0.6 && y < window.innerHeight * 0.6) {
                    keys.attack = true;
                    setTimeout(() => keys.attack = false, 100);
                }

                // 左侧区域点击设置移动方向
                if (x < window.innerWidth * 0.4) {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight * 0.7;

                    const dx = x - centerX;
                    const dy = centerY - y; // 反转Y使向上点击 = 向上

                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 20) {
                        // 与摇杆保持一致的方向映射
                        player.rotation.y = Math.atan2(-dx / dist, dy / dist);
                    }
                }
            });

            // 防止默认触摸行为
            document.body.addEventListener('touchmove', (e) => {
                if (gameState.playing && !gameState.paused) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        // 创建世界
        function createWorld() {
            // 地面
            const groundGeometry = new THREE.PlaneGeometry(CONFIG.WORLD_SIZE, CONFIG.WORLD_SIZE, 50, 50);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x3a5f0b,
                roughness: 0.8
            });

            // 添加地形起伏
            const vertices = groundGeometry.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                vertices[i + 2] = Math.random() * 0.5;
            }
            groundGeometry.computeVertexNormals();

            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 添加装饰物
            for (let i = 0; i < 50; i++) {
                const tree = createTree(
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8,
                    0,
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8
                );
                scene.add(tree);
                worldObjects.push(tree);
            }

            // 石头
            for (let i = 0; i < 30; i++) {
                const rock = createRock(
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8,
                    0,
                    (Math.random() - 0.5) * CONFIG.WORLD_SIZE * 0.8
                );
                scene.add(rock);
                worldObjects.push(rock);
            }

            // 边界墙
            const wallHeight = 5;
            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });

            const walls = [
                { pos: [CONFIG.WORLD_SIZE/2, wallHeight/2, 0], rot: [0, Math.PI/2, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] },
                { pos: [-CONFIG.WORLD_SIZE/2, wallHeight/2, 0], rot: [0, Math.PI/2, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] },
                { pos: [0, wallHeight/2, CONFIG.WORLD_SIZE/2], rot: [0, 0, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] },
                { pos: [0, wallHeight/2, -CONFIG.WORLD_SIZE/2], rot: [0, 0, 0], size: [CONFIG.WORLD_SIZE, wallHeight, 1] }
            ];

            walls.forEach(w => {
                const geo = new THREE.BoxGeometry(...w.size);
                const mesh = new THREE.Mesh(geo, wallMaterial);
                mesh.position.set(...w.pos);
                mesh.rotation.set(...w.rot);
                mesh.castShadow = true;
                scene.add(mesh);
            });
        }

        // 创建树
        function createTree(x, y, z) {
            const group = new THREE.Group();

            // 树干
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.5;
            trunk.castShadow = true;
            group.add(trunk);

            // 树冠
            const leavesGeo = new THREE.SphereGeometry(2, 8, 8);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 4;
            leaves.castShadow = true;
            group.add(leaves);

            group.position.set(x, y, z);
            group.userData.type = 'tree';
            return group;
        }

        // 创建石头
        function createRock(x, y, z) {
            const geo = new THREE.DodecahedronGeometry(Math.random() * 1 + 0.5);
            const mat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.1, 0.1, 0.3 + Math.random() * 0.2)
            });
            const rock = new THREE.Mesh(geo, mat);
            rock.position.set(x, y + 0.3, z);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            rock.castShadow = true;
            rock.userData.type = 'rock';
            return rock;

        // 创建玩家剑 - 更宽的剑身，带有光晕效果
        function createSword(weaponIndex, level) {
            const weapon = WEAPONS[weaponIndex];
            const group = new THREE.Group();

            // 剑身 - 更宽的BoxGeometry，大小固定
            const bladeLength = 2.5;
            const bladeWidth = 0.25; // 加宽剑身

            // 剑身主体
            const bladeGeo = new THREE.BoxGeometry(bladeWidth, bladeLength, 0.03);
            const bladeMat = new THREE.MeshStandardMaterial({
                color: weapon.color,

                roughness: 0.1,
                emissive: weapon.color,

            });

            const tipMat = new THREE.MeshStandardMaterial({

                metalness: 0.9,
                emissive: weapon.color,
                emissiveIntensity: 0.5
            });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.position.y = bladeLength + 0.3 + bladeLength * 0.1;
            tip.rotation.x = Math.PI;
            group.add(tip);

            // 剑格（十字护手）- 加宽
            const guardGeo = new THREE.BoxGeometry(0.6, 0.1, 0.1);

            });

            // 剑柄
            const handleGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.5, 8);

            });

                emissive: weapon.color,

            });

        // 创建翅膀 - 简洁优雅的翅膀形状，带光晕
        function createWing(wingIndex) {
            const group = new THREE.Group();

            // 翅膀颜色根据等级变化
            const wingColors = [
                0xffffff, 0x87ceeb, 0xffd700, 0xff69b4, 0x9932cc,
                0xff4500, 0x00ff00, 0x00ffff, 0xff0000, 0xffffff,
                0x4a0080, 0x8b008b, 0x000080, 0x228b22, 0xff6347,
                0x9400d3, 0x00ced1, 0xff1493, 0xffd700, 0xffffff
            ];
            const wingColor = wingColors[wingIndex % wingColors.length];

            // 翅膀大小随等级增加
            const wingSize = 1.5 + wingIndex * 0.05;
            const wingHeight = 1.2 + wingIndex * 0.03;

            // 创建单个翅膀面板（羽翼形状）
            function createWingPanel(side) {
                const panel = new THREE.Group();
                const dir = side === 'left' ? -1 : 1;

                // 翅膀主体 - 优雅的弧形羽翼
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                shape.bezierCurveTo(dir * wingSize * 0.5, wingHeight * 0.3, dir * wingSize * 0.9, wingHeight * 0.5, dir * wingSize, wingHeight * 0.2);
                shape.bezierCurveTo(dir * wingSize * 1.1, wingHeight * 0.0, dir * wingSize * 0.8, -wingHeight * 0.2, dir * wingSize * 0.3, -wingHeight * 0.3);
                shape.bezierCurveTo(dir * 0.1, -wingHeight * 0.15, 0, 0, 0, 0);

                const wingGeo = new THREE.ShapeGeometry(shape);
                const wingMat = new THREE.MeshStandardMaterial({
                    color: wingColor,
                    transparent: true,
                    opacity: 0.75,
                    side: THREE.DoubleSide,
                    emissive: wingColor,
                    emissiveIntensity: 0.2
                });
                const wingMesh = new THREE.Mesh(wingGeo, wingMat);
                panel.add(wingMesh);

                // 翅膀内部纹理线
                for (let i = 1; i <= 3; i++) {
                    const lineMat = new THREE.LineBasicMaterial({ color: wingColor, transparent: true, opacity: 0.4 });
                    const points = [
                        new THREE.Vector3(0, 0, 0.01),
                        new THREE.Vector3(dir * wingSize * (0.2 + i * 0.2), wingHeight * (0.1 + i * 0.1), 0.01)
                    ];
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(lineGeo, lineMat);
                    panel.add(line);
                }

                // 翅膀光晕 - 柔和的发光效果
                const glowGeo = new THREE.PlaneGeometry(wingSize * 1.8, wingHeight * 1.2);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: wingColor,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.DoubleSide
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.z = -0.05;
                panel.add(glow);

                return panel;
            }

            // 左翼
            const leftWing = createWingPanel('left');
            leftWing.position.set(-0.3, 0, 0);
            leftWing.rotation.y = Math.PI / 6;
            leftWing.userData.side = 'left';
            group.add(leftWing);

            // 右翼
            const rightWing = createWingPanel('right');
            rightWing.position.set(0.3, 0, 0);
            rightWing.rotation.y = -Math.PI / 6;
            rightWing.userData.side = 'right';
            group.add(rightWing);

            // 核心发光球体 - 表示翅膀能量中心
            const coreGeo = new THREE.SphereGeometry(0.15 + wingIndex * 0.01, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({ color: wingColor, transparent: true, opacity: 0.9 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            group.add(core);

            // 高级翅膀添加外圈光环
            if (wingIndex >= 5) {
                const haloGeo = new THREE.RingGeometry(0.3, wingSize * 0.6, 32);
                const haloMat = new THREE.MeshBasicMaterial({
                    color: wingColor,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide
                });
                const halo = new THREE.Mesh(haloGeo, haloMat);
                halo.rotation.x = Math.PI / 2;
                halo.position.y = wingHeight * 0.3;
                group.add(halo);
            }

            group.userData.baseY = 2;
            group.userData.wingIndex = wingIndex;
            group.position.y = 2;

            return group;
        }

        // 创建怪物
        function createMonster(type, level) {
            const monsterData = MONSTER_TYPES[type];
            const scale = 1 + level * 0.2;

            const group = new THREE.Group();

            // 随机生成怪物名字
            const prefix = MONSTER_PREFIXES[Math.floor(Math.random() * MONSTER_PREFIXES.length)];
            const typeName = type === 'boss' ? '魔王' : (type === 'daKai' ? '大开' : '野哥');
            const monsterName = prefix + typeName;

            // 身体
            const bodyColor = type === 'boss' ? 0x8b0000 : (type === 'daKai' ? 0x4a0080 : 0x4a4a4a);
            const bodyGeo = new THREE.SphereGeometry(0.6 * scale, 12, 12);
            const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = scale;
            body.castShadow = true;
            group.add(body);

            // 名字标签
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.roundRect(0, 0, 256, 64, 8);
            ctx.fill();
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = type === 'boss' ? '#ff4444' : (type === 'daKai' ? '#ff69b4' : '#ffd700');
            ctx.textAlign = 'center';
            ctx.fillText(monsterName, 128, 40);

            const nameTexture = new THREE.CanvasTexture(canvas);
            const nameMat = new THREE.SpriteMaterial({ map: nameTexture, transparent: true });
            const nameSprite = new THREE.Sprite(nameMat);
            nameSprite.scale.set(2, 0.5, 1);
            nameSprite.position.y = scale + 1.2;
            group.add(nameSprite);

            // 眼睛
            const eyeColor = type === 'boss' ? 0xff0000 : 0xffff00;
            const eyeGeo = new THREE.SphereGeometry(0.15 * scale, 8, 8);
            const eyeMat = new THREE.MeshStandardMaterial({
                color: eyeColor,
                emissive: eyeColor,
                emissiveIntensity: 0.5
            });

            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.25 * scale, scale + 0.2, 0.4 * scale);
            group.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.25 * scale, scale + 0.2, 0.4 * scale);
            group.add(rightEye);

            // 角（对于高级怪物）
            if (type !== 'wild' || level > 1) {
                const hornGeo = new THREE.ConeGeometry(0.1 * scale, 0.3 * scale, 8);
                const hornMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

                const leftHorn = new THREE.Mesh(hornGeo, hornMat);
                leftHorn.position.set(-0.3 * scale, scale + 0.5, 0);
                leftHorn.rotation.z = Math.PI / 6;
                group.add(leftHorn);

                const rightHorn = new THREE.Mesh(hornGeo, hornMat);
                rightHorn.position.set(0.3 * scale, scale + 0.5, 0);
                rightHorn.rotation.z = -Math.PI / 6;
                group.add(rightHorn);
            }

            // 武器（大开和Boss）
            if (type === 'daKai' || type === 'boss') {
                const weaponGeo = new THREE.BoxGeometry(0.1, 1 * scale, 0.05);
                const weaponMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const weapon = new THREE.Mesh(weaponGeo, weaponMat);
                weapon.position.set(0.7 * scale, scale, 0.2);
                weapon.rotation.z = -Math.PI / 4;
                group.add(weapon);
            }

            // 随机位置
            const angle = Math.random() * Math.PI * 2;
            const distance = 30 + Math.random() * 20;
            group.position.x = Math.cos(angle) * distance;
            group.position.z = Math.sin(angle) * distance;

            // 设置怪物数据
            group.userData = {
                type: type,
                level: level,
                name: monsterName,
                hp: monsterData.baseHP * scale,
                maxHp: monsterData.baseHP * scale,
                damage: monsterData.baseDamage * scale,
                exp: monsterData.exp * level,
                gold: monsterData.gold * level,
                speed: CONFIG.MONSTER_SPEED,
                lastAttack: 0
            };

            scene.add(group);
            return group;
        }

        // ==================== 游戏逻辑 ====================

        // 键盘状态
        const keys = {
            forward: false,
            backward: false,
            left: false,
            right: false,
            attack: false,
            dodge: false
        };

        let lastAttackTime = 0;
        let isAttacking = false;
        let attackAngle = 0;
        let mouseX = 0;

        // 键盘事件
        function onKeyDown(e) {
            if (!gameState.playing) return;

            switch(e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    keys.forward = true;
                    break;
                case 's':
                case 'arrowdown':
                    keys.backward = true;
                    break;
                case 'a':
                case 'arrowleft':
                    keys.left = true;
                    break;
                case 'd':
                case 'arrowright':
                    keys.right = true;
                    break;
                case ' ':
                    keys.attack = true;
                    e.preventDefault();
                    break;
                case 'shift':
                    keys.dodge = true;
                    break;
                case 'e':
                    toggleShop();
                    break;
                case 'q':
                    toggleUpgrade();
                    break;
                case 'escape':
                    if (document.getElementById('shopScreen').style.display === 'flex' ||
                        document.getElementById('upgradeScreen').style.display === 'flex') {
                        closeShop();
                        closeUpgrade();
                    }
                    break;
                case '1':
                    useSkill(0);
                    break;
                case '2':
                    useSkill(1);
                    break;
                case '3':
                    useSkill(2);
                    break;
                case '4':
                    useSkill(3);
                    break;
            }
        }

        function onKeyUp(e) {
            switch(e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    keys.forward = false;
                    break;
                case 's':
                case 'arrowdown':
                    keys.backward = false;
                    break;
                case 'a':
                case 'arrowleft':
                    keys.left = false;
                    break;
                case 'd':
                case 'arrowright':
                    keys.right = false;
                    break;
                case ' ':
                    keys.attack = false;
                    break;
                case 'shift':
                    keys.dodge = false;
                    break;
            }
        }

        // 鼠标事件
        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        }

        function onMouseClick(e) {
            if (!gameState.playing) return;
            if (document.getElementById('shopScreen').style.display === 'flex' ||
                document.getElementById('upgradeScreen').style.display === 'flex') return;

            keys.attack = true;
            setTimeout(() => keys.attack = false, 100);
        }

        // 攻击
        function performAttack() {
            const now = Date.now();
            if (now - lastAttackTime < CONFIG.ATTACK_COOLDOWN) return;

            lastAttackTime = now;
            isAttacking = true;

            const weapon = WEAPONS[gameState.player.weaponIndex];
            const damage = weapon.baseDamage + (gameState.player.weaponLevel - 1) * 15;
            const range = CONFIG.ATTACK_RANGE + gameState.player.weaponLevel * 0.5;

            // 检查击中
            monsters.forEach((monster, index) => {
                if (!monster) return;

                const dx = monster.position.x - player.position.x;
                const dz = monster.position.z - player.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                // 计算角度
                const angleToMonster = Math.atan2(dx, dz);
                const playerAngle = player.rotation.y;

                let angleDiff = Math.abs(angleToMonster - playerAngle);
                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

                if (distance < range && angleDiff < Math.PI * 0.85) {
                    // 命中
                    monster.userData.hp -= damage;
                    showDamageNumber(monster.position, damage);

                    // 击退
                    const knockback = 1 + gameState.player.weaponLevel * 0.1;
                    monster.position.x += (dx / distance) * knockback;
                    monster.position.z += (dz / distance) * knockback;

                    // 受伤变色
                    monster.children[0].material.emissive = new THREE.Color(0xff0000);
                    setTimeout(() => {
                        if (monster.children[0]) {
                            monster.children[0].material.emissive = new THREE.Color(0x000000);
                        }
                    }, 100);

                    if (monster.userData.hp <= 0) {
                        // 击杀
                        killMonster(monster, index);
                    }
                }
            });

            // 攻击动画
            if (playerSword) {
                const originalRot = playerSword.rotation.x;
                playerSword.rotation.x = -Math.PI / 3;

                setTimeout(() => {
                    playerSword.rotation.x = originalRot;
                    isAttacking = false;
                }, 150);
            }

            // 攻击特效
            createAttackEffect();
        }

        // 使用技能
        function useSkill(skillIndex) {
            if (!gameState.playing || gameState.paused) return;
            if (skillCooldowns[skillIndex] > Date.now()) return;

            const skill = SKILLS[skillIndex];
            const skillSlot = document.getElementById(`skill${skillIndex + 1}`);
            const weapon = WEAPONS[gameState.player.weaponIndex];

            // 设置冷却
            skillCooldowns[skillIndex] = Date.now() + skill.cooldown;
            skillSlot.classList.remove('ready');
            skillSlot.classList.add('on-cooldown');

            // 更新冷却显示
            updateSkillCooldown(skillIndex);

            const damage = (weapon.baseDamage + (gameState.player.weaponLevel - 1) * 5) * skill.damage;

            switch(skillIndex) {
                case 0: // 剑气纵横 - 向前发射剑气
                    createSlashWave(damage, skill);
                    showMessage(`${skill.icon} ${skill.name}!`);
                    break;
                case 1: // 雷霆一击 - 雷电攻击最近敌人
                    createThunderStrike(damage, skill);
                    showMessage(`${skill.icon} ${skill.name}!`);
                    break;
                case 2: // 烈焰斩 - 火焰爆发
                    createFlameBurst(damage, skill);
                    showMessage(`${skill.icon} ${skill.name}!`);
                    break;
                case 3: // 旋风斩 - 360度攻击
                    createWhirlwind(damage, skill);
                    showMessage(`${skill.icon} ${skill.name}!`);
                    break;
            }

            // 屏幕震动
            createScreenShake();
        }

        // 更新技能冷却显示
        function updateSkillCooldown(skillIndex) {
            const skill = SKILLS[skillIndex];
            const cdDiv = document.getElementById(`skill${skillIndex + 1}Cd`);
            const skillSlot = document.getElementById(`skill${skillIndex + 1}`);

            const update = () => {
                const remaining = skillCooldowns[skillIndex] - Date.now();
                if (remaining <= 0) {
                    cdDiv.textContent = '';
                    skillSlot.classList.remove('on-cooldown');
                    skillSlot.classList.add('ready');
                } else {
                    cdDiv.textContent = Math.ceil(remaining / 1000) + 's';
                    requestAnimationFrame(update);
                }
            };
            update();
        }

        // 技能1: 剑气纵横
        function createSlashWave(damage, skill) {
            const range = CONFIG.ATTACK_RANGE * 2.5;

            // 创建多道指向性剑气 - 带光晕
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    // 剑气主体
                    const slashGeo = new THREE.PlaneGeometry(range * 0.8, 2);
                    const slashMat = new THREE.MeshBasicMaterial({
                        color: skill.color,
                        transparent: true,
                        opacity: 0.8,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });
                    const slash = new THREE.Mesh(slashGeo, slashMat);
                    slash.position.copy(player.position);
                    slash.position.y = 1.5;
                    slash.position.x += Math.sin(player.rotation.y) * (i * 1.5);
                    slash.position.z += Math.cos(player.rotation.y) * (i * 1.5);
                    slash.rotation.y = player.rotation.y;
                    slash.rotation.x = -Math.PI / 8;
                    slash.userData = { life: 1, type: 'slash', rotSpeed: 0 };
                    scene.add(slash);
                    particles.push(slash);

                    // 剑气光晕
                    const glowGeo = new THREE.PlaneGeometry(range * 0.8, 3);
                    const glowMat = new THREE.MeshBasicMaterial({
                        color: skill.color,
                        transparent: true,
                        opacity: 0.2,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });
                    const glow = new THREE.Mesh(glowGeo, glowMat);
                    glow.position.copy(slash.position);
                    glow.rotation.copy(slash.rotation);
                    glow.userData = { life: 1, type: 'slash', rotSpeed: 0 };
                    scene.add(glow);
                    particles.push(glow);

                    // 检测剑气路径上的怪物
                    monsters.forEach((monster, index) => {
                        if (!monster) return;
                        const dx = monster.position.x - slash.position.x;
                        const dz = monster.position.z - slash.position.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < range && monster.userData) {
                            monster.userData.hp -= damage * 0.5;
                            showDamageNumber(monster.position, damage * 0.5);
                            if (monster.userData.hp <= 0) {
                                killMonster(monster, index);
                            }
                        }
                    });
                }, i * 80);
            }
        }

        // 技能2: 雷霆一击
        function createThunderStrike(damage, skill) {
            // 找到最近的怪物
            let nearestMonster = null;
            let nearestDist = Infinity;

            monsters.forEach(monster => {
                if (!monster) return;
                const dx = monster.position.x - player.position.x;
                const dz = monster.position.z - player.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearestMonster = monster;
                }
            });

            if (nearestMonster) {
                // 雷电光柱
                const boltGeo = new THREE.CylinderGeometry(0.3, 0.5, nearestDist + 5, 8);
                const boltMat = new THREE.MeshBasicMaterial({
                    color: skill.color,
                    transparent: true,
                    opacity: 0.9
                });
                const bolt = new THREE.Mesh(boltGeo, boltMat);
                bolt.position.set(
                    (player.position.x + nearestMonster.position.x) / 2,
                    8,
                    (player.position.z + nearestMonster.position.z) / 2
                );
                bolt.rotation.x = Math.PI / 2;
                const angle = Math.atan2(
                    nearestMonster.position.x - player.position.x,
                    nearestMonster.position.z - player.position.z
                );
                bolt.rotation.z = angle;
                bolt.userData = { life: 1, type: 'bolt' };
                scene.add(bolt);
                particles.push(bolt);

                // 雷电光晕
                const glowGeo = new THREE.CylinderGeometry(0.6, 1.0, nearestDist + 5, 8);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.3
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(bolt.position);
                glow.rotation.copy(bolt.rotation);
                glow.userData = { life: 1, type: 'bolt' };
                scene.add(glow);
                particles.push(glow);

                // 伤害
                nearestMonster.userData.hp -= damage;
                showDamageNumber(nearestMonster.position, damage);

                if (nearestMonster.userData.hp <= 0) {
                    const idx = monsters.indexOf(nearestMonster);
                    if (idx > -1) killMonster(nearestMonster, idx);
                }
            } else {
                // 没找到目标，向前发射雷电
                createSlashWave(damage, skill);
            }
        }

        // 技能3: 烈焰斩
        function createFlameBurst(damage, skill) {
            const range = CONFIG.ATTACK_RANGE * 1.8;

            // 火焰光环 - 带光晕
            const flameGeo = new THREE.TorusGeometry(range, 0.8, 16, 32);
            const flameMat = new THREE.MeshBasicMaterial({
                color: skill.color,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });
            const flame = new THREE.Mesh(flameGeo, flameMat);
            flame.position.copy(player.position);
            flame.position.y = 1.5;
            flame.rotation.x = Math.PI / 2;
            flame.rotation.z = player.rotation.y;
            flame.userData = { life: 1, type: 'flame' };
            scene.add(flame);
            particles.push(flame);

            // 火焰光晕
            const glowGeo = new THREE.TorusGeometry(range, 1.5, 16, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: skill.color,
                transparent: true,
                opacity: 0.25,
                side: THREE.DoubleSide
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.copy(flame.position);
            glow.rotation.copy(flame.rotation);
            glow.userData = { life: 1, type: 'flame' };
            scene.add(glow);
            particles.push(glow);

            // 范围伤害
            monsters.forEach((monster, index) => {
                if (!monster) return;
                const dx = monster.position.x - player.position.x;
                const dz = monster.position.z - player.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < range && monster.userData) {
                    monster.userData.hp -= damage;
                    showDamageNumber(monster.position, damage);
                    if (monster.userData.hp <= 0) {
                        killMonster(monster, index);
                    }
                }
            });
        }

        // 技能4: 旋风斩
        function createWhirlwind(damage, skill) {
            const range = CONFIG.ATTACK_RANGE * 2;

            // 多个旋转刀刃 - 带光晕
            for (let i = 0; i < 5; i++) {
                const bladeGeo = new THREE.PlaneGeometry(2, 0.6);
                const bladeMat = new THREE.MeshBasicMaterial({
                    color: skill.color,
                    transparent: true,
                    opacity: 0.8,
                    side: THREE.DoubleSide
                });
                const blade = new THREE.Mesh(bladeGeo, bladeMat);
                blade.position.copy(player.position);
                blade.position.y = 1.5;
                blade.userData = {
                    life: 1,
                    type: 'whirlwind',
                    angle: (i / 5) * Math.PI * 2,
                    radius: 1
                };
                scene.add(blade);
                particles.push(blade);

                // 刀刃光晕
                const glowGeo = new THREE.PlaneGeometry(3, 1);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: skill.color,
                    transparent: true,
                    opacity: 0.25,
                    side: THREE.DoubleSide
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(blade.position);
                glow.userData = {
                    life: 1,
                    type: 'whirlwind',
                    angle: (i / 5) * Math.PI * 2,
                    radius: 1
                };
                scene.add(glow);
                particles.push(glow);
            }

            // 范围伤害（多次判定）
            for (let r = 1; r <= 3; r++) {
                setTimeout(() => {
                    monsters.forEach((monster, index) => {
                        if (!monster) return;
                        const dx = monster.position.x - player.position.x;
                        const dz = monster.position.z - player.position.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < range * (r / 3) && monster.userData) {
                            monster.userData.hp -= damage * 0.3;
                            showDamageNumber(monster.position, damage * 0.3);
                            if (monster.userData.hp <= 0) {
                                killMonster(monster, index);
                            }
                        }
                    });
                }, r * 100);
            }
        }

        // 屏幕震动
        function createScreenShake() {
            const originalCamPos = camera.position.clone();
            let shakeCount = 0;
            const shakeInterval = setInterval(() => {
                camera.position.x = originalCamPos.x + (Math.random() - 0.5) * 0.5;
                camera.position.y = originalCamPos.y + (Math.random() - 0.5) * 0.3;
                shakeCount++;
                if (shakeCount > 8) {
                    clearInterval(shakeInterval);
                    camera.position.copy(originalCamPos);
                }
            }, 30);
        }

        // 攻击特效

        // 创建华丽的武林外传风格攻击特效
        function createAttackEffect() {
            const weapon = WEAPONS[gameState.player.weaponIndex];
            const level = gameState.player.weaponLevel;
            const effectRange = CONFIG.ATTACK_RANGE + level * 0.5;

            // 1. 指向性剑气光刃 - 向前发射的光剑形状
            const slashGeo = new THREE.PlaneGeometry(effectRange * 1.2, 1.2);
            const slashMat = new THREE.MeshBasicMaterial({
                color: weapon.color,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const slash = new THREE.Mesh(slashGeo, slashMat);
            slash.position.copy(player.position);
            slash.position.y = 1.5;
            slash.position.x += Math.sin(player.rotation.y) * effectRange * 0.5;
            slash.position.z += Math.cos(player.rotation.y) * effectRange * 0.5;
            slash.rotation.y = player.rotation.y;
            slash.rotation.x = -Math.PI / 8;
            slash.userData = { life: 1, type: 'slash', rotSpeed: 0.1 };
            scene.add(slash);
            particles.push(slash);

            // 2. 剑身光晕 - 跟随剑的延长线
            const glowGeo = new THREE.PlaneGeometry(1.0, effectRange * 0.8);
            const glowMat = new THREE.MeshBasicMaterial({
                color: weapon.color,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.copy(player.position);
            glow.position.y = 1.5;
            glow.position.x += Math.sin(player.rotation.y) * effectRange * 0.4;
            glow.position.z += Math.cos(player.rotation.y) * effectRange * 0.4;
            glow.rotation.y = player.rotation.y;
            glow.userData = { life: 1, type: 'slash', rotSpeed: 0 };
            scene.add(glow);
            particles.push(glow);

            // 3. 剑尖光球 - 向前飞行的能量球
            const coreGeo = new THREE.SphereGeometry(0.5 + level * 0.1, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.95
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            core.position.copy(player.position);
            core.position.y = 1.5;
            core.position.x += Math.sin(player.rotation.y) * 1.5;
            core.position.z += Math.cos(player.rotation.y) * 1.5;
            core.userData = { life: 1, type: 'core', direction: player.rotation.y };
            scene.add(core);
            particles.push(core);

            // 4. 光环环绕 - 攻击时的能量光环
            const haloGeo = new THREE.TorusGeometry(1.5, 0.1, 8, 32);
            const haloMat = new THREE.MeshBasicMaterial({
                color: weapon.color,
                transparent: true,
                opacity: 0.5
            });
            const halo = new THREE.Mesh(haloGeo, haloMat);
            halo.position.copy(player.position);
            halo.position.y = 1.5;
            halo.rotation.x = Math.PI / 2;
            halo.rotation.z = player.rotation.y;
            halo.userData = { life: 1, type: 'halo', rotSpeed: 0.15 };
            scene.add(halo);
            particles.push(halo);

            // 5. 边缘光晕
            const edgeGlowGeo = new THREE.RingGeometry(1.4, 2.0, 32);
            const edgeGlowMat = new THREE.MeshBasicMaterial({
                color: weapon.color,
                transparent: true,
                opacity: 0.2,
                side: THREE.DoubleSide
            });
            const edgeGlow = new THREE.Mesh(edgeGlowGeo, edgeGlowMat);
            edgeGlow.position.copy(player.position);
            edgeGlow.position.y = 1.5;
            edgeGlow.rotation.x = -Math.PI / 2;
            edgeGlow.rotation.z = player.rotation.y;
            edgeGlow.userData = { life: 1, type: 'halo', rotSpeed: -0.08 };
            scene.add(edgeGlow);
            particles.push(edgeGlow);
        }

        // 击杀怪物
        function killMonster(monster, index) {
            // 获得经验和金币
            const exp = monster.userData.exp;
            const gold = monster.userData.gold;

            gameState.player.exp += exp;
            gameState.player.gold += gold;
            gameState.killCount++;

            showGoldNumber(monster.position, gold);

            // 检查升级
            while (gameState.player.exp >= gameState.player.expToLevel) {
                gameState.player.exp -= gameState.player.expToLevel;
                gameState.player.level++;
                gameState.player.expToLevel = Math.floor(gameState.player.expToLevel * 1.5);
                gameState.player.maxHp += 100;
                gameState.player.hp = gameState.player.maxHp;
                showLevelUp();
            }

            // 死亡特效
            createDeathEffect(monster.position);

            // 移除怪物
            scene.remove(monster);
            monsters.splice(index, 1);

            updateHUD();
        }

        // 创建死亡特效
        function createDeathEffect(position) {
            for (let i = 0; i < 10; i++) {
                const geo = new THREE.SphereGeometry(0.1);
                const mat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 1, 0.5),
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(position);
                particle.position.y += 1;
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    Math.random() * 0.3,
                    (Math.random() - 0.5) * 0.3
                );
                particle.userData.life = 1;
                scene.add(particle);
                particles.push(particle);
            }
        }

        // 生成怪物
        function spawnMonster() {
            if (monsters.length >= CONFIG.MAX_MONSTERS) return;

            const rand = Math.random();
            let type, level;

            if (rand < 0.6) {
                type = 'wild';
                level = Math.min(3, Math.floor(gameState.wave / 3) + 1);
            } else if (rand < 0.9) {
                type = 'daKai';
                level = Math.min(3, Math.floor(gameState.wave / 5) + 1);
            } else {
                type = 'boss';
                level = Math.min(3, Math.floor(gameState.wave / 10) + 1);
            }

            const monster = createMonster(type, level);
            monsters.push(monster);
        }

        // 更新HUD
        function updateHUD() {
            document.getElementById('levelDisplay').textContent = gameState.player.level;
            document.getElementById('currentExp').textContent = gameState.player.exp;
            document.getElementById('maxExp').textContent = gameState.player.expToLevel;
            document.getElementById('expFill').style.width = (gameState.player.exp / gameState.player.expToLevel * 100) + '%';

            document.getElementById('weaponName').textContent = WEAPONS[gameState.player.weaponIndex].name;
            document.getElementById('weaponLevel').textContent = `Lv.${gameState.player.weaponLevel}/10`;
            document.getElementById('weaponIcon').textContent = WEAPONS[gameState.player.weaponIndex].icon;

            const weapon = WEAPONS[gameState.player.weaponIndex];
            const damage = weapon.baseDamage + (gameState.player.weaponLevel - 1) * 15;
            document.getElementById('weaponDamage').textContent = damage;
            document.getElementById('weaponFullName').textContent = `${weapon.name} Lv.${gameState.player.weaponLevel}`;

            document.getElementById('hpDisplay').textContent = `${Math.floor(gameState.player.hp)}/${gameState.player.maxHp}`;
            document.getElementById('goldAmount').textContent = gameState.player.gold;

        // 显示伤害数字
        function showDamageNumber(position, damage) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            div.textContent = `-${damage}`;

            const vector = position.clone();
            vector.project(camera);

            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

            div.style.left = x + 'px';
            div.style.top = y + 'px';

            document.getElementById('gameContainer').appendChild(div);

            setTimeout(() => div.remove(), 1000);
        }

        // 显示金币数字
        function showGoldNumber(position, gold) {
            const div = document.createElement('div');
            div.className = 'damage-number gold-number';
            div.textContent = `+${gold}💰`;

            const vector = position.clone();
            vector.project(camera);

            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

            div.style.left = x + 'px';
            div.style.top = (y - 30) + 'px';

            document.getElementById('gameContainer').appendChild(div);

            setTimeout(() => div.remove(), 1000);
        }

        // 显示升级
        function showLevelUp() {
            const msg = document.getElementById('message');
            msg.textContent = `🎉 升级! Lv.${gameState.player.level}`;
            msg.className = 'level-up';
            msg.style.display = 'block';

            setTimeout(() => msg.style.display = 'none', 2000);
        }

        // ==================== 口令系统 ====================

        // 显示口令输入界面
        function showCheatInput() {
            const cheatScreen = document.getElementById('cheatScreen');
            cheatScreen.style.display = 'flex';
            gameState.paused = true;
            document.getElementById('cheatInput').value = '';
            document.getElementById('cheatInput').focus();
            document.getElementById('cheatMessage').textContent = '';
        }

        // 关闭口令输入界面
        function closeCheatInput() {
            document.getElementById('cheatScreen').style.display = 'none';
            gameState.paused = false;
        }

        // 提交口令
        function submitCheat() {
            const input = document.getElementById('cheatInput').value.trim();
            const messageEl = document.getElementById('cheatMessage');

            if (!input) {
                messageEl.textContent = '请输入口令！';
                messageEl.style.color = '#ff6666';
                return;
            }

            if (input === '老七变身') {
                // 口令1：武器强化2级
                if (gameState.player.weaponLevel >= 10) {
                    messageEl.textContent = '武器已满级！';
                    messageEl.style.color = '#ffd700';
                    return;
                }

                const newLevel = Math.min(10, gameState.player.weaponLevel + 2);
                gameState.player.weaponLevel = newLevel;

                // 更新武器外观
                if (playerSword) {
                    player.remove(playerSword);
                }
                playerSword = createSword(gameState.player.weaponIndex, newLevel);
                playerSword.position.set(0, 1.8, 1.8);
                playerSword.rotation.set(Math.PI / 6, 0, 0);
                player.add(playerSword);

                updateHUD();
                messageEl.textContent = `✨ 变身成功！武器升到 ${newLevel} 级！`;
                messageEl.style.color = '#00ff00';

                // 变身特效
                createTransformEffect();

            } else if (input === '老七牛逼') {
                // 口令2：终极变身
                // 武器满级
                gameState.player.weaponLevel = 10;
                gameState.player.weaponIndex = 19; // 创世神剑

                // 金币充足
                gameState.player.gold += 100000;

                // 翅膀满级并装备
                if (!gameState.ownedWings.includes(19)) {
                    gameState.ownedWings.push(19);
                }
                gameState.equippedWing = 19;

                // 更新武器
                if (playerSword) {
                    player.remove(playerSword);
                }
                playerSword = createSword(19, 10);

        // 普通变身特效
        function createTransformEffect() {
            const weapon = WEAPONS[gameState.player.weaponIndex];

            // 光芒爆发
            for (let i = 0; i < 20; i++) {
                const geo = new THREE.SphereGeometry(0.15);

                    color: weapon.color,

                    )

        // 终极变身特效
        function createUltimateTransformEffect() {
            // 大量彩色粒子
            const colors = [0xffd700, 0xff6600, 0xff0066, 0x00ffff, 0xff00ff, 0x00ff00, 0xffffff];

            for (let i = 0; i < 100; i++) {
                const geo = new THREE.SphereGeometry(0.2);
                const mat = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    transparent: true,
                    opacity: 1
                });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(player.position);
                particle.position.y = 2;
                particle.userData = {
                    life: 1.5,
                    type: 'ultimateSpark',
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 1,
                        Math.random() * 0.8,
                        (Math.random() - 0.5) * 1
                    )
                };
                scene.add(particle);
                particles.push(particle);
            }

            // 冲击波
            const waveGeo = new THREE.RingGeometry(1, 5, 32);
            const waveMat = new THREE.MeshBasicMaterial({

                transparent: true,

                side: THREE.DoubleSide
