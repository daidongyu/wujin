<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>无尽枪神 - 3D闯关游戏</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }
        
        /* UI 面板 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: white;
            z-index: 100;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #score-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.5);
        }
        
        #health-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,0,0,0.5);
        }
        
        #weapon-panel {
            position: absolute;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,255,255,0.5);
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 200;
            flex-wrap: wrap;
            pointer-events: auto;
        }
        
        button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button.attack {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245,87,108,0.7); }
            50% { box-shadow: 0 0 0 10px rgba(245,87,108,0); }
        }
        
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 300;
            display: none;
            backdrop-filter: blur(10px);
            border: 2px solid #ff0000;
            pointer-events: auto;
        }
        
        #game-over h1 {
            color: #ff0000;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        #restart-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
            font-size: 24px;
            padding: 15px 40px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            width: 100%;
            transition: width 0.3s ease;
        }
        
        .combo {
            position: absolute;
            bottom: 150px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255,170,0,0.5);
            animation: glow 0.5s ease;
        }
        
        @keyframes glow {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        @media (max-width: 768px) {
            button { padding: 8px 16px; font-size: 14px; }
            .stat-value { font-size: 18px; }
            #controls { gap: 8px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-panel">
            <div>🏆 得分: <span id="score" class="stat-value">0</span></div>
            <div>🗡️ 击杀: <span id="kills" class="stat-value">0</span></div>
        </div>
        <div id="health-panel">
            <div>❤️ 生命值</div>
            <div class="health-bar">
                <div class="health-fill" id="health-fill"></div>
            </div>
            <div><span id="health" class="stat-value">100</span>%</div>
        </div>
        <div id="weapon-panel">
            <div>🔫 武器等级: <span id="weapon-level" class="stat-value">1</span></div>
            <div>⚡ 攻击力: <span id="damage" class="stat-value">20</span></div>
            <div>✨ 特效: <span id="effect-level" class="stat-value">初级</span></div>
        </div>
    </div>
    
    <div id="controls">
        <button id="forward-btn">⬆️ 前进</button>
        <button id="backward-btn">⬇️ 后退</button>
        <button id="jump-btn">🦘 跳跃</button>
        <button id="attack-btn" class="attack">⚔️ 攻击</button>
    </div>
    
    <div id="game-over">
        <h1>💀 游戏结束 💀</h1>
        <p style="font-size: 24px;">最终得分: <span id="final-score">0</span></p>
        <p style="font-size: 18px;">击杀数: <span id="final-kills">0</span></p>
        <button id="restart-btn">🔄 重新开始</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ========== 游戏状态 ==========
        let score = 0;
        let kills = 0;
        let health = 100;
        let weaponLevel = 1;
        let attackDamage = 20;
        let isGameOver = false;
        let combo = 0;
        let lastKillTime = 0;
        
        // 游戏对象
        let scene, camera, renderer;
        let player, weapon;
        let monsters = [];
        let particles = [];
        let ground;
        let keys = { forward: false, backward: false, jumping: false };
        let velocityY = 0;
        let isGrounded = true;
        let playerSpeed = 5;
        let jumpPower = 8;
        let gravity = 20;
        let attackCooldown = 0;
        let cameraOffset = new THREE.Vector3(0, 3, 8);
        let gameTime = 0;
        
        // 特效
        let lightningEffect = null;
        let fireEffect = null;
        
        // ========== 初始化 Three.js ==========
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2a);
            scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // 灯光系统
            setupLights();
            
            // 创建场景元素
            createGround();
            createPlayer();
            createEnvironment();
            
            // 事件监听
            setupControls();
            
            // 开始游戏循环
            animate();
            
            // 生成怪物
            setInterval(() => {
                if (!isGameOver) spawnMonster();
            }, 1500);
            
            // 生成特效粒子
            setInterval(() => {
                if (!isGameOver) createAmbientParticles();
            }, 500);
        }
        
        function setupLights() {
            // 环境光
            const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambientLight);
            
            // 主光源
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);
            
            // 背光
            const backLight = new THREE.PointLight(0x4466ff, 0.5);
            backLight.position.set(0, 5, -5);
            scene.add(backLight);
            
            // 动态彩色光源
            const colorLight = new THREE.PointLight(0xff44aa, 0.3);
            colorLight.position.set(2, 3, 2);
            scene.add(colorLight);
            
            // 地面辅助光
            const fillLight = new THREE.PointLight(0xffaa66, 0.4);
            fillLight.position.set(0, 2, 3);
            scene.add(fillLight);
        }
        
        function createGround() {
            // 网格地面
            const gridHelper = new THREE.GridHelper(200, 50, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);
            
            // 透明地面用于碰撞
            ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0x2266aa, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // 装饰性道路
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: 0x004466 });
            for (let i = -50; i <= 50; i += 2) {
                const roadStrip = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 1), roadMat);
                roadStrip.position.set(i % 2 === 0 ? 1 : -1, -0.45, i);
                roadStrip.castShadow = true;
                scene.add(roadStrip);
            }
        }
        
        function createPlayer() {
            player = new THREE.Group();
            
            // 身体
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a86ff, metalness: 0.7, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.position.y = 0.6;
            player.add(body);
            
            // 头部
            const headGeo = new THREE.SphereGeometry(0.45, 32, 32);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(headGeo, headMat);
            head.castShadow = true;
            head.position.y = 1.2;
            player.add(head);
            
            // 头盔
            const helmetGeo = new THREE.ConeGeometry(0.5, 0.4, 8);
            const helmetMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.9 });
            const helmet = new THREE.Mesh(helmetGeo, helmetMat);
            helmet.position.y = 1.55;
            player.add(helmet);
            
            // 创建长枪
            const weaponGroup = new THREE.Group();
            
            // 枪杆
            const poleGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.8, 8);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.5 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.castShadow = true;
            weaponGroup.add(pole);
            
            // 枪头
            const tipGeo = new THREE.ConeGeometry(0.12, 0.4, 8);
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xccaa88, metalness: 0.9, emissive: 0x442200 });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.position.y = 0.95;
            weaponGroup.add(tip);
            
            // 装饰红缨
            const tasselGeo = new THREE.ConeGeometry(0.15, 0.2, 6);
            const tasselMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
            const tassel = new THREE.Mesh(tasselGeo, tasselMat);
            tassel.position.y = 0.85;
            weaponGroup.add(tassel);
            
            weaponGroup.position.set(0.8, 0.9, 0.5);
            weaponGroup.rotation.z = -0.3;
            weaponGroup.rotation.x = 0.2;
            player.add(weaponGroup);
            weapon = weaponGroup;
            
            player.position.y = 0;
            player.castShadow = true;
            scene.add(player);
        }
        
        function createEnvironment() {
            // 树木
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x5a8f4c });
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
            
            for (let i = -30; i <= 30; i += 8) {
                for (let j = -30; j <= 30; j += 8) {
                    if (Math.random() > 0.7 && Math.abs(i) > 3 && Math.abs(j) > 3) {
                        const tree = new THREE.Group();
                        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.5, 6), trunkMat);
                        trunk.position.y = 0.75;
                        tree.add(trunk);
                        const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2, 8), treeMat);
                        foliage.position.y = 1.5;
                        tree.add(foliage);
                        tree.position.set(i, -0.5, j);
                        scene.add(tree);
                    }
                }
            }
            
            // 漂浮粒子
            const particleCount = 500;
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 100;
                particlePositions[i*3+1] = Math.random() * 10;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 80;
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.1 });
            const particlesSys = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particlesSys);
        }
        
        function spawnMonster() {
            if (isGameOver) return;
            
            const monster = new THREE.Group();
            
            // 身体
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.7, 1, 6);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xaa44aa, emissive: 0x331133 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            monster.add(body);
            
            // 头部
            const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xcc66cc });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.8;
            monster.add(head);
            
            // 眼睛
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 1.0, 0.5);
            monster.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
            rightEye.position.set(0.2, 1.0, 0.5);
            monster.add(rightEye);
            
            // 角
            const hornMat = new THREE.MeshStandardMaterial({ color: 0x884444 });
            const leftHorn = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 6), hornMat);
            leftHorn.position.set(-0.25, 1.2, 0.3);
            monster.add(leftHorn);
            const rightHorn = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 6), hornMat);
            rightHorn.position.set(0.25, 1.2, 0.3);
            monster.add(rightHorn);
            
            // 随机位置（在玩家前方）
            const angle = (Math.random() - 0.5) * Math.PI * 1.5;
            const distance = 8 + Math.random() * 5;
            const x = player.position.x + Math.sin(angle) * distance;
            const z = player.position.z - distance * 0.8;
            
            monster.position.set(x, 0, z);
            monster.userData = {
                health: 30 + weaponLevel * 5,
                maxHealth: 30 + weaponLevel * 5,
                speed: 2 + Math.random() * 2,
                attackCooldown: 0
            };
            
            scene.add(monster);
            monsters.push(monster);
        }
        
        function attack() {
            if (isGameOver) return;
            if (attackCooldown > 0) return;
            
            attackCooldown = 0.5;
            
            // 攻击动画
            weapon.rotation.x = -0.8;
            weapon.rotation.z = -0.6;
            setTimeout(() => {
                if (weapon) {
                    weapon.rotation.x = 0.2;
                    weapon.rotation.z = -0.3;
                }
            }, 150);
            
            // 攻击特效
            createAttackEffect();
            
            // 检测碰撞
            const attackRange = 2.5;
            let hitCount = 0;
            
            monsters.forEach((monster, index) => {
                const distance = player.position.distanceTo(monster.position);
                if (distance < attackRange) {
                    monster.userData.health -= attackDamage;
                    hitCount++;
                    
                    // 伤害数字特效
                    createDamageNumber(monster.position, attackDamage);
                    
                    if (monster.userData.health <= 0) {
                        // 击杀怪物
                        killMonster(index);
                    } else {
                        // 受击特效
                        createHitEffect(monster.position);
                    }
                }
            });
            
            if (hitCount > 0) {
                combo++;
                if (combo > 5) {
                    createComboEffect();
                }
            }
        }
        
        function killMonster(index) {
            const monster = monsters[index];
            if (!monster) return;
            
            // 死亡特效
            createDeathEffect(monster.position);
            
            scene.remove(monster);
            monsters.splice(index, 1);
            
            // 增加分数
            const points = 100 * weaponLevel;
            score += points;
            kills++;
            
            // 连击加成
            if (combo > 3) {
                const bonus = Math.floor(points * (combo / 10));
                score += bonus;
                showFloatingText(`连击 x${combo}! +${bonus}`, monster.position);
            }
            
            updateUI();
            
            // 武器升级系统
            if (kills % 5 === 0 && kills > 0) {
                upgradeWeapon();
            }
            
            lastKillTime = Date.now();
            setTimeout(() => {
                if (Date.now() - lastKillTime > 3000) {
                    combo = 0;
                }
            }, 3000);
        }
        
        function upgradeWeapon() {
            weaponLevel++;
            attackDamage = 20 + weaponLevel * 8;
            
            // 武器外观升级
            if (weapon) {
                weapon.children.forEach(child => {
                    if (child.geometry.type === 'ConeGeometry') {
                        child.material.color.setHex(0xffaa66);
                        child.material.emissiveIntensity = 0.5;
                    }
                });
            }
            
            // 升级特效
            createUpgradeEffect();
            
            updateUI();
        }
        
        function createAttackEffect() {
            // 冲击波特效
            const ringGeo = new THREE.RingGeometry(0.5, 1.5, 16);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(player.position);
            ring.position.y = 1;
            scene.add(ring);
            
            let scale = 1;
            const animateRing = () => {
                scale += 0.1;
                ring.scale.set(scale, scale, 1);
                ringMat.opacity -= 0.05;
                if (ringMat.opacity <= 0) {
                    scene.remove(ring);
                    return;
                }
                requestAnimationFrame(animateRing);
            };
            animateRing();
            
            // 粒子特效
            for (let i = 0; i < 20; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05, 4, 4),
                    new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400 })
                );
                particle.position.copy(player.position);
                particle.position.y += 1;
                particle.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 5,
                        Math.random() * 3,
                        (Math.random() - 0.5) * 5
                    ),
                    life: 1
                };
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function createDeathEffect(position) {
            // 爆炸特效
            for (let i = 0; i < 30; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 4, 4),
                    new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff0000 })
                );
                particle.position.copy(position);
                particle.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 8,
                        Math.random() * 6,
                        (Math.random() - 0.5) * 8
                    ),
                    life: 1
                };
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function createHitEffect(position) {
            const particle = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400 })
            );
            particle.position.copy(position);
            particle.userData = {
                velocity: new THREE.Vector3(0, 2, 0),
                life: 0.5
            };
            scene.add(particle);
            particles.push(particle);
        }
        
        function createUpgradeEffect() {
            for (let i = 0; i < 50; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff })
                );
                particle.position.copy(player.position);
                particle.position.y += 1.5;
                particle.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 4,
                        Math.random() * 5,
                        (Math.random() - 0.5) * 4
                    ),
                    life: 1
                };
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function createComboEffect() {
            showFloatingText(`🔥 ${combo}连击! 🔥`, player.position);
        }
        
        function createDamageNumber(position, damage) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff6600';
            ctx.font = 'Bold 24px Arial';
            ctx.fillText(damage.toString(), 10, 40);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.position.copy(position);
            sprite.position.y += 1;
            sprite.scale.set(0.5, 0.5, 0.5);
            scene.add(sprite);
            
            let life = 0;
            const animate = () => {
                life += 0.05;
                sprite.position.y += 0.05;
                sprite.material.opacity = 1 - life;
                if (life >= 1) {
                    scene.remove(sprite);
                    return;
                }
                requestAnimationFrame(animate);
            };
            animate();
        }
        
        function showFloatingText(text, position) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffaa00';
            ctx.font = 'Bold 20px Arial';
            ctx.fillText(text, 10, 40);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.position.copy(position);
            sprite.position.y += 2;
            sprite.scale.set(1.5, 0.5, 1);
            scene.add(sprite);
            
            let life = 0;
            const animate = () => {
                life += 0.02;
                sprite.position.y += 0.03;
                sprite.material.opacity = 1 - life;
                if (life >= 1) {
                    scene.remove(sprite);
                    return;
                }
                requestAnimationFrame(animate);
            };
            animate();
        }
        
        function createAmbientParticles() {
            if (isGameOver) return;
            const particle = new THREE.Mesh(
                new THREE.SphereGeometry(0.05, 4, 4),
                new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x4488ff })
            );
            particle.position.set(
                player.position.x + (Math.random() - 0.5) * 5,
                player.position.y + Math.random() * 3,
                player.position.z + (Math.random() - 0.5) * 5
            );
            particle.userData = {
                velocity: new THREE.Vector3(0, 0.5, 0),
                life: 1
            };
            scene.add(particle);
            particles.push(particle);
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('kills').textContent = kills;
            document.getElementById('health').textContent = health;
            document.getElementById('weapon-level').textContent = weaponLevel;
            document.getElementById('damage').textContent = attackDamage;
            document.getElementById('health-fill').style.width = health + '%';
            
            const effectNames = ['初级', '中级', '高级', '传说', '神话'];
            const effectLevel = Math.min(weaponLevel - 1, effectNames.length - 1);
            document.getElementById('effect-level').textContent = effectNames[effectLevel];
        }
        
        function setupControls() {
            // 键盘控制
            window.addEventListener('keydown', (e) => {
                if (isGameOver) return;
                switch(e.key) {
                    case 'ArrowUp': case 'w': keys.forward = true; break;
                    case 'ArrowDown': case 's': keys.backward = true; break;
                    case ' ': case 'Space': 
                        e.preventDefault();
                        if (isGrounded && !keys.jumping) {
                            velocityY = jumpPower;
                            isGrounded = false;
                            keys.jumping = true;
                        }
                        break;
                    case 'j': case 'J': attack(); break;
                }
            });
            
            window.addEventListener('keyup', (e) => {
                switch(e.key) {
                    case 'ArrowUp': case 'w': keys.forward = false; break;
                    case 'ArrowDown': case 's': keys.backward = false; break;
                }
            });
            
            // 按钮控制
            document.getElementById('forward-btn').addEventListener('mousedown', () => keys.forward = true);
            document.getElementById('forward-btn').addEventListener('mouseup', () => keys.forward = false);
            document.getElementById('forward-btn').addEventListener('mouseleave', () => keys.forward = false);
            
            document.getElementById('backward-btn').addEventListener('mousedown', () => keys.backward = true);
            document.getElementById('backward-btn').addEventListener('mouseup', () => keys.backward = false);
            document.getElementById('backward-btn').addEventListener('mouseleave', () => keys.backward = false);
            
            document.getElementById('jump-btn').addEventListener('click', () => {
                if (isGrounded && !isGameOver) {
                    velocityY = jumpPower;
                    isGrounded = false;
                }
            });
            
            document.getElementById('attack-btn').addEventListener('click', () => attack());
            
            document.getElementById('restart-btn').addEventListener('click', () => location.reload());
        }
        
        function gameOver() {
            isGameOver = true;
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-kills').textContent = kills;
            document.getElementById('game-over').style.display = 'block';
        }
        
        function updatePlayer() {
            if (isGameOver) return;
            
            // 移动
            let moveZ = 0;
            if (keys.forward) moveZ = -1;
            if (keys.backward) moveZ = 1;
            
            if (moveZ !== 0) {
                player.position.z += moveZ * playerSpeed * 0.016;
                // 边界限制
                player.position.z = Math.max(-45, Math.min(45, player.position.z));
            }
            
            // 跳跃物理
            if (!isGrounded) {
                velocityY -= gravity * 0.016;
                player.position.y += velocityY * 0.016;
                
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    isGrounded = true;
                    keys.jumping = false;
                    velocityY = 0;
                }
            }
            
            // 相机跟随
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + cameraOffset.z;
            camera.position.y = player.position.y + cameraOffset.y;
            camera.lookAt(player.position);
            
            // 怪物AI
            monsters.forEach(monster => {
                const direction = new THREE.Vector3().subVectors(player.position, monster.position).normalize();
                monster.position.x += direction.x * monster.userData.speed * 0.016;
                monster.position.z += direction.z * monster.userData.speed * 0.016;
                
                // 面向玩家
                monster.lookAt(player.position);
                
                // 攻击玩家
                const distance = player.position.distanceTo(monster.position);
                if (distance < 1.2) {
                    if (monster.userData.attackCooldown <= 0) {
                        health -= 15;
                        updateUI();
                        createHitEffect(player.position);
                        monster.userData.attackCooldown = 1;
                        
                        if (health <= 0) {
                            health = 0;
                            gameOver();
                        }
                    }
                }
                
                if (monster.userData.attackCooldown > 0) {
                    monster.userData.attackCooldown -= 0.016;
                }
            });
            
            // 攻击冷却
            if (attackCooldown > 0) {
                attackCooldown -= 0.016;
            }
            
            // 武器特效随等级变化
            if (weapon) {
                const intensity = weaponLevel * 0.2;
                weapon.children.forEach(child => {
                    if (child.geometry.type === 'ConeGeometry') {
                        child.material.emissiveIntensity = 0.3 + intensity;
                    }
                });
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.life -= 0.02;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                    continue;
                }
                
                if (p.userData.velocity) {
                    p.position.x += p.userData.velocity.x * 0.016;
                    p.position.y += p.userData.velocity.y * 0.016;
                    p.position.z += p.userData.velocity.z * 0.016;
                    p.material.opacity = p.userData.life;
                }
                
                p.scale.multiplyScalar(0.98);
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (!isGameOver) {
                updatePlayer();
                updateParticles();
                gameTime += 0.016;
            }
            
            renderer.render(scene, camera);
        }
        
        // 启动游戏
        init();
        
        console.log('游戏已启动！使用WASD或箭头键移动，空格跳跃，J或点击攻击按钮进行攻击！');
    </script>
</body>
</html>
